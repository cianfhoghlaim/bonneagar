# =============================================================================
# KOMODO CORE - Infrastructure Orchestration with FerretDB v2
# =============================================================================
# Deploys Komodo Core with PostgreSQL-backed MongoDB API via FerretDB.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   docker compose -f compose.yaml -f sidecar.yaml up -d
#   With Pangolin: docker compose -f compose.yaml -f sidecar.yaml -f pangolin.yaml up -d
# =============================================================================

name: komodo

services:
  # ---------------------------------------------------------------------------
  # FERRETDB - Postgres-backed MongoDB-compatible API (v2)
  # ---------------------------------------------------------------------------
  # Replaces the legacy `mongo` service. FerretDB v2 stores documents
  # natively in Postgres, which we already have on the host (via the
  # `komodo-postgres` service below) — no separate MongoDB license,
  # no separate `mongo` image, and we get real transactional storage
  # under the hood.
  # ---------------------------------------------------------------------------
  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2
    container_name: komodo-ferretdb
    restart: unless-stopped
    labels:
      komodo.skip: # Prevent Komodo from stopping with StopAllContainers
    command:
      - "--postgresql-url=postgres://${KOMODO_DATABASE_USERNAME:-komodo}:${KOMODO_DATABASE_PASSWORD:-devpassword}@komodo-postgres:5432/${KOMODO_DATABASE_NAME:-komodo}"
      - "--listen-addr=0.0.0.0:27017"
    environment:
      # FerretDB doesn't need credentials of its own; it speaks the
      # wire protocol on port 27017 to whichever Mongo client (Komodo
      # core) connects.
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DATABASE_USERNAME:-komodo}:${KOMODO_DATABASE_PASSWORD:-devpassword}@komodo-postgres:5432/${KOMODO_DATABASE_NAME:-komodo}
    depends_on:
      komodo-postgres-init:
        condition: service_completed_successfully
    networks:
      - komodo
    healthcheck:
      # FerretDB's image is distroless — no /bin/sh available. Use
      # the Go runtime's port probe instead via a tiny TCP connect
      # from the host namespace (or skip the healthcheck and rely
      # on the `depends_on: service_healthy` of any consumer).
      test: ["CMD", "/ferretdb", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  komodo-postgres:
    # Postgres 17 with FerretDB's documentdb extension pre-installed.
    # FerretDB v2 stores documents natively via the documentdb extension
    # and this image is the only Postgres flavor that ships it ready to
    # use. The extension is created in the `komodo` database on first
    # start by the `komodo-postgres-init` init container.
    image: ghcr.io/ferretdb/postgres-documentdb:17
    container_name: komodo-postgres
    restart: unless-stopped
    # Override the entrypoint so the `komodo-postgres-init` companion
    # container can `psql` directly into the running instance. The
    # `cron.database_name` GUC lets the `documentdb` extension be
    # installed in any database (not just `postgres`).
    command:
      - "postgres"
      - "-c"
      - "cron.database_name=komodo"
    environment:
      POSTGRES_DB: ${KOMODO_DATABASE_NAME:-komodo}
      POSTGRES_USER: ${KOMODO_DATABASE_USERNAME:-komodo}
      POSTGRES_PASSWORD: ${KOMODO_DATABASE_PASSWORD:-devpassword}
    volumes:
      - komodo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -d $${POSTGRES_DB:-komodo} -U $${POSTGRES_USER:-komodo}"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - komodo
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ---------------------------------------------------------------------------
  # KOMODO POSTGRES INIT - create the documentdb extensions in the komodo DB
  # ---------------------------------------------------------------------------
  komodo-postgres-init:
    image: ghcr.io/ferretdb/postgres-documentdb:17
    container_name: komodo-postgres-init
    depends_on:
      komodo-postgres:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - "psql"
    command:
      # Connect over TCP because the init container has no socket.
      - "postgresql://${KOMODO_DATABASE_USERNAME:-komodo}:${KOMODO_DATABASE_PASSWORD:-devpassword}@komodo-postgres:5432/${KOMODO_DATABASE_NAME:-komodo}?connect_timeout=10"
      - "-v"
      - "ON_ERROR_STOP=1"
      - "-c"
      - "CREATE EXTENSION IF NOT EXISTS documentdb CASCADE;"
    networks:
      - komodo

  # ---------------------------------------------------------------------------
  # KOMODO CORE - Orchestration Engine
  # ---------------------------------------------------------------------------
  core:
    image: ghcr.io/moghtech/komodo-core:${KOMODO_IMAGE_TAG:-2}
    container_name: komodo-core
    init: true
    restart: unless-stopped
    depends_on:
      ferretdb:
        condition: service_healthy
    ports:
      - "${KOMODO_PORT:-9120}:9120"
    environment:
      # Database — Komodo speaks MongoDB wire protocol; FerretDB v2
      # translates it into Postgres queries on the other side.
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DATABASE_USERNAME:-komodo}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DATABASE_PASSWORD:-devpassword}

      # Host & Security
      KOMODO_HOST: ${KOMODO_HOST:-https://komodo.cianfhoghlaim.ie}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET:-}
      KOMODO_PASSKEY: ${KOMODO_PASSKEY:-}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET:-}

      # Auth
      KOMODO_LOCAL_AUTH: ${KOMODO_LOCAL_AUTH:-true}
      KOMODO_INIT_ADMIN_USERNAME: ${KOMODO_INIT_ADMIN_USERNAME:-ciansedai}
      KOMODO_INIT_ADMIN_PASSWORD: ${KOMODO_INIT_ADMIN_PASSWORD:-}
      KOMODO_AUTH_RATE_LIMIT_DISABLED: "true"
      KOMODO_AUTH_RATE_LIMIT_MAX_ATTEMPTS: "250"

      # OIDC (optional)
      KOMODO_OIDC_ENABLED: ${KOMODO_OIDC_ENABLED:-false}
      KOMODO_OIDC_PROVIDER: ${KOMODO_OIDC_PROVIDER:-}
      KOMODO_OIDC_CLIENT_ID: ${KOMODO_OIDC_CLIENT_ID:-}
      KOMODO_OIDC_CLIENT_SECRET: ${KOMODO_OIDC_CLIENT_SECRET:-}
      KOMODO_OIDC_USE_FULL_EMAIL: ${KOMODO_OIDC_USE_FULL_EMAIL:-true}

      # Rate Limiting (default: 10 requests/second)
      # Increased to 500 for automation workflows
      KOMODO_REQUEST_RATE_LIMIT: ${KOMODO_REQUEST_RATE_LIMIT:-500}

      # Backups
      KOMODO_BACKUP_ENABLED: ${KOMODO_BACKUP_ENABLED:-true}
      KOMODO_BACKUP_SCHEDULE: ${KOMODO_BACKUP_SCHEDULE:-0 2 * * *}
    volumes:
      - keys:/config/keys
      - backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9120/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - komodo
      - pangolin
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

volumes:
  komodo-postgres-data:
    name: komodo-postgres-data
  keys:
  backups:

networks:
  komodo:
    driver: bridge
  pangolin:
    external: true
