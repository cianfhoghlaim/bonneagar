# =============================================================================
# KOMODO CORE - Locket Sidecar Configuration
# =============================================================================
# Injects secrets from Infisical into the environment

services:
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: komodo-locket
    restart: unless-stopped
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # Locket reads these env vars to talk to Infisical. The
      # values are injected at compose time from the operator's
      # environment (`.env` or shell). The `${...}` here is a
      # single-dollar Compose substitution; not a `$$` escape.
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
    command:
      - "--provider=infisical"
      - "--infisical-client-id=${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--infisical-default-environment=${INFISICAL_ENVIRONMENT:-dev}"
      - "--infisical-default-project-id=${INFISICAL_PROJECT_ID:-}"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - komodo-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - komodo

  # Override core to depend on locket and use injected secrets
  core:
    depends_on:
      locket:
        condition: service_healthy
      ferretdb:
        condition: service_started
    volumes:
      - komodo-secrets:/run/secrets/locket:ro
    env_file:
      - path: /run/secrets/locket/secrets.env
        required: false

secrets:
  infisical_secret:
    file: ${INFISICAL_SECRET_FILE:-../../../infisical_secret}

volumes:
  komodo-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
