# =============================================================================
# Pangolin Tunnel Agents Stack Configuration
# =============================================================================
# Defines tunnel agents for Pangolin:
# - Newt: Server-side agent that exposes services TO Pangolin
# - OLM: Client-side agent for TCP connections FROM your machine TO Pangolin
#
# Deployment:
#   komodo procedure run deploy-tunnels
#
# Prerequisites:
#   1. Create Newt/OLM sites in Pangolin UI (Sites -> Create Site)
#   2. Store credentials in Infisical (vault: dev-baile)
#   3. Ensure Locket sidecar can reach Infisical
# =============================================================================

[[stack]]
name = "newt-oci"
description = "Pangolin Newt tunnel agent - exposes OCI services to Pangolin"
tags = [
  "host:arm1-oci",
  "tier:infrastructure",
  "type:tunnel",
  "tunnel:newt"
]
[stack.config]
server = "arm1-oci"
run_directory = "/etc/komodo/pangolin/newt-oci"
file_paths = ["compose.yaml", "sidecar.yaml"]
environment = """
PANGOLIN_ENDPOINT=https://pangolin.cianfhoghlaim.ie
LOCKET_MODE=watch
"""

##

[[stack]]
name = "olm-oracle"
description = "Pangolin OLM tunnel client - direct access to Oracle Cloud services"
tags = [
  "host:arm1-oci",
  "tier:infrastructure",
  "type:tunnel",
  "tunnel:olm"
]
[stack.config]
server = "arm1-oci"
run_directory = "/etc/komodo/pangolin/olm-oracle"
file_paths = ["compose.yaml", "sidecar.yaml"]
environment = """
PANGOLIN_ENDPOINT=https://pangolin.cianfhoghlaim.ie
LOCKET_MODE=watch
"""

##

[[stack]]
name = "olm-oci"
description = "Pangolin OLM tunnel client - direct access to OCI services"
tags = [
  "host:arm1-oci",
  "tier:infrastructure",
  "type:tunnel",
  "tunnel:olm"
]
[stack.config]
server = "arm1-oci"
run_directory = "/etc/komodo/pangolin/olm-oci"
file_paths = ["compose.yaml", "sidecar.yaml"]
environment = """
PANGOLIN_ENDPOINT=https://pangolin.cianfhoghlaim.ie
LOCKET_MODE=watch
"""

##

# =============================================================================
# Deploy Procedure
# =============================================================================
# Run: komodo procedure run deploy-tunnels

[[procedure]]
name = "deploy-tunnels"
description = "Deploy all Pangolin tunnel agents (Newt + OLM)"

[[procedure.config.stage]]
name = "newt-agents"
description = "Deploy Newt agents for service exposure"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "newt-oci", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "olm-agents"
description = "Deploy OLM agents for direct access"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "olm-oracle", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "olm-oci", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "verify"
description = "Verify tunnel connections"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "validate-deployments", execution.params.services = [], enabled = true }
]
