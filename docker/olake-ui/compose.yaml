# =============================================================================
# OLAKE-UI - Database to Iceberg Replication Platform
# =============================================================================
# Web interface for configuring and managing data replication jobs from
# databases to Apache Iceberg or Data Lakehouse.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: olake-ui

services:
  # ---------------------------------------------------------------------------
  # OLAKE-UI - Main Application
  # ---------------------------------------------------------------------------
  olake-ui:
    image: olakego/ui:latest
    container_name: olake-ui
    restart: unless-stopped
    ports:
      - "${OLAKE_PORT:-8000}:8000"
    environment:
      OLAKE_SECRET_KEY: ${OLAKE_SECRET_KEY:-}
      PERSISTENT_DIR: /tmp/olake-config
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - olake-config:/tmp/olake-config
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # SIGNUP INIT - Create Initial Admin User
  # ---------------------------------------------------------------------------
  signup-init:
    image: curlimages/curl:latest
    container_name: olake-signup-init
    depends_on:
      olake-ui:
        condition: service_healthy
    environment:
      USERNAME: ${OLAKE_ADMIN_USERNAME:-admin}
      PASSWORD: ${OLAKE_ADMIN_PASSWORD:-password}
      EMAIL: ${OLAKE_ADMIN_EMAIL:-admin@example.com}
      OLAKE_APP_URL: "http://olake-ui:8000/signup"
    command: >
      sh -c "
        echo 'Creating initial admin user...'
        JSON_PAYLOAD=$$(printf '{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\"}' \"$${USERNAME}\" \"$${PASSWORD}\" \"$${EMAIL}\")
        HTTP_CODE=$$(/usr/bin/curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d \"$${JSON_PAYLOAD}\" \"$${OLAKE_APP_URL}\")
        if [ \"$${HTTP_CODE}\" -ge 200 ] && [ \"$${HTTP_CODE}\" -lt 300 ]; then
          echo \"User '$${USERNAME}' created successfully (HTTP $${HTTP_CODE})\"
        else
          echo \"User creation failed or already exists (HTTP $${HTTP_CODE})\"
        fi
      "
    restart: "no"
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # TEMPORAL WORKER - Background Job Processor
  # ---------------------------------------------------------------------------
  temporal-worker:
    image: olakego/ui-worker:latest
    container_name: olake-temporal-worker
    restart: unless-stopped
    environment:
      OLAKE_SECRET_KEY: ${OLAKE_SECRET_KEY:-}
      OLAKE_CALLBACK_URL: "http://olake-ui:8000/internal/worker/callback"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - olake-config:/tmp/olake-config
    depends_on:
      temporal:
        condition: service_started
      olake-ui:
        condition: service_healthy
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Temporal Metadata Store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13-alpine
    container_name: olake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OLAKE_DB_USER:-temporal}
      POSTGRES_PASSWORD: ${OLAKE_DB_PASSWORD:-temporal}
    volumes:
      - olake-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OLAKE_DB_USER:-temporal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # TEMPORAL - Workflow Orchestration
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.22.3
    container_name: olake-temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${OLAKE_DB_USER:-temporal}
      POSTGRES_PWD: ${OLAKE_DB_PASSWORD:-temporal}
      POSTGRES_SEEDS: postgres
      ENABLE_ES: "true"
      ES_SEEDS: elasticsearch
      ES_VERSION: v7
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # TEMPORAL UI - Workflow Dashboard (Optional)
  # ---------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.16.2
    container_name: olake-temporal-ui
    restart: unless-stopped
    profiles:
      - debug
    ports:
      - "${TEMPORAL_UI_PORT:-8081}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_started
    networks:
      - olake-ui

  # ---------------------------------------------------------------------------
  # ELASTICSEARCH - Temporal Search Backend
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: olake-elasticsearch
    restart: unless-stopped
    environment:
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
    volumes:
      - olake-elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - olake-ui

volumes:
  olake-postgres:
  olake-config:
  olake-elasticsearch:

networks:
  olake-ui:
    driver: bridge
