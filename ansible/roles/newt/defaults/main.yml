---
# =============================================================================
# NEWT ROLE - Default Variables
# =============================================================================
# Pangolin Newt tunnel agent deployment via Docker Compose
# =============================================================================

# -----------------------------------------------------------------------------
# DEPLOYMENT PATHS
# -----------------------------------------------------------------------------
newt_base_dir: /opt/site
newt_secrets_dir: "{{ newt_base_dir }}/secrets"
newt_templates_dir: "{{ newt_secrets_dir }}/templates"

# -----------------------------------------------------------------------------
# PANGOLIN CONFIGURATION
# -----------------------------------------------------------------------------
pangolin_endpoint: "https://pangolin.cianfhoghlaim.ie"

# -----------------------------------------------------------------------------
# KOMODO PERIPHERY
# -----------------------------------------------------------------------------
periphery_core_address: "wss://komodo.cianfhoghlaim.ie"
periphery_connect_as: "{{ inventory_hostname }}"
periphery_image: "ghcr.io/moghtech/komodo-periphery:2"

# -----------------------------------------------------------------------------
# BESZEL MONITORING
# -----------------------------------------------------------------------------
beszel_enabled: true
beszel_key: ""

# -----------------------------------------------------------------------------
# DOCKER NETWORK
# -----------------------------------------------------------------------------
docker_network_name: pangolin

# -----------------------------------------------------------------------------
# LOG LEVEL
# -----------------------------------------------------------------------------
log_level: INFO
