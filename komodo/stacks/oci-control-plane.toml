# =============================================================================
# OCI CONTROL PLANE STACKS
# =============================================================================
# Services deployed on Oracle Cloud Free Tier (arm1-oci)
# Lightweight control plane services that need to be always-on
# =============================================================================

# -----------------------------------------------------------------------------
# GARAGE - S3-Compatible Object Storage
# -----------------------------------------------------------------------------
# Central object storage for all sites via WireGuard tunnel
# -----------------------------------------------------------------------------
[[stack]]
name = "garage"
description = "S3-compatible object storage (control plane)"
tags = ["host:arm1-oci", "tier:storage"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/garage"
file_paths = ["compose.yaml"]
environment = """
GARAGE_RPC_PORT=3901
GARAGE_S3_API_PORT=3900
GARAGE_K2V_API_PORT=3902
GARAGE_WEB_PORT=3903
GARAGE_ADMIN_PORT=3904
"""

# -----------------------------------------------------------------------------
# BESZEL - Monitoring Hub
# -----------------------------------------------------------------------------
[[stack]]
name = "beszel"
description = "Lightweight server monitoring hub"
tags = ["host:arm1-oci", "tier:monitoring"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/beszel"
file_paths = ["compose.yaml"]
environment = """
BESZEL_PORT=8090
"""

# -----------------------------------------------------------------------------
# DOZZLE - Log Viewer
# -----------------------------------------------------------------------------
[[stack]]
name = "dozzle"
description = "Real-time Docker log viewer"
tags = ["host:arm1-oci", "tier:monitoring"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/dozzle"
file_paths = ["compose.yaml"]
environment = """
DOZZLE_PORT=8080
"""

# -----------------------------------------------------------------------------
# QDRANT - Vector Search Engine
# -----------------------------------------------------------------------------
[[stack]]
name = "qdrant"
description = "Vector similarity search engine for AI/ML"
tags = ["host:arm1-oci", "tier:database", "type:vector"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/qdrant"
file_paths = ["compose.yaml"]
environment = """
QDRANT_HTTP_PORT=6333
QDRANT_GRPC_PORT=6334
QDRANT_LOG_LEVEL=INFO
"""

# -----------------------------------------------------------------------------
# POCKET ID — Passkey-based OIDC identity provider
# -----------------------------------------------------------------------------
# auth.cianfhoghlaim.ie — SSO for all team-workflow services (vikunja, n8n,
# cal-diy, glance, paperless, changedetection, croilar). Deployed as a
# standalone stack with Locket sidecar for Infisical secret injection.
# -----------------------------------------------------------------------------
[[stack]]
name = "pocket-id"
description = "Pocket ID — OIDC SSO provider (auth.cianfhoghlaim.ie, port 8080)"
tags = ["host:arm1-oci","tier:infrastructure","type:identity","domain:auth.cianfhoghlaim.ie","team:sso"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/sruth/infrastructure/pocket-id"
file_paths = ["compose.yaml","sidecar.yaml","pangolin.yaml","blueprint.yaml"]
environment = """
INFISICAL_URL=http://infisical-backend:8080
LOCKET_MODE=watch
"""
