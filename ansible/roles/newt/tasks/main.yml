---
# =============================================================================
# NEWT ROLE - Main Tasks
# =============================================================================
# Deploys Pangolin Newt tunnel agent alongside Locket and Periphery
# =============================================================================

- name: Create site directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ newt_base_dir }}"
    - "{{ newt_secrets_dir }}"
    - "{{ newt_templates_dir }}"

- name: Deploy Locket secret templates
  ansible.builtin.template:
    src: "locket_templates/{{ item }}.j2"
    dest: "{{ newt_templates_dir }}/{{ item }}"
    mode: "0640"
  loop:
    - newt_id
    - newt_secret
    - onboarding_key

- name: Deploy docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ newt_base_dir }}/docker-compose.yaml"
    mode: "0644"
  notify: Restart site services

- name: Create Docker network
  ansible.builtin.shell: |
    docker network inspect {{ docker_network_name }} >/dev/null 2>&1 || docker network create {{ docker_network_name }}
  changed_when: false

- name: Pull Docker images
  ansible.builtin.shell: |
    cd {{ newt_base_dir }}
    docker compose pull
  changed_when: false

- name: Start site services
  ansible.builtin.shell: |
    cd {{ newt_base_dir }}
    docker compose up -d
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout"

- name: Wait for Locket to be healthy
  ansible.builtin.shell: |
    bash -c 'for i in {1..30}; do if docker inspect --format="{{ '{{' }}.State.Health.Status{{ '}}' }}" {{ inventory_hostname }}-locket 2>/dev/null | grep -q healthy; then exit 0; fi; sleep 2; done; exit 1'
  changed_when: false
  when: not ansible_check_mode

- name: Verify Newt is running
  ansible.builtin.shell: |
    docker ps --filter "name={{ inventory_hostname }}-newt" --format "{{ '{{' }}.Status{{ '}}' }}"
  register: newt_status
  changed_when: false
  failed_when: "'Up' not in newt_status.stdout"
  when: 
    - not ansible_check_mode
    - deploy_newt | default(true) | bool

- name: Verify Periphery is running
  ansible.builtin.shell: |
    docker ps --filter "name={{ inventory_hostname }}-periphery" --format "{{ '{{' }}.Status{{ '}}' }}"
  register: periphery_status
  changed_when: false
  failed_when: "'Up' not in periphery_status.stdout"
  when: not ansible_check_mode
