services:
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: kafka-locket
    restart: unless-stopped
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--provider=infisical"
      - "--infisical-client-id=$${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - stack-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - stack

  # kafka broker + register SASL/SCRAM credentials via locket-resolved env
  kafka:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - stack-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

  # kafka-init one-shot creates the 5 topics from oideachais/data_platform/kafka.py
  kafka-init:
    image: bitnami/kafka:3.9
    container_name: kafka-init
    depends_on:
      locket:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_SASL_USER: ${KAFKA_SASL_USER}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        cat > /tmp/topic-create.sh <<'BASH'
        #!/usr/bin/env bash
        set -euo pipefail
        TOPICS=(
          "AGENT_QUERIES:6:1"
          "AGENT_RESPONSES:6:1"
          "CURRICULUM_PAGES:12:1"
          "EVALUATION_RAG:6:1"
          "CURRICULUM_EMBEDDED:12:1"
        )
        for t in "$${TOPICS[@]}"; do
          IFS=':' read -r name parts repl <<< "$$t"
          echo "Creating topic: $$name (partitions=$$parts, repl=$$repl)"
          kafka-topics.sh --bootstrap-server $${KAFKA_BOOTSTRAP} \
            --create --if-not-exists \
            --topic "$$name" \
            --partitions "$$parts" --replication-factor "$$repl"
        done
        BASH
        chmod +x /tmp/topic-create.sh
        /tmp/topic-create.sh
    volumes:
      - stack-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env
    networks:
      - stack
    restart: "no"

secrets:
  infisical_secret:
    file: $${INFISICAL_SECRET_FILE:-../../infisical_secret}

volumes:
  stack-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700

networks:
  stack:
    driver: bridge
