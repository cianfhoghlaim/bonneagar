      api_base: https://opencode.ai/zen/go/v1/messages
      api_key: os.environ/OPENCODE_GO_API_KEY_1
    model_info:
      description: "MiniMax-M3 (parallel slot 1 — round-robin target)"
      capabilities: ["general", "agentic"]
      tier: paid

  - model_name: opencode-go/minimax-m3-slot2
    litellm_params:
      model: anthropic/minimax-m3
      api_base: https://opencode.ai/zen/go/v1/messages
