---
# =============================================================================
# LOCKET ROLE - Default Variables
# =============================================================================
# https://github.com/bpbradley/locket
#
# Locket is a secrets management agent that integrates with 1Password Connect,
# 1Password Service Accounts, or Bitwarden Secrets Manager to inject secrets
# into Docker containers.
#
# This role installs locket as both a standalone binary and optionally as a
# Docker CLI plugin for use with Docker Compose provider mode.
# =============================================================================

# -----------------------------------------------------------------------------
# INSTALLATION
# -----------------------------------------------------------------------------

# Enable/disable locket installation
locket_enabled: true

# Locket version to install
locket_version: "latest"

# Architecture mapping for binary downloads
# Use musl for broader compatibility (glibc builds require newer systems)
locket_arch: "{{ 'aarch64-unknown-linux-gnu' if ansible_architecture == 'aarch64' else 'x86_64-unknown-linux-musl' }}"

# Download URL for binary
locket_download_url: "https://github.com/bpbradley/locket/releases/latest/download/locket-{{ locket_arch }}.tar.xz"

# Installation path
locket_binary_path: /usr/local/bin/locket

# -----------------------------------------------------------------------------
# DOCKER CLI PLUGIN
# -----------------------------------------------------------------------------

# Install locket as Docker CLI plugin (enables provider mode in compose)
locket_install_cli_plugin: true

# User to install CLI plugin for (needs Docker access)
locket_cli_plugin_user: root
locket_cli_plugin_group: root

# User home directory for CLI plugin installation
locket_cli_plugin_home: "{{ '/root' if locket_cli_plugin_user == 'root' else '/home/' + locket_cli_plugin_user }}"

# -----------------------------------------------------------------------------
# SECRETS PROVIDER CONFIGURATION
# -----------------------------------------------------------------------------

# Secrets provider: op-connect, op (service account), or bws (bitwarden)
locket_provider: "op-connect"

# -----------------------------------------------------------------------------
# 1PASSWORD CONNECT SETTINGS
# -----------------------------------------------------------------------------

# 1Password Connect server URL
locket_op_connect_host: ""  # e.g., "http://connect:8080"

# Directory for storing 1Password Connect token
locket_op_token_dir: /etc/locket

# Path to 1Password Connect token file
locket_op_token_file: "{{ locket_op_token_dir }}/op_token"

# 1Password Connect token (should be vault-encrypted!)
# locket_op_connect_token: ""

# -----------------------------------------------------------------------------
# 1PASSWORD SERVICE ACCOUNT SETTINGS
# -----------------------------------------------------------------------------

# Service account token (should be vault-encrypted!)
# locket_op_service_account_token: ""

# -----------------------------------------------------------------------------
# BITWARDEN SECRETS MANAGER SETTINGS
# -----------------------------------------------------------------------------

# Bitwarden API URL
locket_bws_api_url: "https://api.bitwarden.com"

# Bitwarden Identity URL
locket_bws_identity_url: "https://identity.bitwarden.com"

# Bitwarden machine token (should be vault-encrypted!)
# locket_bws_machine_token: ""

# -----------------------------------------------------------------------------
# ENVIRONMENT VARIABLES
# -----------------------------------------------------------------------------

# Deploy environment file for systemd services that need locket
locket_deploy_env_file: true
locket_env_file_path: /etc/locket/locket.env

# -----------------------------------------------------------------------------
# PERMISSIONS
# -----------------------------------------------------------------------------

# File permissions for token/secret files
locket_secret_file_mode: "0600"
locket_dir_mode: "0700"
