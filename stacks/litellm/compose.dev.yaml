# LiteLLM — local dev override
# ----------------------------------------------------------------------------
# Mirrors the langfuse dev override pattern (post centralise-data-plane):
#   1. No-op locket sidecar (alpine) so `depends_on: locket: service_healthy`
#      resolves without booting the real Infisical-injection sidecar.
#   2. `env_file: ../../../.env` (mise-hydrated local .env) is mounted
#      so secrets reach the containers directly.
#   3. DATABASE_URL points at `lakehouse-postgres` (the centralised service).
#      The standalone db container was removed.
#
# Usage:
#   docker compose -f compose.yaml -f compose.dev.yaml -f sidecar.yaml up -d
# ----------------------------------------------------------------------------

services:
  locket:
    image: alpine:3.20
    container_name: litellm-locket-dev
    restart: "no"
    command: ["sh", "-c", "echo '[dev] no-op locket — secrets come from local .env via env_file'; sleep infinity"]
    networks:
      - cianfhoghlaim

  litellm:
    depends_on:
      locket:
        condition: service_started
    env_file:
      - ../../../.env
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-1234}
      LITELLM_LOG: INFO
      # Centralised lakehouse-postgres (db=litellm)
      DATABASE_URL: postgresql://lakekeeper:devpassword@lakehouse-postgres:5432/litellm
      LITELLM_DATABASE_URL: postgresql://lakekeeper:devpassword@lakehouse-postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      # Provide stub values for required-but-unused-in-dev vars
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-dev-salt}
      # Stub out cloud-provider keys in dev
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}

  # Prometheus dev override removed in cleanup-and-boot-stacks change 2026-06-26
  # (the prometheus service itself was deleted from compose.yaml).
