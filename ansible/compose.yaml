---
# =============================================================================
# ANSIBLE AUTOMATION ENVIRONMENT — with Infisical + Locket integration
# =============================================================================
# Runs Ansible playbooks in a containerized execution environment.
# Secrets flow: Infisical vault → Locket sidecar → Ansible container env.
# =============================================================================

services:
  ansible:
    image: ${ANSIBLE_EE_IMAGE:-ansible-komodo-ee:latest}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      # Ansible files
      - .:/ansible
      # SSH key (dedicated ansible key pair — public key is authorized on arm1-oci)
      - /Users/cianmacandeisigh/.ssh/ansible:/root/.ssh/id_ed25519:ro
      # Pangolin config (for pangolin_core role)
      - ../pangolin/config:/config/pangolin:ro
    user: root
    environment:
      HOME: /root
      ANSIBLE_CONFIG: /ansible/ansible.cfg
      ANSIBLE_HOST_KEY_CHECKING: ${ANSIBLE_HOST_KEY_CHECKING:-false}
      ANSIBLE_VAULT_PASSWORD_FILE: /tmp/.vaultpass
      ANSIBLE_VAULT_PASSWORD: ${ANSIBLE_VAULT_PASSWORD:-}
      # Infisical wiring — used by inventory.yml lookup('env', ...) calls
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      POCKETID_CLIENT_ID: ${POCKETID_CLIENT_ID}
      POCKETID_CLIENT_SECRET: ${POCKETID_CLIENT_SECRET}
      # OCI target host
      OCI_ARM1_IP: ${OCI_ARM1_IP}
      # Locket mode
      LOCKET_MODE: ${LOCKET_MODE:-watch}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$$ANSIBLE_VAULT_PASSWORD" ]; then
          printf '%s' "$$ANSIBLE_VAULT_PASSWORD" > /tmp/.vaultpass
          chmod 600 /tmp/.vaultpass
        fi
        # Source Locket secrets if available
        if [ -f /run/secrets/locket/secrets.env ]; then
          set -a; . /run/secrets/locket/secrets.env; set +a
        fi
        exec "$$@"
      - --
    command: ["sleep", "3600"]
    stdin_open: true
    tty: true
    networks:
      - ansible

  # ---------------------------------------------------------------------------
  # LOCKET — Infisical secret injection sidecar
  # ---------------------------------------------------------------------------
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: ansible-locket
    restart: "no"
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--provider=infisical"
      - "--infisical-client-id=$${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=$${INFISICAL_CLIENT_SECRET}"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - stack-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s; timeout: 5s; retries: 3; start_period: 5s
    networks:
      - ansible

volumes:
  stack-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700

networks:
  ansible:
    driver: bridge

# =============================================================================
# USAGE
# =============================================================================
# 1. SSH test:
#    docker compose run --rm ansible ssh -o StrictHostKeyChecking=no ubuntu@$${OCI_ARM1_IP} echo OK
#
# 2. Deploy site infrastructure (Newt + Periphery + Locket to arm1-oci):
#    docker compose run --rm ansible ansible-playbook \
#      -i /ansible/inventory/inventory.yml \
#      /ansible/playbooks/site.yml -l arm1.oci
#
# 3. Deploy control plane (Pangolin + Komodo Core):
#    docker compose run --rm ansible ansible-playbook \
#      -i /ansible/inventory/inventory.yml \
#      /ansible/playbooks/deploy-infrastructure.yml
# =============================================================================
