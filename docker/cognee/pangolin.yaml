# Pangolin auto-discovery labels for Cognee
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  cognee:
    labels:
      - "pangolin.resource.name=Cognee"
      - "pangolin.resource.domain=cognee.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://cognee:8000"
      - "pangolin.resource.middlewares=tinyauth"
