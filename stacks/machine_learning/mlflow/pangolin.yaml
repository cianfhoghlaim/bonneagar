# Pangolin auto-discovery labels for MLflow
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  mlflow:
    labels:
      - "pangolin.private-resources.mlflow.name=MLflow"
      - "pangolin.private-resources.mlflow.mode=http"
      - "pangolin.private-resources.mlflow.destination=mlflow:5000"
      - "pangolin.private-resources.mlflow.protocol=http"
      - "pangolin.private-resources.mlflow.roles[0]=Member"
      - "pangolin.private-resources.mlflow.full-domain=mlflow.cianfhoghlaim.ie"