# =============================================================================
# GARAGE - Pangolin Blueprint
# =============================================================================
# Note: S3 API endpoint stays public for programmatic access.
# Web UI is private (zero-trust via Pangolin).
# =============================================================================

public-resources:
  garage-s3:
    name: "Garage S3 API"
    full-domain: "s3.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "arm1-oci"
        hostname: "garage"
        method: "http"
        port: 3900

private-resources:
  garage-web:
    name: "Garage Web"
    full-domain: "garage.cianfhoghlaim.ie"
    mode: http
    destination-port: 3903
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member
