# =============================================================================
# ROMM STACK
# =============================================================================
# ROM manager for retro game collections
# =============================================================================

[[stack]]
name = "romm"
description = "ROM manager for retro game collections"
tags = ["host:bunchloch", "tier:media", "type:gaming", "domain:romm.aleyum.com"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/romm"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
ROMM_DOMAIN=romm.aleyum.com
ROMM_NAME=ROMM
ROMM_PORT=3000
TZ=Europe/Dublin
OP_CONNECT_HOST=${OP_CONNECT_HOST}
LOCKET_MODE=watch
"""
