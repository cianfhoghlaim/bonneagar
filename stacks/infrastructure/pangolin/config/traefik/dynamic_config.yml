# Traefik Dynamic Configuration — Routers for dashboard, API, WebSocket
# Docs: https://docs.pangolin.net/self-host/manual/docker-compose

http:
  middlewares:
    badger:
      plugin:
        badger:
          disableForwardAuth: true
    redirect-to-https:
      redirectScheme:
        scheme: https

  routers:
    main-app-router-redirect:
      rule: "Host(`pangolin.cianfhoghlaim.ie`)"
      service: next-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
        - badger

    next-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && !PathPrefix(`/api/v1`) && !PathPrefix(`/v1`)"
      service: next-service
      entryPoints:
        - websecure
      middlewares:
        - badger
      tls:
        certResolver: letsencrypt

    api-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && PathPrefix(`/api/v1`)"
      service: api-service
      entryPoints:
        - websecure
      middlewares:
        - badger
      tls:
        certResolver: letsencrypt

    ws-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`)"
      service: api-service
      entryPoints:
        - websecure
      middlewares:
        - badger
      tls:
        certResolver: letsencrypt

    # Pocket ID OIDC — identity provider (no auth middleware, public)
    pocket-id-router:
      rule: "Host(`auth.cianfhoghlaim.ie`)"
      service: pocket-id-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    pocket-id-router-redirect:
      rule: "Host(`auth.cianfhoghlaim.ie`)"
      service: pocket-id-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https


    # Pangolin Integration API (port 3003) — for IaC, scripts, automation
    integration-api-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && PathPrefix(`/v1`)"
      priority: 100
      service: integration-api-service
      entryPoints:
        - websecure
      middlewares:
        - badger
      tls:
        certResolver: letsencrypt

  services:
    integration-api-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3003"
    next-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3002"

    api-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3000"

    pocket-id-service:
      loadBalancer:
        servers:
          - url: "http://pocket-id:1411"
