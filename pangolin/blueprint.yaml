# =============================================================================
# PANGOLIN - Pangolin Blueprint
# =============================================================================
# Defines routing for Pangolin management UI and related services.
# These routes are served by Pangolin itself (self-referential).
# =============================================================================

public-resources:
  # ---------------------------------------------------------------------------
  # Pangolin Dashboard
  # ---------------------------------------------------------------------------
  pangolin:
    name: "Pangolin Dashboard"
    full-domain: "pangolin.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "arm1-oci"
        hostname: "pangolin"
        method: "http"
        port: 3001

  # ---------------------------------------------------------------------------
  # NOTE: Pocket ID and TinyAuth are local services in the Pangolin stack
  # They use static Traefik routing (dynamic_config.yml), NOT Newt tunneling
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # TinyAuth - Forward Authentication
  # ---------------------------------------------------------------------------
  tinyauth:
    name: "TinyAuth"
    full-domain: "tinyauth.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "arm1-oci"
        hostname: "tinyauth"
        method: "http"
        port: 3000

  # ---------------------------------------------------------------------------
  # Middleware Manager
  # ---------------------------------------------------------------------------
  middleware-manager:
    name: "Middleware Manager"
    full-domain: "middleware.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: "arm1-oci"
        hostname: "middleware-manager"
        method: "http"
        port: 3456
