# =============================================================================
# CLOUDFLARE R2 - Object Storage via FUSE Mount
# =============================================================================
# Multi-bucket S3-compatible object storage with rclone FUSE mounts.
# Replaces self-hosted Garage for cloud-native object storage.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#
# BUCKETS:
#   - curriculum-data: Ingested curriculum documents
#   - embeddings: LanceDB data files
#   - iceberg: Lakekeeper table storage
#   - exports: Dagster asset exports
#
# NOTE: Requires Cloudflare R2 API credentials. Create tokens at:
#       https://dash.cloudflare.com/[account-id]/r2/api-tokens
# =============================================================================

name: r2

services:
  # ---------------------------------------------------------------------------
  # CURRICULUM DATA BUCKET
  # ---------------------------------------------------------------------------
  r2-curriculum:
    image: rclone/rclone:latest
    container_name: r2-curriculum
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    command: >
      mount r2:curriculum-data /data/curriculum
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 2G
      --vfs-read-chunk-size 64M
      --daemon-wait 30s
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
    volumes:
      - type: bind
        source: ${R2_MOUNT_BASE:-/mnt/r2}/curriculum
        target: /data/curriculum
        bind:
          propagation: rshared
    healthcheck:
      test: ["CMD", "ls", "/data/curriculum"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - r2

  # ---------------------------------------------------------------------------
  # EMBEDDINGS BUCKET (LanceDB, CLIP, etc.)
  # ---------------------------------------------------------------------------
  r2-embeddings:
    image: rclone/rclone:latest
    container_name: r2-embeddings
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
