name: litellm

# =============================================================================
# LITELLM - OpenAI-Compatible LLM Gateway
# =============================================================================
# Updated for the `centralise-data-plane` rewrite (2026-07-30):
# - The standalone `db` (postgres) container is removed. LiteLLM now uses
#   the centralised lakehouse-postgres (db=litellm).
# - All other env vars remain unchanged.
#
# USAGE:
#   Production:  docker compose -f compose.yaml -f sidecar.yaml up -d
#   Development: docker compose -f compose.yaml -f compose.dev.yaml -f sidecar.yaml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LITELLM GATEWAY
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    # Command: load the model registry from /app/config/config.yaml
    command:
      - "--config=/app/config/config.yaml"
      - "--host=0.0.0.0"
      - "--port=4000"
      - "--num_workers=4"
    ports:
      - "4000:4000" # Map the container port to the host
    volumes:
      - ./config:/app/config:ro
      - ../../stedding/huggingface:/stedding/huggingface:ro  # shared HF cache (read-only)
    environment:
      # Gateway
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set via Locket/Infisical}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-}
      # Database — CENTRALISED lakehouse-postgres (db=litellm)
      DATABASE_URL: postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@lakehouse-postgres:5432/litellm
      LITELLM_DATABASE_URL: postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@lakehouse-postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      # Cloud LLM providers
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      Z_AI_API_KEY: ${Z_AI_API_KEY}
      ZAI_API_KEY: ${ZAI_API_KEY}
      # OpenCode Go (per Go.md) — 3 parallel keys for slot rotation
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY}
      OPENCODE_GO_API_KEY_0: ${OPENCODE_GO_API_KEY_0:-}
      OPENCODE_GO_API_KEY_1: ${OPENCODE_GO_API_KEY_1:-}
      OPENCODE_GO_API_KEY_2: ${OPENCODE_GO_API_KEY_2:-}
      OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
      # HuggingFace
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_HOME: /stedding/huggingface
      HF_HUB_CACHE: /stedding/huggingface/hub
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      # Observability
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      LANCEDB_API_KEY: ${LANCEDB_API_KEY:-}
      # Feature flags
      USE_GEMINI_3: ${USE_GEMINI_3:-false}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      # Python (LiteLLM's telemetry path)
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:4000/health/liveliness\", timeout=3).status == 200 else 1)'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Cross-project deps are managed by Komodo's [stack.depends_on] in
    # deploy-litellm-bunchloch.toml — see the file header.
    depends_on: []
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    networks:
      - cianfhoghlaim
      - lakehouse

  # ---------------------------------------------------------------------------
  # (db service REMOVED 2026-07-30 — uses centralised lakehouse-postgres)
  # ---------------------------------------------------------------------------
  # The standalone litellm-db container was removed in the
  # centralise-data-plane rewrite. The litellm database now lives on
  # the shared lakehouse-postgres (db=litellm).
  # (Prometheus service removed in cleanup-and-boot-stacks change 2026-06-26;
  # container exited 2026-06-23 with no downstream consumer; no Grafana /
  # Alertmanager exists. Litellm's /metrics endpoint remains available for
  # future scraping by a real observability stack.)
  # ---------------------------------------------------------------------------

networks:
  cianfhoghlaim:
    driver: bridge
  lakehouse:
    name: lakehouse_lakehouse
    external: true

