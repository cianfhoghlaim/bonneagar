name: headscale
services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    ports: ["8443:8080","8080:9090"]
    command: ["serve"]
    environment:
      - HEADSCALE_SERVER_URL=https://hs.cianfhoghlaim.ie
      - HEADSCALE_DATABASE_TYPE=sqlite3
      - HEADSCALE_DATABASE_SQLITE_PATH=/data/headscale.db
    volumes:
      - headscale_data:/data
      - ./config:/etc/headscale:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 20s
    deploy:
      resources:
        limits: {memory: 1G, cpus: '2'}
    networks: [cianfhoghlaim]
volumes:
  headscale_data: {driver: local}
networks:
  cianfhoghlaim: {driver: bridge}
