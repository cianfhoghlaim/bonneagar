# =============================================================================
# PAPERLESS-NGX STACK
# =============================================================================
# Document management system with OCR
# =============================================================================

[[stack]]
name = "paperless"
description = "Document management system with OCR"
tags = ["host:bunchloch", "tier:productivity", "type:documents", "domain:docs.aleyum.com"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/paperless"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
PAPERLESS_DOMAIN=docs.aleyum.com
PAPERLESS_NAME=Paperless
PAPERLESS_PORT=8000
PAPERLESS_URL=https://docs.aleyum.com
TZ=Europe/Dublin
OP_CONNECT_HOST=${OP_CONNECT_HOST}
LOCKET_MODE=watch
"""
