# =============================================================================
# KAFKA CLUSTER - Self-Hosted Production Stack
# =============================================================================
# Apache Kafka + Kraft (no Zookeeper) + Schema Registry + Kafka UI
# Production deployment for Hetzner CAX41 (cax41-hetzner)
#
# This stack replaces Confluent Cloud ($400 credits) once exhausted.
# Kraft mode eliminates Zookeeper dependency for simpler operations.
#
# Services:
# - kafka: Kafka broker with Kraft consensus
# - schema-registry: Confluent Schema Registry for Avro schemas
# - kafka-ui: Web UI for topic management and monitoring
# - kafka-connect: Connectors for DuckDB, LanceDB, R2 sinks
#
# Resources: ~4GB RAM recommended for CAX41
# =============================================================================

name: kafka

services:
  # ---------------------------------------------------------------------------
  # KAFKA BROKER (Kraft Mode)
  # ---------------------------------------------------------------------------
  # Single-node Kafka with Kraft consensus (no Zookeeper)
  # ARM64-compatible bitnami image
  # ---------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    restart: unless-stopped
    environment:
      # Kraft mode configuration
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Listener configuration
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-kafka.cianfhoghlaim.ie}:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Performance tuning
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_MIN_INSYNC_REPLICAS: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"  # 7 days
      KAFKA_CFG_LOG_RETENTION_BYTES: "10737418240"  # 10GB
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Kraft cluster ID (generate once with: kafka-storage.sh random-uuid)
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}

      # JVM settings for CAX41 (8GB RAM)
      KAFKA_HEAP_OPTS: "-Xms1g -Xmx2g"
    volumes:
      - kafka-data:/bitnami/kafka
    ports:
      - "9092:9092"  # Internal
      - "9094:9094"  # External (Pangolin tunnel)
    networks:
      - kafka-network
      - default
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # SCHEMA REGISTRY
  # ---------------------------------------------------------------------------
  # Confluent Schema Registry for Avro schema management
  # Used by Dagster assets and Kafka Connect
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: "schema-registry"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"

      # JVM settings
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # KAFKA UI
  # ---------------------------------------------------------------------------
  # Web interface for topic management and message browsing
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "oideachas-production"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_METRICS_PORT: "9997"

      # Auth (optional - configure via Pangolin)
      AUTH_TYPE: "DISABLED"

      # Dynamic config
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - kafka-network
      - default
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # KAFKA CONNECT
  # ---------------------------------------------------------------------------
  # Connector framework for data integration
  # Includes: JDBC, S3, DuckDB connectors
  # ---------------------------------------------------------------------------
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.7.1
    container_name: kafka-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_PORT: "8083"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"

      # Group and offsets
      CONNECT_GROUP_ID: "oideachas-connect"
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"

      # Converters
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"

      # Schema Registry
      CONNECT_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"

      # Plugin path
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"

      # JVM settings
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - connect-plugins:/usr/share/confluent-hub-components
      - ./connectors:/etc/kafka-connect/connectors
    ports:
      - "8083:8083"
    networks:
      - kafka-network
    command:
      - bash
      - -c
      - |
        # Install additional connectors
        confluent-hub install --no-prompt confluentinc/kafka-connect-s3:latest || true
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest || true
        # Start Connect
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  kafka-data:
    name: kafka-data
  connect-plugins:
    name: kafka-connect-plugins

networks:
  kafka-network:
    name: kafka-network
    driver: bridge
  default:
    external: true
    name: pangolin-network
