# =============================================================================
# LITELLM GATEWAY CONFIG — Oideachais / Cianfhoghlaim
# =============================================================================
# Canonical model registry for the LiteLLM proxy.
#
# All routes fall back through a defined chain. The alias routes at the bottom
# (ocr, vision, document, extract, irish, math, image, embedding-*, whisper-*,
# translation) are what client code should use.
#
# Route topology (every URL is internal Docker DNS):
#   LiteLLM (:4000) ──┬── llama-swap (:8080)   [GGUF Q4_K_M, dynamic swap]
#                     ├── mlx-omni    (:10240) [MLX-format on M-series]
#                     ├── invokeai    (:9090)  [Z-Image-Turbo, SDXL]
#                     ├── docling-serve(:5001)  [PDF → Markdown tool call]
#                     └── Cloud        (Gemini, GLM, OpenAI, Anthropic, OpenCode Go)
#
# BAML clients (baml_src/clients.baml) target this URL via the "litellm" client.
# Per-phase-1 vault additions: master_key, salt_key, database_url live under
# dev-baile/litellm/* and are hydrated by Locket via sidecar.yaml.
#
# Vendor-de-risking for MiniMax-M3 (2026-06-24): the `minimax` alias is
# 3-key round-robin (OPENCODE_GO_API_KEY_0/1/2) with a 4-tier paid fallback
# (qwen3.7-max → kimi-k2.6 → glm-4.6) and a final local GGUF floor
# (qwen2.5-math via llama-swap). See minimax alias block + 3 slot entries
# below. Driven by openspec/changes/litellm-minimax-vendor-derisking/.
# =============================================================================

model_list:

  # =========================================================================
  # LOCAL MLX (via mlx-omni :10240)  — Apple Silicon fast path
  # =========================================================================

  - model_name: local/document/granite-docling
    litellm_params:
      model: openai/granite-docling
      api_base: http://mlx-omni:10240/v1
      api_key: not-needed
      timeout: 600   # 600s: Docling can be slow on dense PDFs
    model_info:
      description: "IBM Granite Docling 258M (MLX) — PDF→DocTags XML, table extraction"
      capabilities: ["document_layout", "table_extraction", "doc_tags"]
      tier: paid

  - model_name: local/ocr/olmocr-mlx
    litellm_params:
      model: openai/olmocr-2-7b-mlx
      api_base: http://mlx-omni:10240/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "olmOCR 2-7B (MLX 4-bit) — OCR specialist fine-tuned for SEC paper layouts"
      capabilities: ["ocr", "document_parsing", "text_extraction", "multi_column"]
      tier: paid

  - model_name: local/image/fibo
    litellm_params:
      model: openai/fibo
      api_base: http://mlx-omni:10240/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Bria FIBO (MLX) — JSON-config-driven image generation. Free for non-profit use."
      capabilities: ["image_generation", "text_to_image", "structured_json_input", "deterministic"]
      tier: paid
      notes: "Self-hosted via briaai/FIBO collection. JSON config in → PNG out."

  # =========================================================================
  # LOCAL GGUF (via llama-swap :8080)  — CPU/any-arch universal path
  # =========================================================================

  - model_name: local/vision/qwen25-vl
    litellm_params:
      model: openai/qwen2.5-vl-7b
      api_base: http://llama-swap:8080/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Qwen2.5-VL-7B-Instruct (GGUF Q4_K_M + mmproj f16) — multimodal VLM"
      capabilities: ["vision", "vlm", "image_understanding", "ocr_fallback"]
      tier: paid

  - model_name: local/vision/gemma3-vision
    litellm_params:
      model: openai/gemma-3-9b-vision
      api_base: http://llama-swap:8080/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Gemma 3 9B Vision (GGUF) — fallback VLM with sliding-window attention"
      capabilities: ["vision", "vlm"]
      tier: paid

  - model_name: local/ocr/deepseek-ocr
