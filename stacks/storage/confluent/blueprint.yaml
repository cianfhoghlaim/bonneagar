# =============================================================================
# CONFLUENT CLOUD - Pangolin Blueprint
# =============================================================================
# Routing for Kafka UI and optional local services.
#
# Note: Confluent Cloud is a managed service - no external routing needed
# for the Kafka cluster itself. This blueprint is for auxiliary services.
#
# LOADING:
#   Via Newt CLI:     newt --blueprint-file blueprint.yaml
#   Via directory:    Place in /opt/newt/blueprints/
#   Via sync script:  ./scripts/sync-blueprints.sh
# =============================================================================

public-resources:
  kafka-ui:
    name: "Kafka UI"
    full-domain: "kafka.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: "arm1-oci"
        hostname: "kafka-ui"
        method: "http"
        port: 8080
