# =============================================================================
# FORGEJO RUNNER HETZNER - CI/CD Runner on Hetzner
# =============================================================================
# Additional CI/CD runner for distributed workload.
# Auto-scales with Hetzner capacity.
# =============================================================================

name: forgejo-runner-hetzner

services:
  # ---------------------------------------------------------------------------
  # FORGEJO RUNNER - CI/CD Runner
  # ---------------------------------------------------------------------------
  runner:
    image: code.forgejo.org/forgejo/runner:9.0.3
    container_name: forgejo-runner-hetzner
    restart: unless-stopped
    environment:
      # Forgejo connection
      FORGEJO_URL: ${FORGEJO_URL:-https://git.cianfhoghlaim.ie}
      FORGEJO_RUNNER_NAME: ${FORGEJO_RUNNER_NAME:-hetzner-runner}
      FORGEJO_RUNNER_LABELS: ${FORGEJO_RUNNER_LABELS:-ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:runner-latest,hetzner-arm:docker://ghcr.io/catthehacker/ubuntu:arm64-latest}
      # Runner configuration
      FORGEJO_RUNNER_TOKEN: ${FORGEJO_RUNNER_TOKEN}
      FORGEJO_RUNNER_CAPACITY: ${FORGEJO_RUNNER_CAPACITY:-3}
      # Docker configuration
      DOCKER_HOST: tcp://docker:2376
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - forgejo-runner-hetzner-cache:/cache
    command: >
      sh -c "
      forgejo-runner register \
        --instance ${FORGEJO_URL} \
        --token ${FORGEJO_RUNNER_TOKEN} \
        --name ${FORGEJO_RUNNER_NAME} \
        --labels ${FORGEJO_RUNNER_LABELS} \
        --no-interactive && \
      forgejo-runner daemon
      "
    depends_on:
      - docker
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # DOCKER - Docker-in-Docker for Runner
  # ---------------------------------------------------------------------------
  docker:
    image: docker:dind
    container_name: forgejo-runner-hetzner-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_DRIVER: overlay2
      DOCKER_OPTS: >
        --log-driver=json-file
        --log-opt max-size=10m
        --log-opt max-file=3
    volumes:
      - forgejo-runner-hetzner-docker-certs:/certs
      - forgejo-runner-hetzner-data:/data
    networks:
      - pangolin

volumes:
  forgejo-runner-hetzner-cache:
  forgejo-runner-hetzner-docker-certs:
  forgejo-runner-hetzner-data:

networks:
  pangolin:
    external: true
