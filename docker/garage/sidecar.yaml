# =============================================================================
# GARAGE - Locket Sidecar Configuration
# =============================================================================

services:
  locket:
    image: ghcr.io/bpbradley/locket:latest
    container_name: garage-locket
    restart: unless-stopped
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      OP_CONNECT_HOST: ${OP_CONNECT_HOST:-http://132.145.27.89:8080}
    command:
      - "--provider=op-connect"
      - "--connect.host=${OP_CONNECT_HOST:-http://132.145.27.89:8080}"
      - "--connect.token-file=/run/secrets/op_token"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - op_token
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - garage-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - garage

  garage:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - garage-secrets:/run/secrets/locket:ro

secrets:
  op_token:
    file: ${OP_CONNECT_TOKEN_FILE:-../../op_token}

volumes:
  garage-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
