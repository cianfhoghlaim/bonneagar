# =============================================================================
# A2A Resources Blueprint - Agent-to-Agent Communication
# =============================================================================
# Defines routing for AgentOS instances exposing A2A and AG-UI interfaces.
#
# Architecture:
#   User → Pangolin → TinyAuth (SSO) → AgentOS
#   Agent → Pangolin → A2A Auth (JWT) → AgentOS
#
# USAGE:
#   Apply via Pangolin API:
#   curl -X POST https://pangolin.cianfhoghlaim.ie/api/v1/integration/blueprint \
#     -H "Authorization: Bearer $PANGOLIN_TOKEN" \
#     -d @a2a-resources.blueprint.yaml
#
# PREREQUISITES:
#   - AgentOS containers deployed on cax41-hetzner
#   - TinyAuth configured for SSO
#   - Service tokens configured in each AgentOS
# =============================================================================

public-resources:
  # ---------------------------------------------------------------------------
  # Oideachais AgentOS - Irish Education & Curriculum
  # ---------------------------------------------------------------------------
  # Agents: curriculum, research, translation, corpus, geospatial, statistics
  # Team: education-team
  # Port: 7772
  agents-oideachais:
    name: "Oideachais AgentOS"
    full-domain: "agents.oideachais.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: cax41-hetzner
        hostname: oideachais-agentos
        method: http
        port: 7772

  # ---------------------------------------------------------------------------
  # Crypteolas AgentOS - DeFi Protocol Analysis
  # ---------------------------------------------------------------------------
  # Agents: documentation, code_analysis, graph, analytics
  # Team: protocol-team
  # Port: 7771
  # Note: x402 payment middleware handles premium agent gating internally
  agents-crypteolas:
    name: "Crypteolas AgentOS"
    full-domain: "agents.crypteolas.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: cax41-hetzner
        hostname: crypteolas-agentos
        method: http
        port: 7771

  # ---------------------------------------------------------------------------
  # Browser AgentOS - Web Automation Orchestration
  # ---------------------------------------------------------------------------
  # Agents: stagehand (vision), crawl4ai (scraping), skyvern (RPA)
  # Team: browser-orchestrator
  # Port: 7773
  agents-browser:
    name: "Browser AgentOS"
    full-domain: "agents.browser.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: cax41-hetzner
        hostname: browser-agentos
        method: http
        port: 7773

  # ---------------------------------------------------------------------------
  # Aleyum AgentOS - Deep Research & Discovery
  # ---------------------------------------------------------------------------
  # Agents: web_researcher, analyst, integrator
  # Team: research-team
  # Port: 7774
  agents-aleyum:
    name: "Aleyum AgentOS"
    full-domain: "agents.aleyum.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: cax41-hetzner
        hostname: aleyum-agentos
        method: http
        port: 7774

  # ---------------------------------------------------------------------------
  # Internal A2A API Gateway (No SSO - Service Auth Only)
  # ---------------------------------------------------------------------------
  # Used for service-to-service A2A calls between flows
  # Auth handled by X-Service-Token header at application layer
  a2a-internal:
    name: "A2A Internal Gateway"
    full-domain: "a2a.internal.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: false
    targets:
      # Load balancer across all AgentOS instances
      - site: cax41-hetzner
        hostname: oideachais-agentos
        method: http
        port: 7772
      - site: cax41-hetzner
        hostname: crypteolas-agentos
        method: http
        port: 7771
      - site: cax41-hetzner
        hostname: browser-agentos
        method: http
        port: 7773
      - site: cax41-hetzner
        hostname: aleyum-agentos
        method: http
        port: 7774
