# Pangolin auto-discovery labels for Langfuse
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  langfuse-web:
    labels:
      - "pangolin.resource.name=Langfuse"
      - "pangolin.resource.domain=langfuse.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://langfuse-web:3000"
      - "pangolin.resource.middlewares=tinyauth"
