# =============================================================================
# Komodo Blueprint - MotherDuck Cloud DuckDB
# =============================================================================

name: motherduck
description: Cloud-hosted DuckDB for analytics workloads
server_tags:
  - analytics
  - saas

config:
  type: saas
  secrets_file: secrets.env

  # No compose - SaaS service accessed via connection string
  connection_string: "md:${MOTHERDUCK_DATABASE}"

  # Trial information
  trial:
    duration_days: 21
    storage_limit: 10GB
    upgrade_cost: $20/month

databases:
  - name: oideachas_education
    pipeline: sruth/oideachais
    purpose: Curriculum analytics
    tables:
      - curriculum.learning_outcomes
      - curriculum.subjects
      - curriculum.strands
      - exams.papers
      - exams.questions
      - metrics.rag_quality

  - name: crypteolas_defi
    pipeline: sruth/crypteolas
    purpose: DeFi protocol analytics
    tables:
      - protocols.tvl
      - tokens.prices
      - transactions.history

  - name: aleyum_market
    pipeline: sruth/aleyum
    purpose: Art market analytics
    tables:
      - artworks.metadata
      - sales.history
      - artists.profiles

integrations:
  - name: dlt
    config: |
      destination=dlt.destinations.motherduck(
        credentials="md:${MOTHERDUCK_DATABASE}"
      )

  - name: dagster
    config: |
      import duckdb
      con = duckdb.connect('md:${MOTHERDUCK_DATABASE}')

  - name: iceberg
    config: |
      CREATE TABLE t AS SELECT * FROM iceberg_scan('s3://iceberg/...')
