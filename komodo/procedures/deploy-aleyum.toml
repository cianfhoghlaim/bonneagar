# =============================================================================
# DEPLOY ALEYUM PROCEDURE
# =============================================================================
# Orchestrates deployment of aleyum-portal, aleyum-music, and 14 uirlisí
# tools to bunchloch. All services use Pangolin SSO for authentication.
# =============================================================================

[[procedure]]
name = "deploy-aleyum"
description = "Deploy aleyum portal, music pipeline, and uirlisí tools to bunchloch"

# Stage 1: Deploy core aleyum services (portal + music)
[[procedure.config.stages]]
name = "aleyum-core"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "aleyum-portal" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "aleyum-music" } }

# Stage 2: Deploy media servers
[[procedure.config.stages]]
name = "media-servers"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "audiobookshelf" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "drop" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "sunshine" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "romm" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "kapowarr" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "kavita" } }

# Stage 3: Deploy productivity tools
[[procedure.config.stages]]
name = "productivity"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "paperless" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "pinchflat" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "linkwarden" } }

# Stage 4: Deploy dev tools (from uirlisi-devtools)
[[procedure.config.stages]]
name = "devtools-dashboard"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "glance-bunchloch" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "excalidraw" } }

# Stage 5: Deploy search tools
[[procedure.config.stages]]
name = "search-tools"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "searxng-bunchloch" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "perplexica-bunchloch" } }

# Stage 6: Deploy remaining productivity tools
[[procedure.config.stages]]
name = "productivity-final"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "letterfeed-bunchloch" } }
