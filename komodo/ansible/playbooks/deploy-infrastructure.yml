---
# =============================================================================
# DEPLOY INFRASTRUCTURE PLAYBOOK
# =============================================================================
# Deploys the complete infrastructure stack to a remote server:
#   1. 1Password Connect (secrets backend)
#   2. Pangolin Core (reverse proxy, tunneling, auth)
#   3. Komodo Core (container orchestration)
#
# Usage:
#   ansible-playbook playbooks/deploy-infrastructure.yml -l infrastructure
#
# Prerequisites:
#   - 1Password credentials file on control machine
#   - 1Password Connect token on control machine
#   - Pangolin config directory on control machine
#
# =============================================================================

- name: Deploy Infrastructure Stack
  hosts: infrastructure
  become: true
  gather_facts: true

  vars:
    # Common paths on control machine
    secrets_base_path: "{{ playbook_dir }}/../../secrets"

  pre_tasks:
    - name: Validate target host
      ansible.builtin.debug:
        msg: "Deploying infrastructure to {{ inventory_hostname }}"

    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Ensure Docker is installed (if not present)
      ansible.builtin.package:
        name: docker.io
        state: present
      when:
        - ansible_os_family == "Debian"
        - docker_check.rc != 0

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      when: docker_check.rc == 0 or ansible_os_family == "Debian"

  roles:
    # -------------------------------------------------------------------------
    # 1. 1PASSWORD CONNECT - Secrets Backend
    # -------------------------------------------------------------------------
    - role: onepassword_connect
      tags:
        - onepassword
        - secrets

    # -------------------------------------------------------------------------
    # 2. PANGOLIN CORE - Reverse Proxy & Tunneling
    # -------------------------------------------------------------------------
    - role: pangolin_core
      tags:
        - pangolin
        - proxy
      when: deploy_pangolin | default(true) | bool

    # -------------------------------------------------------------------------
    # 3. KOMODO CORE - Container Orchestration
    # -------------------------------------------------------------------------
    - role: komodo_core
      tags:
        - komodo
        - orchestration
      when: deploy_komodo | default(true) | bool

  post_tasks:
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          =============================================================================
          INFRASTRUCTURE DEPLOYMENT COMPLETE
          =============================================================================
          Host: {{ inventory_hostname }}

          Services deployed:
            - 1Password Connect: http://127.0.0.1:{{ op_connect_api_port | default(8080) }}
            - Pangolin Core: {{ pangolin_dashboard_url | default('https://pangolin.' + pangolin_domain | default('example.com')) }}
            - Komodo Core: {{ komodo_host | default('https://komodo.example.com') }}

          Next steps:
            1. Configure DNS records for your domain
            2. Access Pangolin dashboard to create tunnels
            3. Access Komodo dashboard to manage containers
          =============================================================================
