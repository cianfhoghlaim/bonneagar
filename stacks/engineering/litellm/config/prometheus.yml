# Prometheus config for LiteLLM metrics scraping.
# The gateway exposes Prometheus-format metrics at /metrics on port 4000.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "litellm"
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]
        labels:
          stack: "engineering"
          service: "litellm"
          tier: "gateway"
