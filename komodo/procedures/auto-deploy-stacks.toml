KOMODO_BACKUP_SCHEDULE=0 2 * * *
# Periphery configuration
PERIPHERY_ROOT=/etc/komodo
# Locket secrets management
INFISICAL_URL=http://132.145.27.89:8080
LOCKET_MODE=watch
"""

