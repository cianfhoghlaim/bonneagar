# =============================================================================
# DEPLOY MACBOOK STACKS PROCEDURE
# =============================================================================
# Deploys all stacks assigned to MacBook M4 Max (bunchloch).
# =============================================================================

[[procedure]]
name = "deploy-macbook"
description = "Deploy all stacks on MacBook M4 Max"

# Stage 1: Lakehouse Stack
[[procedure.config.stages]]
name = "lakehouse"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "lakefs" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "lakekeeper" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "olake-ui" } }

# Stage 2: Real-time Backend
[[procedure.config.stages]]
name = "backend"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "convex" } }

# Stage 3: Scraping Stack
[[procedure.config.stages]]
name = "scraping"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "scraping" } }

# Stage 4: Cleanup
[[procedure.config.stages]]
name = "cleanup"

[[procedure.config.stages.executions]]
execution = { type = "PruneContainers", params = { server = "bunchloch" } }
