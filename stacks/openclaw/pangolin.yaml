# =============================================================================
# OPENCLAW — Pangolin Traefik Routing
# =============================================================================
# Routes openclaw.cianfhoghlaim.ie to the openclaw container at gateway
# port 18789 (WebSocket RPC). TinyAuth enforces Pocket ID OIDC at the
# Traefik layer; openclaw's own dmPolicy=pairing enforces a 2nd layer at
# the gateway. The Teams bridge (3978) and the bridge port (18790) are
# bound to 127.0.0.1 in compose.yaml and are NOT routed here.
#
# Middlewares (canonical Cianfhoghlaim):
#   tinyauth        — Pocket ID OIDC SSO (from the pangolin stack)
#   secure-headers  — HSTS + X-Frame-Options etc. (from the pangolin stack)
# =============================================================================

http:
  routers:
    openclaw-gateway:
      entryPoints:
        - https
      rule: "Host(`openclaw.cianfhoghlaim.ie`)"
      service: openclaw
      tls:
        certResolver: letsencrypt
      middlewares:
        - tinyauth
        - secure-headers
      priority: 100

  services:
    openclaw:
      loadBalancer:
        servers:
          - url: "http://openclaw:18789"
        healthCheck:
          path: /api/health
          interval: 30s
          timeout: 3s