# =============================================================================
# DROP STACK
# =============================================================================
# Personal gaming library and collection manager
# =============================================================================

[[stack]]
name = "drop"
description = "Gaming database and collection manager"
tags = ["host:bunchloch", "tier:media", "type:gaming", "domain:drop.aleyum.com"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/drop"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
DROP_DOMAIN=drop.aleyum.com
DROP_NAME=Drop
DROP_PORT=3000
TZ=Europe/Dublin
OP_CONNECT_HOST=${OP_CONNECT_HOST}
LOCKET_MODE=watch
"""
