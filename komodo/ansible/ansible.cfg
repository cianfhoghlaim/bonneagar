# =============================================================================
# ANSIBLE CONFIGURATION
# =============================================================================
# Local configuration for the automation ansible environment.
# This file is automatically loaded when running ansible from this directory.
# =============================================================================

[defaults]
# Path to local roles directory (use absolute path for container compatibility)
roles_path = /ansible/roles

# Inventory path (can be overridden with -i)
inventory = /ansible/inventory

# Disable host key checking for automation (enable in production)
host_key_checking = False

# Retry files location
retry_files_save_path = /tmp

# Output formatting
stdout_callback = default
# callback_whitelist = profile_tasks

# Fact caching (optional - speeds up repeated runs)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# Parallelism
forks = 10

# SSH settings
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Privilege escalation
[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
