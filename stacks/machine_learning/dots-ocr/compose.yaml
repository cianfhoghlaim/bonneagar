name: dots-ocr
services:
  dots-ocr:
    image: dots-ocr/dots-ocr:latest
    container_name: dots-ocr
    restart: unless-stopped
    ports: ["8001:8001"]
    environment:
      - DOTS_OCR_API_KEY=${DOTS_OCR_API_KEY:-not-needed}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 8G, cpus: '4'}
    networks: [cianfhoghlaim, lakehouse]
networks:
  cianfhoghlaim: {driver: bridge}
  lakehouse: {name: lakehouse_lakehouse, external: true}
