---
# =============================================================================
# KOMODO PERIPHERY DEPLOYMENT PLAYBOOK
# =============================================================================
# Deploys Komodo Periphery with optional Locket secrets management.
#
# Usage:
#   ansible-playbook -i inventory/komodo.yml playbooks/periphery.yml
#
# With locket enabled:
#   ansible-playbook -i inventory/komodo.yml playbooks/periphery.yml \
#     -e locket_enabled=true
#
# Dry run:
#   ansible-playbook -i inventory/komodo.yml playbooks/periphery.yml --check
# =============================================================================

- name: Deploy Komodo Periphery with Locket Secrets Management
  hosts: komodo
  become: true

  # ---------------------------------------------------------------------------
  # PRE-TASKS: Validation and setup
  # ---------------------------------------------------------------------------
  pre_tasks:
    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset:
          - hardware
          - network
          - user

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - periphery_core_address is defined
          - periphery_core_address | length > 0
        fail_msg: "periphery_core_address must be defined for outbound mode"
      when: periphery_mode | default('outbound') == 'outbound'

    - name: Verify 1Password Connect is reachable
      ansible.builtin.uri:
        url: "{{ locket_op_connect_host }}/heartbeat"
        method: GET
        status_code: [200, 503]
        timeout: 10
      delegate_to: localhost
      become: false
      run_once: true
      register: op_connect_check
      failed_when: false
      when:
        - locket_enabled | default(false)
        - locket_op_connect_host | default('') | length > 0

    - name: Warn if 1Password Connect is unreachable
      ansible.builtin.debug:
        msg: "WARNING: 1Password Connect at {{ locket_op_connect_host }} is not reachable. Locket may fail to inject secrets."
      when:
        - locket_enabled | default(false)
        - op_connect_check is defined
        - op_connect_check.status is not defined or op_connect_check.status != 200

  # ---------------------------------------------------------------------------
  # ROLES: Main deployment
  # ---------------------------------------------------------------------------
  roles:
    # Install Komodo Periphery
    - role: komodo_periphery

    # Install Locket (if enabled)
    - role: locket
      when: locket_enabled | default(false)

  # ---------------------------------------------------------------------------
  # POST-TASKS: Verification and cleanup
  # ---------------------------------------------------------------------------
  post_tasks:
    - name: Verify Periphery is running
      ansible.builtin.command: systemctl is-active periphery
      register: periphery_status
      changed_when: false
      failed_when: periphery_status.rc != 0

    - name: Get Periphery version
      ansible.builtin.command: "{{ periphery_binary_path | default('/usr/local/bin/periphery') }} --version"
      register: periphery_version_output
      changed_when: false

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ====================================
          DEPLOYMENT SUMMARY: {{ inventory_hostname }}
          ====================================
          Periphery: {{ periphery_version_output.stdout }}
          Status: {{ periphery_status.stdout }}
          Mode: {{ periphery_mode | default('outbound') }}
          Core: {{ periphery_core_address | default('not set') }}
          Locket: {{ 'enabled' if locket_enabled | default(false) else 'disabled' }}
          {% if locket_enabled | default(false) %}
          Locket Provider: {{ locket_provider | default('op-connect') }}
          {% endif %}
          ====================================

    - name: Pause after run (for log capture)
      ansible.builtin.pause:
        seconds: "{{ pause_after_seconds | default(10) }}"
      run_once: true
      delegate_to: localhost
      become: false
      when: pause_after | default(false) | bool
