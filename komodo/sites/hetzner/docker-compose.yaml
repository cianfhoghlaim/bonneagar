# =============================================================================
# HETZNER CAX41 - Site Infrastructure
# =============================================================================
# Runs on Hetzner CAX41 ARM server for production workloads
# Includes: Komodo Periphery + Pangolin Newt
# =============================================================================

name: hetzner-site

services:
  # ---------------------------------------------------------------------------
  # NEWT - Pangolin Tunnel Agent
  # ---------------------------------------------------------------------------
  newt:
    image: fosrl/newt:latest
    container_name: hetzner-newt
    restart: unless-stopped
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-https://pangolin.cianfhoghlaim.ie}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pangolin
    labels:
      - "komodo.skip=true"

  # ---------------------------------------------------------------------------
  # PERIPHERY - Komodo Agent
  # ---------------------------------------------------------------------------
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:2-dev
    container_name: hetzner-periphery
    init: true
    restart: unless-stopped
    environment:
      PERIPHERY_CORE_ADDRESS: ${PERIPHERY_CORE_ADDRESS:-wss://komodo.cianfhoghlaim.ie}
      PERIPHERY_CONNECT_AS: hetzner-cax41
      PERIPHERY_ONBOARDING_KEY: ${PERIPHERY_ONBOARDING_KEY:-O_zezroMFAHFBNk5RkbB3OX3wZvwDK_O}
      PERIPHERY_PASSKEYS: ${PERIPHERY_PASSKEYS:-feidhm_ama_is_ea_an_saol}
      PERIPHERY_ROOT_DIRECTORY: /etc/komodo
      PERIPHERY_DISABLE_TERMINALS: "false"
      PERIPHERY_DISABLE_CONTAINER_EXEC: "false"
    volumes:
      - periphery-keys:/config/keys
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo
    networks:
      - pangolin
    labels:
      - "komodo.skip=true"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  periphery-keys:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  pangolin:
    driver: bridge
