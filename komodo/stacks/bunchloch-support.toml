# =============================================================================
# BUNCHLOCH SUPPORT STACKS — litellm, lancedb, langfuse
# =============================================================================
# Deployed on bunchloch (MacBook M4 Max) per session decision.
# These are prerequisites for the oideachais deploy procedure.
# =============================================================================

# -----------------------------------------------------------------------------
# LITELLM — LLM gateway (4000)
# -----------------------------------------------------------------------------
[[stack]]
name = "litellm-bunchloch"
description = "LiteLLM gateway — OpenAI-compatible proxy to Gemini / Anthropic / OpenAI / OpenCode Go / Z.AI. Required for oideachais api/dagster/frontend LLM calls."
tags = [
  "host:bunchloch",
  "tier:development",
  "type:gateway",
  "stack:litellm",
]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/litellm"
file_paths = [
  "infrastructure/stacks/litellm/compose.yaml",
  "infrastructure/stacks/litellm/sidecar.yaml",
  "infrastructure/stacks/litellm/secrets.env",
]
environment = """
LITELLM_PORT=4000
LITELLM_MASTER_KEY=sk-1234
"""

[stack.config.repo]
server_id = "arm1-oci"
git_account = "cianfhoghlaim"
repo = "kings_college_galway"
branch = "main"

