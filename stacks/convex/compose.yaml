# =============================================================================
# CONVEX - Self-Hosted Backend Platform
# =============================================================================
# Reactive backend-as-a-service with real-time sync and serverless functions.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: convex

services:
  # ---------------------------------------------------------------------------
  # CONVEX BACKEND - Core Server
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: convex-backend
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${CONVEX_PORT:-3210}:3210"
      - "${CONVEX_SITE_PORT:-3211}:3211"
    environment:
      # Core configuration
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME:-convex}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET:-dev-secret-change-in-production}
      # Database configuration (optional)
      DATABASE_URL: ${CONVEX_DATABASE_URL:-}
      POSTGRES_URL: ${CONVEX_POSTGRES_URL:-}
      MYSQL_URL: ${CONVEX_MYSQL_URL:-}
      # S3 storage configuration (optional)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-auto}
      S3_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      S3_STORAGE_FILES_BUCKET: ${S3_STORAGE_FILES_BUCKET:-}
      S3_STORAGE_MODULES_BUCKET: ${S3_STORAGE_MODULES_BUCKET:-}
      S3_STORAGE_SEARCH_BUCKET: ${S3_STORAGE_SEARCH_BUCKET:-}
      S3_STORAGE_EXPORTS_BUCKET: ${S3_STORAGE_EXPORTS_BUCKET:-}
      S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET: ${S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
      # Operational settings
      DOCUMENT_RETENTION_DELAY: ${DOCUMENT_RETENTION_DELAY:-172800}
      ACTIONS_USER_TIMEOUT_SECS: ${ACTIONS_USER_TIMEOUT_SECS:-}
      RUST_LOG: ${RUST_LOG:-info}
      DISABLE_BEACON: ${DISABLE_BEACON:-}
    volumes:
      - convex-data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - convex

  # ---------------------------------------------------------------------------
  # CONVEX DASHBOARD - Web UI
  # ---------------------------------------------------------------------------
  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: convex-dashboard
    restart: unless-stopped
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${CONVEX_DASHBOARD_PORT:-6791}:6791"
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_DEPLOYMENT_URL:-http://127.0.0.1:3210}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - convex

volumes:
  convex-data:

networks:
  convex:
    driver: bridge
