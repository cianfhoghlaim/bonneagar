---
# =============================================================================
# KOMODO CORE ROLE - MAIN TASKS
# =============================================================================

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - komodo_host | length > 0
      - komodo_op_vault | length > 0
    fail_msg: "komodo_host and komodo_op_vault must be set"

# -----------------------------------------------------------------------------
# FETCH SECRETS FROM 1PASSWORD CONNECT
# -----------------------------------------------------------------------------

- name: Read op_token from Pangolin secrets
  ansible.builtin.slurp:
    src: /opt/pangolin/config/secrets/op_token
  register: _op_token_content

- name: Set op_token fact
  ansible.builtin.set_fact:
    _op_token: "{{ _op_token_content.content | b64decode | trim }}"

- name: Get 1Password vault ID
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/v1/vaults"
    method: GET
    headers:
      Authorization: "Bearer {{ _op_token }}"
    return_content: true
  register: _op_vaults

- name: Find vault ID for configured vault
  ansible.builtin.set_fact:
    _op_vault_id: "{{ (_op_vaults.json | selectattr('name', 'eq', komodo_op_vault) | first).id }}"

- name: Get items in vault
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/v1/vaults/{{ _op_vault_id }}/items"
    method: GET
    headers:
      Authorization: "Bearer {{ _op_token }}"
    return_content: true
  register: _op_items

- name: Find komodo item ID
  ansible.builtin.set_fact:
    _op_item_id: "{{ (_op_items.json | selectattr('title', 'eq', komodo_op_item) | first).id }}"

- name: Get komodo item details
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/v1/vaults/{{ _op_vault_id }}/items/{{ _op_item_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _op_token }}"
    return_content: true
  register: _op_komodo_item

- name: Extract secrets from 1Password
  ansible.builtin.set_fact:
    komodo_database_username: "{{ (_op_komodo_item.json.fields | selectattr('label', 'eq', 'database_username') | first).value }}"
    komodo_database_password: "{{ (_op_komodo_item.json.fields | selectattr('label', 'eq', 'database_password') | first).value }}"
    komodo_passkey: "{{ (_op_komodo_item.json.fields | selectattr('label', 'eq', 'passkey') | first).value }}"
    komodo_init_admin_username: "{{ (_op_komodo_item.json.fields | selectattr('label', 'eq', 'init_username') | first).value }}"
    komodo_init_admin_password: "{{ (_op_komodo_item.json.fields | selectattr('label', 'eq', 'init_password') | first).value }}"

# -----------------------------------------------------------------------------
# CREATE DIRECTORIES
# -----------------------------------------------------------------------------

- name: Create Komodo base directory
  ansible.builtin.file:
    path: "{{ komodo_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Komodo subdirectories
  ansible.builtin.file:
    path: "{{ komodo_base_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - backups
    - syncs

- name: Create Periphery root directory
  ansible.builtin.file:
    path: "{{ komodo_periphery_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# -----------------------------------------------------------------------------
# DEPLOY CONFIGURATION FILES
# -----------------------------------------------------------------------------

- name: Deploy compose.env
  ansible.builtin.template:
    src: compose.env.j2
    dest: "{{ komodo_base_dir }}/compose.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart Komodo

- name: Deploy docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ komodo_base_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Komodo

# -----------------------------------------------------------------------------
# START STACK
# -----------------------------------------------------------------------------

- name: Start Komodo stack
  community.docker.docker_compose_v2:
    project_src: "{{ komodo_base_dir }}"
    state: present
    pull: always
  register: _komodo_compose

- name: Display compose output
  ansible.builtin.debug:
    var: _komodo_compose
    verbosity: 1

# -----------------------------------------------------------------------------
# HEALTH CHECK
# -----------------------------------------------------------------------------

- name: Wait for Komodo Core to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_core_port }}/"
    method: GET
    status_code: 200
  register: _komodo_health
  until: _komodo_health.status == 200
  retries: "{{ (komodo_health_timeout / komodo_health_interval) | int }}"
  delay: "{{ komodo_health_interval }}"
  when: komodo_wait_healthy

- name: Display Komodo health status
  ansible.builtin.debug:
    msg: "Komodo Core is healthy at {{ komodo_host }}"
  when: komodo_wait_healthy
