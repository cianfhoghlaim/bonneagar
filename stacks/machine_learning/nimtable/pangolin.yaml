# Pangolin auto-discovery labels for Nimtable
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  nimtable:
    labels:
      - "pangolin.private-resources.nimtable.name=Nimtable"
      - "pangolin.private-resources.nimtable.mode=http"
      - "pangolin.private-resources.nimtable.destination=nimtable:3000"
      - "pangolin.private-resources.nimtable.protocol=http"
      - "pangolin.private-resources.nimtable.roles[0]=Member"
      - "pangolin.private-resources.nimtable.full-domain=nimtable.cianfhoghlaim.ie"