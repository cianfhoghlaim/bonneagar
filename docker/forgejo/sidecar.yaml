# =============================================================================
# FORGEJO - Locket Sidecar Configuration
# =============================================================================
# Extends compose.yaml with Locket for secrets management

services:
  # ---------------------------------------------------------------------------
  # LOCKET - Secrets Management Sidecar
  # ---------------------------------------------------------------------------
  locket:
    image: ghcr.io/bpbradley/locket:latest
    container_name: forgejo-locket
    restart: unless-stopped
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    environment:
      OP_CONNECT_HOST: ${OP_CONNECT_HOST:-http://132.145.27.89:8080}
    command:
      - "--provider=op-connect"
      - "--connect.host=${OP_CONNECT_HOST:-http://132.145.27.89:8080}"
      - "--connect.token-file=/run/secrets/op_token"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - op_token
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - forgejo-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - forgejo_network

  # Override main services to depend on locket
  forgejo:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - forgejo-secrets:/run/secrets/locket:ro

  forgejo_db:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - forgejo-secrets:/run/secrets/locket:ro

# =============================================================================
# SECRETS
# =============================================================================
secrets:
  op_token:
    file: ${OP_CONNECT_TOKEN_FILE:-../../op_token}

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  forgejo-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
