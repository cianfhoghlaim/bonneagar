# =============================================================================
# GRAPHITI - Temporal Knowledge Graph (FalkorDB backend)
# =============================================================================
# Updated for the `centralise-data-plane` rewrite (2026-07-30):
# - The Neo4j backend profile was REMOVED. No Neo4j stack exists in KCG
#   and the previous `graph` + `neo4j` service combo was broken (no
#   container actually deployed Neo4j).
# - Graphiti now uses the SHARED `falkordb` stack (which lives in its
#   own `bonneagar/stacks/falkordb/` directory) as its sole graph backend.
# - Service renamed from `graph` to `graphiti` so the Docker service name
#   matches the stack name.
# - Stack dependency: graphiti-bunchloch MUST come up after
#   falkordb-bunchloch (the upstream stack).
#
# USAGE:
#   docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # GRAPHITI - bi-temporal knowledge graph API
  # ---------------------------------------------------------------------------
  graphiti:
    build:
      context: .
    image: graphiti:local
    container_name: graphiti
    restart: unless-stopped
    ports:
      - "${GRAPHITI_PORT:-8000}:8000"
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      # FalkorDB backend (shared with the falkordb stack)
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      FALKORDB_DATABASE: ${FALKORDB_GRAPHITI_DB:-default_db}
      FALKORDB_PASSWORD: ${FALKORDB_PASSWORD:?must be set}
      GRAPHITI_BACKEND: falkordb
      PORT: 8000
      db_backend: falkordb
      # LLM API key for entity extraction (the LLM provider is the
      # canonical Bolmo / Molmo2 / Qwen3-VL via LiteLLM).
      OPENAI_API_KEY: ${OPENAI_API_KEY:?must be set}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - falkordb
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # FALKORDB - shared with the falkordb stack
  # ---------------------------------------------------------------------------
  # When this stack is deployed standalone (Komodo single-stack deploy),
  # graphiti brings up its own falkordb container via an external reference
  # to the network. When deployed as part of the cluster, the `external`
  # flag is set to true and we share the cluster's falkordb.
  # For Komodo: this stack has `deploy-falkordb-bunchloch` as a stack
  # dependency (see bonneagar/komodo/procedures/deploy-graphiti-bunchloch.toml).
  # ---------------------------------------------------------------------------
  falkordb:
    image: falkordb/falkordb:latest
    container_name: graphiti-falkordb-local
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - falkordb_graphiti_data:/data
    environment:
      - FALKORDB_ARGS=--port 6379 --cluster-enabled no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - falkordb

volumes:
  falkordb_graphiti_data:

networks:
  falkordb:
    driver: bridge
  cianfhoghlaim:
    external: true
