# =============================================================================
# MLFLOW - ML Experiment Tracking and Model Registry
# =============================================================================
# Updated for the `centralise-data-plane` rewrite (2026-07-30):
# - The standalone `postgres` (postgres:16-alpine) container is removed.
#   MLflow now uses the centralised lakehouse-postgres (db=mlflow).
# - The standalone `minio` + `minio-init` containers are removed.
#   MLflow now uses the centralised lakehouse-garage
#   (bucket=mlflow-artifacts, auto-created by the lakehouse `garage-init`).
# - The custom image bakes psycopg2-binary + boto3 so the cold-start
#   install no longer delays the server boot.
#
# USAGE:
#   Production:  docker compose -f compose.yaml -f sidecar.yaml up -d
#   Development: docker compose -f compose.yaml -f sidecar.yaml up -d
#                 (relies on .env for local secrets — see .env.example)
# =============================================================================

name: mlflow

services:
  # ---------------------------------------------------------------------------
  # MLFLOW - Tracking Server (centralised data plane)
  # ---------------------------------------------------------------------------
  # Custom build wraps upstream ghcr.io/mlflow/mlflow with psycopg2-binary
  # + boto3 baked in, eliminating the 30s pip-install on first boot.
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: ghcr.io/cianfhoghlaim/mlflow:v2.19.0
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      # Centralised lakehouse-postgres (db=mlflow)
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@lakehouse-postgres:5432/mlflow
      # Centralised lakehouse-garage (bucket=mlflow-artifacts)
      MLFLOW_S3_ENDPOINT_URL: http://lakehouse-garage:3900
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://mlflow-artifacts/
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID:?must be set}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY:?must be set}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-garage}
      MLFLOW_S3_IGNORE_TLS: "true"
    command:
      - mlflow
      - server
      - --backend-store-uri
      - "$${MLFLOW_BACKEND_STORE_URI}"
      - --default-artifact-root
      - "$${MLFLOW_DEFAULT_ARTIFACT_ROOT}"
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
    # Cross-project deps are managed by Komodo's [stack.depends_on] in
    # deploy-mlflow-bunchloch.toml — see the file header.
    depends_on: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - mlflow
      - lakehouse

  # ---------------------------------------------------------------------------
  # (postgres + minio + minio-init REMOVED 2026-07-30 — uses centralised
  # lakehouse-postgres + lakehouse-garage. The `mlflow` database and the
  # `mlflow-artifacts` bucket are auto-created by the lakehouse stack's
  # init-db.sql and garage-init respectively.)
  # ---------------------------------------------------------------------------

networks:
  mlflow:
    driver: bridge
  lakehouse:
    name: lakehouse_lakehouse
    external: true
