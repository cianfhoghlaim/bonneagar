public-resources:
  # ---------------------------------------------------------------------------
  # Garage S3 API (Virtual-Host Style) - Stays public for programmatic access
  # ---------------------------------------------------------------------------
  lakehouse-s3:
    name: "Lakehouse S3 API"
    full-domain: "s3.lakehouse.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "bunchloch"
        hostname: "lakehouse-garage"
        method: "http"
        port: 3900

  lakehouse-s3-iceberg:
    name: "Lakehouse Iceberg Bucket"
    full-domain: "iceberg.s3.lakehouse.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "bunchloch"
        hostname: "lakehouse-garage"
        method: "http"
        port: 3900

  lakehouse-s3-lance:
    name: "Lakehouse Lance Bucket"
    full-domain: "lance.s3.lakehouse.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "bunchloch"
        hostname: "lakehouse-garage"
        method: "http"
        port: 3900

  lakehouse-s3-ducklake:
    name: "Lakehouse DuckLake Bucket"
    full-domain: "ducklake.s3.lakehouse.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "bunchloch"
        hostname: "lakehouse-garage"
        method: "http"
        port: 3900

private-resources:
  lakehouse-admin:
    name: "Lakehouse Admin"
    mode: "http"
    destination-port: 3903
    full-domain: "lakehouse-admin.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "lakehouse-admin"

  lakekeeper:
    name: "Lakekeeper REST Catalog"
    mode: "http"
    destination-port: 8181
    full-domain: "lakekeeper.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "lakekeeper"

  lance-api:
    name: "Lance Namespace API"
    mode: "http"
    destination-port: 8182
    full-domain: "lance-api.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "lance-api"

  # ---------------------------------------------------------------------------
  # Nimtable Iceberg Catalog UI (extend-lakehouse-with-nimtable-olake-lancedb)
  # ---------------------------------------------------------------------------
  nimtable:
    name: "Nimtable Iceberg Catalog UI"
    mode: "http"
    destination-port: 3018
    full-domain: "nimtable.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "nimtable"

  # ---------------------------------------------------------------------------
  # Olake CDC Engine (extend-lakehouse-with-nimtable-olake-lancedb)
  # ---------------------------------------------------------------------------
  olake:
    name: "Olake CDC Engine Admin"
    mode: "http"
    destination-port: 8080
    full-domain: "olake.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "olake"

  # ---------------------------------------------------------------------------
  # LanceDB Table Viewer (extend-lakehouse-with-nimtable-olake-lancedb)
  # ---------------------------------------------------------------------------
  lancedb-viewer:
    name: "LanceDB Table Viewer"
    mode: "http"
    destination-port: 8081
    full-domain: "lance-viewer.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "lancedb-viewer"

