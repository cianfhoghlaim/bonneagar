---
# =============================================================================
# 1PASSWORD CONNECT ROLE - MAIN TASKS
# =============================================================================

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - op_credentials_src | length > 0
      - op_token_src | length > 0
    fail_msg: "op_credentials_src and op_token_src must be set"

- name: Check credentials file exists on control machine
  ansible.builtin.stat:
    path: "{{ op_credentials_src }}"
  delegate_to: localhost
  become: false
  register: _op_credentials_stat

- name: Fail if credentials file not found
  ansible.builtin.fail:
    msg: "1Password credentials file not found: {{ op_credentials_src }}"
  when: not _op_credentials_stat.stat.exists

- name: Check token file exists on control machine
  ansible.builtin.stat:
    path: "{{ op_token_src }}"
  delegate_to: localhost
  become: false
  register: _op_token_stat

- name: Fail if token file not found
  ansible.builtin.fail:
    msg: "1Password token file not found: {{ op_token_src }}"
  when: not _op_token_stat.stat.exists

# -----------------------------------------------------------------------------
# CREATE DIRECTORIES
# -----------------------------------------------------------------------------

- name: Create 1Password Connect directory
  ansible.builtin.file:
    path: "{{ op_connect_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create data directory (for sync state)
  ansible.builtin.file:
    path: "{{ op_connect_base_dir }}/data"
    state: directory
    owner: "999"
    group: "999"
    mode: "0700"

# -----------------------------------------------------------------------------
# COPY FILES
# -----------------------------------------------------------------------------

- name: Copy 1Password credentials file
  ansible.builtin.copy:
    src: "{{ op_credentials_src }}"
    dest: "{{ op_connect_base_dir }}/1password-credentials.json"
    # 1Password Connect runs as opuser (UID 999)
    owner: "999"
    group: "999"
    mode: "0400"
  notify: Restart 1Password Connect

- name: Copy 1Password token file
  ansible.builtin.copy:
    src: "{{ op_token_src }}"
    dest: "{{ op_connect_base_dir }}/op_token"
    owner: root
    group: root
    mode: "0644"

- name: Deploy docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ op_connect_base_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart 1Password Connect

# -----------------------------------------------------------------------------
# DEPLOY STACK
# -----------------------------------------------------------------------------

- name: Start 1Password Connect stack
  community.docker.docker_compose_v2:
    project_src: "{{ op_connect_base_dir }}"
    state: present
    pull: always
  register: _op_connect_compose

- name: Display compose output
  ansible.builtin.debug:
    var: _op_connect_compose
    verbosity: 1

# -----------------------------------------------------------------------------
# HEALTH CHECK
# -----------------------------------------------------------------------------

- name: Wait for 1Password Connect to be healthy
  ansible.builtin.uri:
    url: "http://{{ op_connect_bind_address }}:{{ op_connect_api_port }}/health"
    method: GET
    status_code: 200
  register: _op_health
  until: _op_health.status == 200
  retries: "{{ (op_connect_health_timeout / op_connect_health_interval) | int }}"
  delay: "{{ op_connect_health_interval }}"
  when: op_connect_wait_healthy

- name: Display 1Password Connect health status
  ansible.builtin.debug:
    msg: "1Password Connect is healthy at http://{{ op_connect_bind_address }}:{{ op_connect_api_port }}"
  when: op_connect_wait_healthy
