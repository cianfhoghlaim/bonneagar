# =============================================================================
# CLOUDFLARE R2 STORAGE STACKS
# =============================================================================
# FUSE mounts for Cloudflare R2 buckets via rclone
# Provides POSIX filesystem interface to cloud object storage
# =============================================================================

# -----------------------------------------------------------------------------
# R2-MOUNTS - OCI Production
# -----------------------------------------------------------------------------
# 4 rclone FUSE containers mounting R2 buckets:
# - curriculum-data: Raw curriculum documents (PDFs, images)
# - embeddings: LanceDB vector table data
# - iceberg: Iceberg table metadata and parquet files
# - exports: Dagster asset export outputs
# -----------------------------------------------------------------------------
[[stack]]
name = "r2-mounts"
description = "Cloudflare R2 FUSE mounts for curriculum data"
tags = ["host:arm1-oci", "tier:storage", "type:object-storage", "provider:cloudflare"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/r2"
file_paths = ["compose.yaml"]
environment = """
# Mount base directory
R2_MOUNT_BASE=/mnt/r2
# VFS cache settings (per-bucket)
R2_CURRICULUM_CACHE=2G
R2_EMBEDDINGS_CACHE=5G
R2_ICEBERG_CACHE=2G
R2_EXPORTS_CACHE=1G
"""

# -----------------------------------------------------------------------------
# R2-MOUNTS-MACBOOK - Development/Heavy Analytics
# -----------------------------------------------------------------------------
# Same R2 buckets mounted on MacBook for local development
# Higher cache sizes for faster iteration
# -----------------------------------------------------------------------------
[[stack]]
name = "r2-mounts-macbook"
description = "Cloudflare R2 FUSE mounts for development"
tags = ["host:bunchloch", "tier:storage", "type:object-storage", "provider:cloudflare", "environment:development"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/r2"
file_paths = ["compose.yaml"]
environment = """
R2_MOUNT_BASE=/mnt/r2
# Larger caches for development workloads
R2_CURRICULUM_CACHE=5G
R2_EMBEDDINGS_CACHE=10G
R2_ICEBERG_CACHE=5G
R2_EXPORTS_CACHE=2G
"""
