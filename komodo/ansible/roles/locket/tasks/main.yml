---
# =============================================================================
# LOCKET ROLE - Main Tasks
# =============================================================================

- name: Skip locket installation if disabled
  ansible.builtin.debug:
    msg: "Locket installation is disabled (locket_enabled=false)"
  when: not (locket_enabled | default(true))

- name: Install and configure locket
  when: locket_enabled | default(true)
  block:
    - name: Include binary installation tasks
      ansible.builtin.include_tasks: install_binary.yml

    - name: Include CLI plugin installation tasks
      ansible.builtin.include_tasks: install_cli_plugin.yml
      when: locket_install_cli_plugin | default(true)

    - name: Include provider configuration tasks
      ansible.builtin.include_tasks: "configure_{{ locket_provider }}.yml"
      when: locket_provider is defined

    - name: Include environment file deployment
      ansible.builtin.include_tasks: deploy_env_file.yml
      when: locket_deploy_env_file | default(true)
