---
# =============================================================================
# PANGOLIN CORE ROLE - MAIN TASKS
# =============================================================================

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - pangolin_config_src | length > 0
      - pangolin_domain | length > 0
    fail_msg: "pangolin_config_src, and pangolin_domain must be set"

- name: Check config directory exists on control machine
  ansible.builtin.stat:
    path: "{{ pangolin_config_src }}"
  delegate_to: localhost
  become: false
  register: _pangolin_config_stat

- name: Fail if config directory not found
  ansible.builtin.fail:
    msg: "Pangolin config directory not found: {{ pangolin_config_src }}"
  when: not _pangolin_config_stat.stat.exists

# -----------------------------------------------------------------------------
# CREATE DIRECTORIES
# -----------------------------------------------------------------------------

- name: Create Pangolin base directory
  ansible.builtin.file:
    path: "{{ pangolin_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create Pangolin subdirectories
  ansible.builtin.file:
    path: "{{ pangolin_base_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - config
    - config/traefik
    - config/traefik/rules
    - config/traefik/logs
    - config/tinyauth
    - config/secrets
    - config/secrets/templates
    - config/letsencrypt
    - config/logs
    - config/middleware-manager
    - data
    - data/middleware-manager

# -----------------------------------------------------------------------------
# COPY CONFIGURATION FILES
# -----------------------------------------------------------------------------

- name: Copy main Pangolin config
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ pangolin_base_dir }}/config/config.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Pangolin

- name: Copy Traefik static config
  ansible.builtin.template:
    src: traefik_config.yml.j2
    dest: "{{ pangolin_base_dir }}/config/traefik/traefik_config.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Pangolin

- name: Copy Traefik dynamic config
  ansible.builtin.copy:
    src: "{{ pangolin_config_src }}/traefik/dynamic_config.yml"
    dest: "{{ pangolin_base_dir }}/config/traefik/dynamic_config.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Pangolin

- name: Copy Traefik rules
  ansible.builtin.copy:
    src: "{{ pangolin_config_src }}/traefik/rules/"
    dest: "{{ pangolin_base_dir }}/config/traefik/rules/"
    owner: root
    group: root
    mode: "0644"
  ignore_errors: true
  notify: Restart Pangolin

- name: Copy Middleware Manager templates
  ansible.builtin.copy:
    src: "{{ pangolin_config_src }}/middleware-manager/templates.yaml"
    dest: "{{ pangolin_base_dir }}/config/middleware-manager/templates.yaml"
    owner: root
    group: root
    mode: "0644"
  ignore_errors: true

- name: Copy TinyAuth users file
  ansible.builtin.copy:
    src: "{{ pangolin_config_src }}/tinyauth/users"
    dest: "{{ pangolin_base_dir }}/config/tinyauth/users"
    owner: root
    group: root
    mode: "0600"
  notify: Restart Pangolin

# -----------------------------------------------------------------------------
# COPY SECRETS TEMPLATES (for Locket)
# -----------------------------------------------------------------------------

- name: Copy secrets templates directory
  ansible.builtin.copy:
    src: "{{ pangolin_config_src }}/secrets/templates/"
    dest: "{{ pangolin_base_dir }}/config/secrets/templates/"
    owner: "65532"
    group: "65532"
    mode: "0640"
  notify: Restart Pangolin

# -----------------------------------------------------------------------------
# INITIALIZE LETSENCRYPT FILES
# -----------------------------------------------------------------------------

- name: Create empty acme.json if not exists
  ansible.builtin.file:
    path: "{{ pangolin_base_dir }}/config/letsencrypt/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
  changed_when: false

- name: Create empty acme-wildcard.json if not exists
  ansible.builtin.file:
    path: "{{ pangolin_base_dir }}/config/letsencrypt/acme-wildcard.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
  changed_when: false

# -----------------------------------------------------------------------------
# DEPLOY DOCKER COMPOSE
# -----------------------------------------------------------------------------

- name: Deploy docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ pangolin_base_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Pangolin

- name: Create .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ pangolin_base_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart Pangolin

# -----------------------------------------------------------------------------
# START STACK
# -----------------------------------------------------------------------------

- name: Start Pangolin stack
  community.docker.docker_compose_v2:
    project_src: "{{ pangolin_base_dir }}"
    state: present
    pull: always
  register: _pangolin_compose

- name: Display compose output
  ansible.builtin.debug:
    var: _pangolin_compose
    verbosity: 1

# -----------------------------------------------------------------------------
# HEALTH CHECK
# -----------------------------------------------------------------------------

- name: Wait for Pangolin API to be healthy
  ansible.builtin.uri:
    url: "https://pangolin.cianfhoghlaim.ie/api/v1/health"
    method: GET
    status_code: 200
  register: _pangolin_health
  until: _pangolin_health.status == 200
  retries: "{{ (pangolin_health_timeout / pangolin_health_interval) | int }}"
  delay: "{{ pangolin_health_interval }}"
  when: false

- name: Display Pangolin health status
  ansible.builtin.debug:
    msg: "Pangolin Core is healthy at {{ pangolin_dashboard_url }}"
  when: false
