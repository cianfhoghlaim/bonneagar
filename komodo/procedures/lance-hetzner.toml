# =============================================================================
# LANCE HETZNER - Lance Namespace Sidecar on Hetzner
# =============================================================================
# Lance table registration sidecar for production ML/AI workloads.
# Registers LanceDB tables in Lakekeeper Iceberg catalog.
# Connects to Hetzner Lakekeeper for catalog operations.
# =============================================================================

[[stack]]
name = "lance-hetzner"
description = "Lance Namespace sidecar on Hetzner for ML table registration"
tags = ["host:cax41-hetzner", "tier:lakehouse", "type:ml", "environment:production", "component:lance"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/storage/lance"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
# Server Configuration
SIDECAR_PORT=8182
SIDECAR_HOST=0.0.0.0
LOG_LEVEL=INFO

# Lakekeeper Connection (local on Hetzner)
ICEBERG_ENDPOINT=http://lakekeeper-hetzner:8181
ICEBERG_WAREHOUSE=hetzner_production
ICEBERG_PREFIX=hetzner/
ICEBERG_AUTH_TOKEN=[[LANCE_ICEBERG_AUTH_TOKEN]]

# Lance Storage (local path or S3)
LANCE_ROOT=/data/lance/
# Alternative: Use S3 backend
# LANCE_ROOT=s3://lance-hetzner/
# AWS_ENDPOINT_URL=http://garage:3900
# AWS_ACCESS_KEY_ID=[[GARAGE_ACCESS_KEY_ID]]
# AWS_SECRET_ACCESS_KEY=[[GARAGE_SECRET_ACCESS_KEY]]

# Timeouts
ICEBERG_CONNECT_TIMEOUT_MILLIS=10000
ICEBERG_READ_TIMEOUT_MILLIS=30000
ICEBERG_MAX_RETRIES=3
"""

# Stack dependencies
[[stack.depends_on]]
name = "lakekeeper-hetzner"
condition = "service_healthy"

# Health check procedure
[[stack.procedures]]
name = "lance-hetzner-health"
description = "Health check for Lance sidecar"
type = "shell"
command = """
curl -sf http://localhost:8182/health || echo "Lance sidecar health check failed"
curl -sf http://localhost:8182/v1/tables || echo "Tables endpoint check failed"
"""

# Register table procedure
[[stack.procedures]]
name = "lance-register-table"
description = "Register a Lance table in Iceberg catalog"
type = "shell"
command = """
# Usage: komodo-cli execute lance-register-table --param TABLE_PATH=/data/lance/my_table --param TABLE_NAME=my_table
TABLE_PATH="${TABLE_PATH:-/data/lance/default}"
TABLE_NAME="${TABLE_NAME:-default}"

curl -X POST http://localhost:8182/v1/register \\
  -H "Content-Type: application/json" \\
  -d "{\"table_path\": \"$TABLE_PATH\", \"table_name\": \"$TABLE_NAME\"}"
"""
