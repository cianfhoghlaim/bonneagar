# Pangolin auto-discovery labels for LakeFS
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  lakefs:
    labels:
      - "pangolin.resource.name=LakeFS"
      - "pangolin.resource.domain=lakefs.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://lakefs:8000"
      - "pangolin.resource.middlewares=tinyauth"
