# =============================================================================
# BROWSER - Unified Web Automation Stack (Patchright)
# =============================================================================
# Multi-backend browser automation with Patchright stealth browser grid.
# Architecture: Hunter-Gatherer-Operator pattern.
#   - Skyvern (Hunter):    Vision-based semantic navigation
#   - Crawl4AI (Gatherer): High-throughput bulk extraction
#   - Stagehand (Operator): AI-powered precision interactions
#
# Build contexts (post v2 restructure):
#   browser-grid, stagehand-server, api  -> infrastructure/browser/...
#   (crawl4ai, skyvern, garage are upstream images; no rebuild needed)
#
# USAGE:
#   Minimal (browser-grid + stagehand only):  docker compose --profile minimal up -d
#   Development:                              docker compose up -d
#   Production:                               docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

name: browser

x-browser-env: &browser-env
  BROWSER_CDP_URL: ws://browser-grid:9222
  BROWSER_SKYVERN_API_URL: http://skyvern:8000/api/v1
  BROWSER_CRAWL4AI_URL: http://crawl4ai:11235
  BROWSER_STAGEHAND_URL: http://stagehand-local:3100
  BROWSER_BROWSERBASE_API_KEY: ${BROWSERBASE_API_KEY:-}
  BROWSER_BROWSERBASE_PROJECT_ID: ${BROWSERBASE_PROJECT_ID:-}
  BROWSER_FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}

x-llm-env: &llm-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ZAI_API_KEY: ${ZAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}

services:
  # ===========================================================================
  # BROWSER GRID - Patchright Stealth Chromium (shared)
  # Source: infrastructure/browser/browser-grid/
  # ===========================================================================
  browser-grid:
    build:
      context: ../../../infrastructure/browser
      dockerfile: browser-grid/Dockerfile
    image: ghcr.io/cianfhoghlaim/browser-grid:local
    container_name: browser-grid
    restart: unless-stopped
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    init: true
    expose:
      - "9222"
    environment:
      DISPLAY: ":99"
      CHROME_FLAGS: "--disable-gpu --no-sandbox --disable-dev-shm-usage"
    volumes:
      - /dev/shm:/dev/shm
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # SKYVERN DATABASE (optional --profile skyvern)
  # ===========================================================================
  skyvern-db:
    image: postgres:16-alpine
    profiles: ["skyvern"]
    container_name: browser-skyvern-db
    restart: always
    volumes:
      - skyvern-postgres:/var/lib/postgresql/data
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: skyvern
      POSTGRES_PASSWORD: ${SKYVERN_DB_PASSWORD:-skyvern}
      POSTGRES_DB: skyvern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyvern"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # SKYVERN (optional --profile skyvern)
  # ===========================================================================
  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    profiles: ["skyvern"]
    container_name: browser-skyvern
    restart: on-failure
    ports:
      - "${SKYVERN_PORT:-8001}:8000"
    environment:
      <<: *llm-env
      DATABASE_STRING: postgresql+psycopg://skyvern:${SKYVERN_DB_PASSWORD:-skyvern}@skyvern-db:5432/skyvern
      BROWSER_TYPE: cdp-connect
      BROWSER_REMOTE_DEBUGGING_URL: ws://browser-grid:9222/
      ENABLE_OPENAI: ${ENABLE_OPENAI:-true}
      ENABLE_ANTHROPIC: ${ENABLE_ANTHROPIC:-false}
      ENABLE_CODE_BLOCK: "true"
    volumes:
      - skyvern-artifacts:/data/artifacts
      - skyvern-videos:/data/videos
    depends_on:
      skyvern-db:
        condition: service_healthy
      browser-grid:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cianfhoghlaim

  skyvern-ui:
    image: public.ecr.aws/skyvern/skyvern-ui:latest
    profiles: ["skyvern"]
    container_name: browser-skyvern-ui
    restart: on-failure
    ports:
      - "${SKYVERN_UI_PORT:-8080}:8080"
    environment:
      VITE_WSS_BASE_URL: ws://localhost:8001/api/v1
      VITE_API_BASE_URL: http://localhost:8001/api/v1
    volumes:
      - skyvern-artifacts:/data/artifacts
      - skyvern-videos:/data/videos
    depends_on:
      skyvern:
        condition: service_healthy
        required: false
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # CRAWL4AI (optional --profile crawl4ai)
  # ===========================================================================
  crawl4ai:
    image: unclecode/crawl4ai:latest
    profiles: ["crawl4ai"]
    container_name: browser-crawl4ai
    restart: unless-stopped
    expose:
      - "11235"
    environment:
      <<: *llm-env
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-4}
      CDP_URL: ws://browser-grid:9222
    volumes:
      - /dev/shm:/dev/shm
      - crawl4ai-downloads:/downloads
    depends_on:
      - browser-grid
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # STAGEHAND LOCAL (Operator)
  # Source: infrastructure/browser/stagehand-server/
  # ===========================================================================
  stagehand-local:
    build:
      context: ../../../infrastructure/browser
      dockerfile: stagehand-server/Dockerfile
    image: ghcr.io/cianfhoghlaim/stagehand-local:local
    container_name: browser-stagehand
    restart: unless-stopped
    ports:
      - "${STAGEHAND_PORT:-3100}:3100"
    environment:
      PORT: "3100"
      HEADLESS: "${STAGEHAND_HEADLESS:-true}"
      MAX_SESSIONS: "${STAGEHAND_MAX_SESSIONS:-10}"
      SESSION_TTL_MS: "${STAGEHAND_SESSION_TTL:-300000}"
      DEFAULT_MODEL: "${STAGEHAND_MODEL:-glm-4.6}"
      VISION_MODEL: "${STAGEHAND_VISION_MODEL:-glm-4.6v}"
      AGENT_MODEL: "${STAGEHAND_AGENT_MODEL:-google/gemini-3-flash-preview}"
      <<: *llm-env
      BROWSERBASE_API_KEY: ${BROWSERBASE_API_KEY:-}
      BROWSERBASE_PROJECT_ID: ${BROWSERBASE_PROJECT_ID:-}
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # API - FastAPI backend (unified)
  # Source: infrastructure/browser/Dockerfile
  # ===========================================================================
  api:
    build:
      context: ../../../infrastructure/browser
      dockerfile: Dockerfile
    image: ghcr.io/cianfhoghlaim/browser-api:local
    container_name: browser-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DUCKDB_PATH: /app/storage/data/browser.duckdb
      LANCEDB_PATH: /app/storage/data/scraped_vectors.lance
      <<: [*browser-env, *llm-env]
      DEFAULT_BACKEND: ${DEFAULT_BACKEND:-crawl4ai}
      FALLBACK_STRATEGY: ${FALLBACK_STRATEGY:-cost}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      DD_SERVICE: browser-api
      DD_ENV: ${ENVIRONMENT:-production}
    volumes:
      - browser-data:/app/storage/data
      - browser-screenshots:/app/storage/screenshots
    depends_on:
      browser-grid:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
        required: false
      stagehand-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - cianfhoghlaim

  # ===========================================================================
  # GARAGE - S3-compatible artifact storage (sidecar)
  # ===========================================================================
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: browser-garage
    restart: unless-stopped
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
      - "${GARAGE_WEB_PORT:-3902}:3902"
    expose:
      - "3901"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-}
      GARAGE_RPC_BIND_ADDR: "[::]:3901"
      GARAGE_S3_API_BIND_ADDR: "[::]:3900"
      GARAGE_S3_REGION: garage
      GARAGE_ADMIN_API_BIND_ADDR: "[::]:3903"
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-}
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3903/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - cianfhoghlaim

volumes:
  browser-data:
    driver: local
  browser-screenshots:
    driver: local
  skyvern-postgres:
    driver: local
  skyvern-artifacts:
    driver: local
  skyvern-videos:
    driver: local
  crawl4ai-downloads:
    driver: local
  garage-data:
    driver: local
  garage-meta:
    driver: local

networks:
  cianfhoghlaim:
    driver: bridge
