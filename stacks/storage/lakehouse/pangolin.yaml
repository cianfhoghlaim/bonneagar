# Pangolin auto-discovery labels for Lakehouse
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  garage:
    labels:
      - "pangolin.resource.name=Lakehouse Garage"
      - "pangolin.resource.domain=lakehouse-garage.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://lakehouse-garage:3904"
      - "pangolin.resource.middlewares=tinyauth"

  lakekeeper:
    labels:
      - "pangolin.resource.name=Lakehouse Lakekeeper"
      - "pangolin.resource.domain=lakehouse-lakekeeper.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://lakehouse-lakekeeper:8181"
      - "pangolin.resource.middlewares=tinyauth"

  lance-namespace:
    labels:
      - "pangolin.resource.name=Lakehouse Lance"
      - "pangolin.resource.domain=lakehouse-lance.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://lakehouse-lance-namespace:8182"
      - "pangolin.resource.middlewares=tinyauth"
