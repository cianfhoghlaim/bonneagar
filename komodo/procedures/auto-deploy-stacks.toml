##

[[procedure]]
name = "deploy-oci"
description = "Deploy all stacks on OCI CAX41"

[[procedure.config.stage]]
name = "databases"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "memgraph", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "falkordb", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "lancedb", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "knowledge-graphs"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "graphiti", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "cognee", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "ml-observability"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "mlflow", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "langfuse", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "tools"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "nimtable", execution.params.services = [], enabled = true },
  { execution.type = "DeployStack", execution.params.stack = "mathesar", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "cleanup"
enabled = true
executions = [
  { execution.type = "PruneContainers", execution.params.server = "arm1-oci", enabled = true }
]

