---
# =============================================================================
# KOMODO PERIPHERY ROLE - Binary Installation
# =============================================================================

- name: Check if Periphery is already installed
  ansible.builtin.stat:
    path: "{{ periphery_binary_path }}"
  register: periphery_binary

- name: Get installed Periphery version
  ansible.builtin.command: "{{ periphery_binary_path }} --version"
  register: periphery_installed_version
  changed_when: false
  failed_when: false
  when: periphery_binary.stat.exists

- name: Determine if installation is needed
  ansible.builtin.set_fact:
    periphery_install_needed: >-
      {{ not periphery_binary.stat.exists or
         (periphery_version != 'latest' and
          periphery_version not in (periphery_installed_version.stdout | default(''))) }}

- name: Download Periphery binary
  ansible.builtin.get_url:
    url: "{{ periphery_download_url }}"
    dest: "/tmp/periphery-{{ periphery_version }}"
    mode: "0755"
  when: periphery_install_needed
  register: periphery_download

- name: Install Periphery binary
  ansible.builtin.copy:
    src: "/tmp/periphery-{{ periphery_version }}"
    dest: "{{ periphery_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: periphery_install_needed
  notify: Restart periphery

- name: Clean up downloaded binary
  ansible.builtin.file:
    path: "/tmp/periphery-{{ periphery_version }}"
    state: absent
  when: periphery_download is changed

- name: Verify Periphery installation
  ansible.builtin.command: "{{ periphery_binary_path }} --version"
  register: periphery_version_check
  changed_when: false
  failed_when: periphery_version_check.rc != 0
