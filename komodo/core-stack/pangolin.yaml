# Pangolin auto-discovery labels for Komodo Core
# Include with: docker compose -f compose.yaml -f sidecar.yaml -f pangolin.yaml up -d
#
# Uses the new Pangolin label format (pangolin.public-resources.<id>.<property>)
# Authentication is OFF - Komodo handles its own local authentication.

services:
  core:
    labels:
      # Resource definition using new format
      - "pangolin.public-resources.komodo.name=Komodo"
      - "pangolin.public-resources.komodo.full-domain=komodo.cianfhoghlaim.ie"
      - "pangolin.public-resources.komodo.protocol=http"
      # Target configuration
      - "pangolin.public-resources.komodo.targets[0].method=http"
      - "pangolin.public-resources.komodo.targets[0].port=9120"
      # NO auth labels = authentication disabled (off by default for blueprints)
