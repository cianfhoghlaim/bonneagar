# =============================================================================
# OCI DEV TOOLS STACKS
# =============================================================================
# Lightweight developer tools deployed on Oracle Cloud Free Tier (arm1-oci)
# =============================================================================

# -----------------------------------------------------------------------------
# GLANCE - Dashboard/Homepage
# -----------------------------------------------------------------------------
[[stack]]
name = "glance"
description = "Self-hosted dashboard with feeds and widgets"
tags = ["host:arm1-oci", "tier:devtools"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/uirlisi/glance"
file_paths = ["glance.compose.yaml"]
environment = """
GLANCE_PORT=8080
TZ=Europe/Dublin
"""

# -----------------------------------------------------------------------------
# BACKREST - Backup Management
# -----------------------------------------------------------------------------
[[stack]]
name = "backrest"
description = "Restic backup management UI"
tags = ["host:arm1-oci", "tier:devtools", "type:backup"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/uirlisi/backrest"
file_paths = ["backrest.compose.yaml"]
environment = """
BACKREST_PORT=9898
"""

