# =============================================================================
# DAGSTER UNIFIED - Production Stack
# =============================================================================
# Runs all sruth pipelines in a single Dagster instance.
# Connects to lakehouse for data storage via DuckLake.
#
# USAGE:
#   Development:  docker compose up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
# =============================================================================

name: dagster

services:
  # ---------------------------------------------------------------------------
  # DAGSTER WEBSERVER & DAEMON
  # ---------------------------------------------------------------------------
  dagster:
    image: ghcr.io/cianfhoghlaim/dagster:latest
    container_name: dagster-unified
    restart: unless-stopped
    ports:
      - "${DAGSTER_PORT:-3335}:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/home
      # DuckLake Configuration
      USE_DUCKLAKE: ${USE_DUCKLAKE:-true}
      DUCKLAKE_POSTGRES_HOST: ${DUCKLAKE_POSTGRES_HOST:-lakehouse-postgres}
      DUCKLAKE_POSTGRES_PORT: ${DUCKLAKE_POSTGRES_PORT:-5432}
      DUCKLAKE_POSTGRES_USER: ${DUCKLAKE_POSTGRES_USER:-lakekeeper}
      DUCKLAKE_POSTGRES_PASSWORD: ${DUCKLAKE_POSTGRES_PASSWORD}
      DLT_ENVIRONMENT: ${DLT_ENVIRONMENT:-production}
      # Garage S3 Configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://lakehouse-garage:3900}
      AWS_REGION: ${AWS_REGION:-garage}
      # LLM Configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dagster.rule=Host(`dagster.cianfhoghlaim.ie`)"
      - "traefik.http.routers.dagster.entrypoints=websecure"
      - "traefik.http.services.dagster.loadbalancer.server.port=3000"
      - "pangolin.resource.middlewares=tinyauth"
    volumes:
      - dagster-storage:/opt/dagster/storage
      - dagster-home:/opt/dagster/home
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/server_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dagster
      - pangolin

  # ---------------------------------------------------------------------------
  # DAGSTER DAEMON - Schedules, Sensors, Run Queue
  # ---------------------------------------------------------------------------
  dagster-daemon:
    image: ghcr.io/cianfhoghlaim/dagster:latest
    container_name: dagster-daemon
    restart: unless-stopped
    command: ["uv", "run", "dagster-daemon", "run"]
    environment:
      DAGSTER_HOME: /opt/dagster/home
      USE_DUCKLAKE: ${USE_DUCKLAKE:-true}
      DUCKLAKE_POSTGRES_HOST: ${DUCKLAKE_POSTGRES_HOST:-lakehouse-postgres}
      DUCKLAKE_POSTGRES_PORT: ${DUCKLAKE_POSTGRES_PORT:-5432}
      DUCKLAKE_POSTGRES_USER: ${DUCKLAKE_POSTGRES_USER:-lakekeeper}
      DUCKLAKE_POSTGRES_PASSWORD: ${DUCKLAKE_POSTGRES_PASSWORD}
      DLT_ENVIRONMENT: ${DLT_ENVIRONMENT:-production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://lakehouse-garage:3900}
      AWS_REGION: ${AWS_REGION:-garage}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dagster.rule=Host(`dagster.cianfhoghlaim.ie`)"
      - "traefik.http.routers.dagster.entrypoints=websecure"
      - "traefik.http.services.dagster.loadbalancer.server.port=3000"
      - "pangolin.resource.middlewares=tinyauth"
    volumes:
      - dagster-storage:/opt/dagster/storage
      - dagster-home:/opt/dagster/home
    depends_on:
      dagster:
        condition: service_healthy
    networks:
      - dagster

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  dagster-storage:
  dagster-home:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  dagster:
    driver: bridge
  pangolin:
    external: true
