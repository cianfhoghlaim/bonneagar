# Cognee stack sidecar — Infisical Locket secret injection.
# Injects COGNEE_POSTGRES_PASSWORD, LITELLM_API_KEY, LANCEDB_API_KEY.
services:
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    restart: unless-stopped
    container_name: cianfhoghlaim-cognee-locket
    user: "65532"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    volumes:
      - type: tmpfs
        target: /run/secrets/locket
        tmpfs:
          mode: 0700
    env_file:
      - ./secrets.env
    networks:
      - lakehouse

networks:
  lakehouse:
    name: lakehouse_lakehouse
    external: true
