# =============================================================================
# LAKEKEEPER HETZNER - Standalone Lakekeeper on Hetzner
# =============================================================================
# Standalone Apache Iceberg REST catalog for production workloads.
# Uses Hetzner PostgreSQL for catalog metadata.
# Integrates with OCI Garage S3 for storage backend.
# =============================================================================

[[stack]]
name = "lakekeeper-hetzner"
description = "Apache Iceberg REST catalog on Hetzner (production)"
tags = ["host:cax41-hetzner", "tier:lakehouse", "type:data-platform", "environment:production", "component:catalog"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/storage/lakekeeper"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
# Lakekeeper Configuration
LAKEKEEPER_PORT=8181
LAKEKEEPER_METRICS_PORT=9000
LAKEKEEPER_BASE_URI=https://lakekeeper-hetzner.cianfhoghlaim.ie
# Database (Hetzner PostgreSQL)
LAKEKEEPER_DB_HOST=postgres:5432
LAKEKEEPER_DB_USER=lakekeeper
LAKEKEEPER_DB_PASSWORD=[[LAKEKEEPER_DB_PASSWORD]]
LAKEKEEPER_DB_NAME=lakekeeper_hetzner
# Storage (remote Garage on OCI)
GARAGE_S3_ENDPOINT=https://garage.cianfhoghlaim.ie
GARAGE_ACCESS_KEY_ID=[[GARAGE_ACCESS_KEY_ID]]
GARAGE_SECRET_ACCESS_KEY=[[GARAGE_SECRET_ACCESS_KEY]]
# Security
LAKEKEEPER_ENCRYPTION_KEY=[[LAKEKEEPER_ENCRYPTION_KEY]]
LAKEKEEPER_SSL_MODE=require
RUST_LOG=info
"""

# Health check procedure
[[stack.procedures]]
name = "lakekeeper-hetzner-health"
description = "Health check for Hetzner Lakekeeper"
type = "shell"
command = """
docker exec lakekeeper-hetzner /home/nonroot/lakekeeper healthcheck
curl -sf http://localhost:8181/v1/config || echo "API check failed"
"""

# Migration procedure
[[stack.procedures]]
name = "lakekeeper-hetzner-migrate"
description = "Run Lakekeeper migrations on Hetzner"
type = "shell"
command = """
docker exec lakekeeper-hetzner /home/nonroot/lakekeeper migrate
docker exec lakekeeper-hetzner /home/nonroot/lakekeeper migrate --check
"""
