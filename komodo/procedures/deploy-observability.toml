# =============================================================================
# DEPLOY OBSERVABILITY PROCEDURE
# =============================================================================
# Deploys observability stack across all servers.
# Domain: cianfhoghlaim.ie
#
# Services:
#   MLflow: ML experiment tracking (arm1-oci)
#   Langfuse: LLM tracing (arm1-oci)
#   Dozzle: Docker log viewer (arm1-oci)
#   Beszel: Server monitoring (arm1-oci)
#   Logfire: Python tracing (SaaS at logfire.pydantic.dev)
#
# Usage:
#   km run procedure deploy-observability
# =============================================================================

[[procedure]]
name = "deploy-observability"
description = "Deploy observability stack (MLflow, Langfuse, Dozzle, Beszel, Logfire)"

# =============================================================================
# STAGE 1: Monitoring Hub (arm1-oci)
# =============================================================================
# Deploy Dozzle and Beszel first - these are infrastructure services
# that help monitor everything else
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "monitoring-hub"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "dozzle" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "beszel" } }

# =============================================================================
# STAGE 2: ML Observability (arm1-oci)
# =============================================================================

[[procedure.config.stages]]
name = "ml-observability"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "mlflow" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "langfuse" } }

# =============================================================================
# STAGE 3: Logfire (SaaS collector)
# =============================================================================
# Logfire is SaaS at https://logfire.pydantic.dev. The local
# infrastructure/stacks/logfire/ deploys an OpenTelemetry Collector that
# forwards OTLP traces to Logfire cloud.
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "logfire-collector"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "logfire" } }
