# =============================================================================
# BROWSER STACK - Locket Sidecar Configuration
# =============================================================================
# Injects secrets from Infisical into the environment
# Extends compose.yaml with Locket for runtime secrets management
#
# Usage: docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LOCKET - Secrets Management Sidecar
  # ---------------------------------------------------------------------------
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: browser-locket
    restart: unless-stopped
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    command:
      - "--provider=infisical"
      - "--infisical-client-id=$${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--infisical-url=$${INFISICAL_URL:-http://host.docker.internal:8081}"
      - "--infisical-default-environment=$${INFISICAL_ENVIRONMENT:-dev}"
      - "--infisical-default-project-id=$${INFISICAL_PROJECT_ID:-project-id}
      - "--connect.host=${
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - browser-secrets:/run/secrets/locket
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - browser-net

  # ---------------------------------------------------------------------------
  # Override API service to use Locket secrets
  # ---------------------------------------------------------------------------
  api:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - browser-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

  # ---------------------------------------------------------------------------
  # Override Stagehand to use Locket secrets
  # ---------------------------------------------------------------------------
  stagehand-local:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - browser-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

  # ---------------------------------------------------------------------------
  # Override Skyvern to use Locket secrets
  # ---------------------------------------------------------------------------
  skyvern:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - browser-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

  # ---------------------------------------------------------------------------
  # Override Crawl4AI to use Locket secrets
  # ---------------------------------------------------------------------------
  crawl4ai:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - browser-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

  # ---------------------------------------------------------------------------
  # Override Garage to use Locket secrets
  # ---------------------------------------------------------------------------
  garage:
    depends_on:
      locket:
        condition: service_healthy
    volumes:
      - browser-secrets:/run/secrets/locket:ro
    env_file:
      - /run/secrets/locket/secrets.env

# =============================================================================
# SECRETS
# =============================================================================
secrets:
  infisical_secret:
    file: $${INFISICAL_SECRET_FILE:-../../infisical_secret}

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  browser-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
