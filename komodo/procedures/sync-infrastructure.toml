[[procedure]]
name = "sync-infrastructure"
description = "Pre-deploy: Sync DNS, configs, and credentials"

[[procedure.config.stage]]
name = "sync-dns"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "sync-dns-records", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "sync-configs"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "sync-storage-configs", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "generate-inventory"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "generate-ansible-inventory", execution.params.services = [], enabled = true }
]

[[procedure.config.stage]]
name = "validate"
enabled = true
executions = [
  { execution.type = "RunAction", execution.params.action = "validate-deployments", execution.params.services = [], enabled = true }
]
