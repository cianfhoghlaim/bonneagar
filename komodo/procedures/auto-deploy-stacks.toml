[[stack]]
name = "scraping-analytics"
description = "Web scraping stack (Skyvern, Crawl4AI, Stagehand)"
tags = [
  "host:bunchloch",
  "tier:scraping",
  "resource:heavy"
]
[stack.config]
server = "bunchloch"
run_directory = "/etc/komodo/storage/scraping"
file_paths = ["compose.yaml"]
environment = """
SKYVERN_PORT=8000
SKYVERN_UI_PORT=8080
CRAWL4AI_PORT=11235
"""

