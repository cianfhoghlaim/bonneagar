# Aleyum - Music Producer Portfolio
# Multi-tenant configuration for aleyum.com

tenant:
  id: "aleyum"
  name: "Aleyum"
  displayName: "Aleyum - Music & Development"
  domains:
    - "aleyum.com"
    - "www.aleyum.com"
    - "localhost:3001"  # Development
  type: "portfolio"
  description: "Music producer and game developer portfolio"
  tagline: "Sound Design & Interactive Experiences"

owner:
  name: "Conor Hynes"
  title: "Music Producer & Developer"
  email: "conor@aleyum.com"
  github: "aleyum"
  linkedin: "conorhynes"
  spotify: "aleyum"
  soundcloud: "aleyum"
  youtube: "@aleyum"

theme:
  primaryColor: "#8b5cf6"      # Purple
  secondaryColor: "#f59e0b"    # Amber
  accentColor: "#ec4899"       # Pink
  backgroundColor: "#18181b"   # Zinc dark
  foregroundColor: "#fafafa"   # Light text
  logo: "/assets/aleyum/logo.svg"
  favicon: "/assets/aleyum/favicon.svg"
  fontFamily: "Space Grotesk, system-ui, sans-serif"
  fontHeading: "Orbitron, sans-serif"
  borderRadius: "0.75rem"
  assets:
    style: "music"
    patterns:
      - "waveform"
      - "spectrum"
      - "particles"
      - "grid"

routes:
  enabled:
    - path: "/"
      component: "home"
      title: "Home"
    - path: "/music"
      component: "music"
      title: "Music"
    - path: "/projects"
      component: "projects"
      title: "Projects"
    - path: "/game"
      component: "game"
      title: "Game Dev"
    - path: "/about"
      component: "about"
      title: "About"
    - path: "/contact"
      component: "contact"
      title: "Contact"
  disabled:
    - "/curriculum"
    - "/translation"
    - "/resources"

features:
  curriculumBrowser: false
  translationTool: false
  aiChat: false
  resourceLibrary: false
  vocabularyTracker: false
  examPrep: false
  musicPlayer: true
  portfolioMode: true
  gameShowcase: true
  spotifyEmbed: true
  soundcloudEmbed: true

navigation:
  primary:
    - label: "Music"
      path: "/music"
      icon: "music"
    - label: "Projects"
      path: "/projects"
      icon: "code"
    - label: "Game Dev"
      path: "/game"
      icon: "gamepad"
    - label: "About"
      path: "/about"
      icon: "user"
  footer:
    - label: "Contact"
      path: "/contact"
    - label: "Privacy"
      path: "/privacy"

languages:
  primary: "en"
  supported:
    - code: "en"
      name: "English"
      nativeName: "English"

dataSources:
  yaml:
    - path: "config/content/aleyum"
      type: "profile"
    - path: "sruth/aleyum/game_showcase/project_data"
      type: "projects"
  database:
    - type: "postgresql"
      name: "portfolio"
      tables:
        - "tracks"
        - "projects"
        - "game_assets"
  external:
    - source: "spotify"
      pipeline: "aleyum.spotify"
      schedule: "hourly"
      config:
        artistId: "spotify:artist:ARTIST_ID"
    - source: "soundcloud"
      pipeline: "aleyum.soundcloud"
      schedule: "hourly"
    - source: "github"
      pipeline: "aleyum.github_profile"
      schedule: "hourly"
    - source: "youtube"
      pipeline: "aleyum.youtube"
      schedule: "daily"

storage:
  duckdbPath: "./storage/data/tenants/aleyum/main.duckdb"
  lancedbPath: "./storage/data/tenants/aleyum/lancedb"
  assetsPath: "./storage/assets/aleyum"

analytics:
  enabled: true
  provider: "plausible"
  siteId: "aleyum.com"

music:
  genres:
    - "Electronic"
    - "Ambient"
    - "Experimental"
  platforms:
    spotify:
      enabled: true
      embedType: "playlist"
    soundcloud:
      enabled: true
      embedType: "player"
    youtube:
      enabled: true
      embedType: "video"

gameShowcase:
  engines:
    - name: "SpacetimeDB"
      category: "spacetimedb"
    - name: "Godot"
      category: "godot"
    - name: "Unity"
      category: "unity"
    - name: "Unreal"
      category: "unreal"
    - name: "Babylon.js"
      category: "babylon"
  projectsPath: "sruth/aleyum/game_showcase/project_data"

seo:
  title: "Aleyum - Music Producer & Game Developer"
  description: "Portfolio of Conor Hynes - Electronic music production and interactive game development"
  keywords:
    - "music producer"
    - "electronic music"
    - "game developer"
    - "sound design"
    - "interactive"
  ogImage: "/assets/aleyum/og-image.png"
  twitterHandle: "@aleyum"
