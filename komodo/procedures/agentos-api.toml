# =============================================================================
# AGENTOS API STACK
# =============================================================================
# AgentOS API for DeFi protocol analysis agents with x402 payments.
# Domain: crypteolas.ie
# Server: oci-devtools
# =============================================================================

[[stack]]
name = "agentos-api"
description = "AgentOS API for DeFi protocol analysis (port 7771)"
tags = ["host:oci-devtools", "tier:production", "type:api", "domain:agentos.crypteolas.ie", "agent:multi-agent"]

[stack.config]
server_id = "oci-devtools"
run_directory = "/etc/komodo/sruth/crypteolas/agent_os"
file_paths = ["docker-compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
# Service Configuration
AGENTOS_DOMAIN=agentos.crypteolas.ie
AGENTOS_NAME=AgentOS
AGENTOS_PORT=7771
ENVIRONMENT=production

# Observability
LANGFUSE_HOST=https://langfuse.cianfhoghlaim.ie
LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
LOGFIRE_PROJECT_NAME=agentos-api
LOGFIRE_ENVIRONMENT=production

# x402 Payment Configuration
X402_ENABLED=true
X402_NETWORK=base
X402_ASSET=USDC
X402_PAY_TO_ADDRESS=${X402_PAY_TO_ADDRESS:-}

# Storage
STORAGE_TYPE=sqlite
STORAGE_PATH=./storage/sessions

# Infisical
INFISICAL_HOST=${INFISICAL_HOST:-http://132.145.27.89:8080}
LOCKET_MODE=watch
"""
