---
# =============================================================================
# PANGOLIN CORE ROLE - DEFAULT VARIABLES
# =============================================================================

# -----------------------------------------------------------------------------
# INSTALLATION
# -----------------------------------------------------------------------------

# Base directory for Pangolin on remote
pangolin_base_dir: /opt/pangolin

# Docker images
pangolin_image: "fosrl/pangolin:postgresql-latest"
gerbil_image: "fosrl/gerbil:latest"
traefik_image: "traefik:v3.4.0"
locket_image: "ghcr.io/bpbradley/locket:connect"
postgres_image: "postgres:17"
middleware_manager_image: "hhftechnology/middleware-manager:latest"
pocket_id_image: "ghcr.io/pocket-id/pocket-id:latest"
tinyauth_image: "ghcr.io/steveiliop56/tinyauth:v4"

# -----------------------------------------------------------------------------
# DOMAIN CONFIGURATION
# -----------------------------------------------------------------------------

# Primary domain for Pangolin
pangolin_domain: "example.com"

# Dashboard URL
pangolin_dashboard_url: "https://pangolin.{{ pangolin_domain }}"

# Auth URLs
pangolin_auth_url: "https://auth.{{ pangolin_domain }}"
pangolin_tinyauth_url: "https://tinyauth.{{ pangolin_domain }}"

# -----------------------------------------------------------------------------
# CREDENTIALS / SECRETS
# -----------------------------------------------------------------------------

# PostgreSQL password (will be generated if not set)
pangolin_postgres_password: "pangolin"

# -----------------------------------------------------------------------------
# NETWORK PORTS
# -----------------------------------------------------------------------------

# Gerbil WireGuard port
pangolin_wireguard_port: 51820

# HTTP/HTTPS ports (Traefik via Gerbil)
pangolin_http_port: 80
pangolin_https_port: 443

# Middleware Manager port
pangolin_middleware_port: 3456

# -----------------------------------------------------------------------------
# ACME / LETSENCRYPT
# -----------------------------------------------------------------------------

# Email for Let's Encrypt certificates
pangolin_acme_email: "admin@{{ pangolin_domain }}"

# DNS challenge provider (for wildcard certs)
pangolin_dns_provider: "cloudflare"

# -----------------------------------------------------------------------------
# CONFIG SOURCE
# -----------------------------------------------------------------------------

# Path to Pangolin config directory on CONTROL machine
# This directory should contain: config.yml, traefik/, tinyauth/, secrets/templates/
pangolin_config_src: ""

# -----------------------------------------------------------------------------
# HEALTH CHECK
# -----------------------------------------------------------------------------

# Wait for Pangolin to be healthy before completing
pangolin_wait_healthy: true

# Timeout for health check (seconds)
pangolin_health_timeout: 120

# Health check interval (seconds)
pangolin_health_interval: 5
