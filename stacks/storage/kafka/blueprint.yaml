private-resources:
  kafka:
    name: "Kafka Broker"
    mode: tcp
    tcp-ports: "9094"
    destination: "127.0.0.1"
    sites:
      - arm1-oci
    roles:
      - Member
  kafka-ui:
    name: "Kafka UI"
    mode: http
    full-domain: "kafka.cianfhoghlaim.ie"
    destination-port: 8080
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member
