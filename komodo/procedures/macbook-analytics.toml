# =============================================================================
# MACBOOK ANALYTICS STACKS
# =============================================================================
# Heavy analytics and development services on MacBook M4 Max (bunchloch)
# Resource-intensive services that benefit from 48 GB RAM
# =============================================================================

# -----------------------------------------------------------------------------
# LAKEFS - Data Versioning
# -----------------------------------------------------------------------------
[[stack]]
name = "lakefs"
description = "Git-like versioning for data lakes"
tags = ["host:bunchloch", "tier:lakehouse"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/lakefs"
file_paths = ["compose.yaml"]
environment = """
LAKEFS_PORT=8000
"""

# -----------------------------------------------------------------------------
# LAKEKEEPER - Iceberg REST Catalog
# -----------------------------------------------------------------------------
[[stack]]
name = "lakekeeper"
description = "Apache Iceberg REST catalog"
tags = ["host:bunchloch", "tier:lakehouse", "type:iceberg-catalog"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/lakekeeper"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
LAKEKEEPER_PORT=8181
LAKEKEEPER_METRICS_PORT=9000
"""

# -----------------------------------------------------------------------------
# OLAKE-UI - Iceberg Replication Platform
# -----------------------------------------------------------------------------
[[stack]]
name = "olake-ui"
description = "Database-to-Iceberg replication with Temporal"
tags = ["host:bunchloch", "tier:lakehouse"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/olake-ui"
file_paths = ["compose.yaml"]
environment = """
OLAKE_UI_PORT=3000
"""

# -----------------------------------------------------------------------------
# CONVEX - Real-time Backend
# -----------------------------------------------------------------------------
[[stack]]
name = "convex"
description = "Self-hosted real-time backend-as-a-service"
tags = ["host:bunchloch", "tier:application"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/convex"
file_paths = ["compose.yaml"]
environment = """
CONVEX_PORT=3210
"""

# -----------------------------------------------------------------------------
# SCRAPING STACK - Web Automation
# -----------------------------------------------------------------------------
# Browser-based scraping requires local display/resources
# -----------------------------------------------------------------------------
[[stack]]
name = "scraping-analytics"
description = "Web scraping stack (Skyvern, Crawl4AI, Stagehand)"
tags = ["host:bunchloch", "tier:scraping", "resource:heavy"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/scraping"
file_paths = ["compose.yaml"]
environment = """
SKYVERN_PORT=8000
SKYVERN_UI_PORT=8080
CRAWL4AI_PORT=11235
"""
