# =============================================================================
# OLM - Pangolin Tunnel Client for Hetzner (cax41-hetzner)
# =============================================================================
# Provides TCP tunnel access for SSH and database connections.
#
# USAGE:
#   Development:  docker compose -f compose.yaml up -d
#   Production:   docker compose -f compose.yaml -f sidecar.yaml up -d
#
# PREREQUISITES:
#   - Pangolin running and accessible
#   - OLM site "cax41-hetzner-olm" created in Pangolin UI
#   - Credentials stored in 1Password (vault: dev-baile, item: cax41-hetzner-olm)
# =============================================================================

name: olm-hetzner

services:
  olm:
    image: fosrl/olm:latest
    container_name: olm-hetzner
    restart: unless-stopped
    environment:
      # Use internal port to bypass Cloudflare Bot Fight Mode
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-http://132.145.27.89:8443}
      OLM_ID: ${OLM_ID:-}
      OLM_SECRET: ${OLM_SECRET:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      - "komodo.skip=true"
    network_mode: host
