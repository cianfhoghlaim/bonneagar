# =============================================================================
# PANGOLIN — Locket Sidecar for Infisical Secret Injection
# =============================================================================
# The Locket sidecar watches Infisical and writes resolved secrets to
# /run/secrets/locket/secrets.env. Pangolin/Postgres/TinyAuth containers
# source this file on startup to pick up SERVER_SECRET, POSTGRES_PASSWORD,
# POSTGRES_CONNECTION_STRING, POCKETID_CLIENT_ID/SECRET.
# =============================================================================

services:
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: pangolin-locket
    user: "65532:65532"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--provider=infisical"
      - "--infisical-client-id=${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - stack-secrets:/run/secrets/locket
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pangolin

  # Override pangolin to source secrets before starting
  pangolin:
    depends_on:
      locket:
        condition: service_healthy
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -a
        . /run/secrets/locket/secrets.env
        set +a
        exec npm run start
    volumes:
      - stack-secrets:/run/secrets/locket:ro

  # Override postgres to use secrets for password
  postgres:
    depends_on:
      locket:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -a
        . /run/secrets/locket/secrets.env
        set +a
        exec docker-entrypoint.sh postgres
    volumes:
      - stack-secrets:/run/secrets/locket:ro

  # Override tinyauth to use secrets for PocketID OAuth
  tinyauth:
    depends_on:
      locket:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -a
        . /run/secrets/locket/secrets.env
        set +a
        exec tinyauth
    volumes:
      - stack-secrets:/run/secrets/locket:ro

secrets:
  infisical_secret:
    file: ${INFISICAL_SECRET_FILE:-../../../../infisical_secret}

volumes:
  stack-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
