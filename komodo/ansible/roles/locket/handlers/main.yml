---
# =============================================================================
# LOCKET ROLE - Handlers
# =============================================================================
# Locket doesn't run as a service, but we may need to restart services
# that depend on locket configuration changes.
# =============================================================================

- name: Notify locket config changed
  ansible.builtin.debug:
    msg: "Locket configuration has changed. Services using locket may need restart."
  listen: "locket config changed"
