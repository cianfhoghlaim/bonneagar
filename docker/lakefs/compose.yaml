# =============================================================================
# LAKEFS - Data Versioning for Data Lakes
# =============================================================================
# Git-like version control for data lakes with S3-compatible storage.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: lakefs

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL - Metadata Store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lakefs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LAKEFS_DB_USERNAME:-lakefs}
      POSTGRES_PASSWORD: ${LAKEFS_DB_PASSWORD:-devpassword}
      POSTGRES_DB: lakefs
    volumes:
      - lakefs-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKEFS_DB_USERNAME:-lakefs} -d lakefs"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lakefs

  # ---------------------------------------------------------------------------
  # MINIO - S3-Compatible Storage
  # ---------------------------------------------------------------------------
  minio:
    image: quay.io/minio/minio:latest
    container_name: lakefs-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
    command: server /data --console-address ":9001"
    volumes:
      - lakefs-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lakefs

  # ---------------------------------------------------------------------------
  # MINIO INIT - Create Bucket
  # ---------------------------------------------------------------------------
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: lakefs-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-devpassword}
      mc mb --ignore-existing myminio/lakefs
      exit 0
      "
    restart: "no"
    networks:
      - lakefs

  # ---------------------------------------------------------------------------
  # LAKEFS - Version Control Server
  # ---------------------------------------------------------------------------
  lakefs:
    image: treeverse/lakefs:latest
    container_name: lakefs
    restart: unless-stopped
    ports:
      - "${LAKEFS_PORT:-8000}:8000"
    environment:
      LAKEFS_DATABASE_TYPE: postgres
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: postgresql://${LAKEFS_DB_USERNAME:-lakefs}:${LAKEFS_DB_PASSWORD:-devpassword}@postgres:5432/lakefs?sslmode=disable
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${LAKEFS_AUTH_ENCRYPT_SECRET_KEY:-dev-secret-key-change-in-production}
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-devpassword}
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: http://minio:9000
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: "true"
      LAKEFS_STATS_ENABLED: "false"
      LAKEFS_LOGGING_LEVEL: ${LAKEFS_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/v1/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lakefs

volumes:
  lakefs-postgres:
  lakefs-minio:

networks:
  lakefs:
    driver: bridge
