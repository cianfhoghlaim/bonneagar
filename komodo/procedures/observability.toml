# =============================================================================
# OBSERVABILITY STACKS
# =============================================================================
# Datadog agents deployed across all servers for unified monitoring
# - APM traces from FastAPI, Dagster, ADK agents
# - LLM Observability for Gemini, local models
# - Log aggregation from Docker containers
# - Custom ML pipeline metrics via DogStatsD
# =============================================================================

# -----------------------------------------------------------------------------
# DATADOG - OCI CAX41 (Production Pipelines)
# -----------------------------------------------------------------------------
# Primary production pipeline monitoring
# - Kafka broker monitoring
# - Dagster orchestration tracing
# - ML training job metrics
# -----------------------------------------------------------------------------
[[stack]]
name = "datadog-oci"
description = "Datadog agent for OCI production pipelines"
tags = ["host:arm1-oci", "tier:observability", "type:apm"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/datadog"
file_paths = ["compose.yaml"]
environment = """
DD_ENV=production
DD_SERVICE=oideachas-pipeline
DD_HOSTNAME=arm1-oci
DD_TAGS=project:oideachas,pipeline:education,host:oci,tier:production
DD_APM_ENABLED=true
DD_LLMOBS_ENABLED=true
DD_LLMOBS_ML_APP=education-ai-pipeline
DD_LOGS_ENABLED=true
DD_PROCESS_AGENT_ENABLED=true
"""

# -----------------------------------------------------------------------------
# DATADOG - Oracle ARM (Control Plane)
# -----------------------------------------------------------------------------
# Control plane and always-on service monitoring
# - Infisical health
# - Komodo orchestration
# - Pangolin tunnel monitoring
# -----------------------------------------------------------------------------
[[stack]]
name = "datadog-oracle"
description = "Datadog agent for Oracle control plane"
tags = ["host:arm1-oci", "tier:observability", "type:apm"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/datadog"
file_paths = ["compose.yaml"]
environment = """
DD_ENV=production
DD_SERVICE=control-plane
DD_HOSTNAME=arm1-oci
DD_TAGS=project:oideachas,pipeline:control-plane,host:oracle,tier:infrastructure
DD_APM_ENABLED=true
DD_LLMOBS_ENABLED=false
DD_LOGS_ENABLED=true
DD_PROCESS_AGENT_ENABLED=true
"""

# -----------------------------------------------------------------------------
# DATADOG - MacBook (Development & Heavy Analytics)
# -----------------------------------------------------------------------------
# Development environment and resource-intensive workloads
# - Browser automation tracing (Stagehand, Crawl4AI)
# - Local model inference monitoring
# - Development APM traces
# -----------------------------------------------------------------------------
[[stack]]
name = "datadog-macbook"
description = "Datadog agent for MacBook development"
tags = ["host:bunchloch", "tier:observability", "type:apm"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/storage/datadog"
file_paths = ["compose.yaml"]
environment = """
DD_ENV=development
DD_SERVICE=oideachas-dev
DD_HOSTNAME=bunchloch
DD_TAGS=project:oideachas,pipeline:development,host:macbook,tier:development
DD_APM_ENABLED=true
DD_LLMOBS_ENABLED=true
DD_LLMOBS_ML_APP=education-ai-dev
DD_LOGS_ENABLED=true
DD_PROCESS_AGENT_ENABLED=true
"""
