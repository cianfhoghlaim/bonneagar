# Forgejo - Self-hosted Git with Package Registry
#
# Provides:
# - Git repository hosting (GitHub alternative)
# - PyPI package registry for Python packages
# - Container registry for Docker images
# - CI/CD with Forgejo Actions (optional)
#
# Usage:
#   # Start Forgejo
#   docker compose up -d
#
#   # Access at http://localhost:3000
#   # First user to register becomes admin
#
#   # PyPI registry URL:
#   # https://forgejo.local/api/packages/{owner}/pypi
#
# Publishing packages:
#   # Configure ~/.pypirc with:
#   # [forgejo]
#   # repository = http://localhost:3000/api/packages/{owner}/pypi
#   # username = {your_username}
#   # password = {your_token}
#
#   python -m build
#   twine upload --repository forgejo dist/*
#
# Installing packages:
#   pip install --index-url http://localhost:3000/api/packages/{owner}/pypi/simple data-unified

services:
  # ==========================================================================
  # PostgreSQL - Database Backend
  # ==========================================================================
  forgejo_db:
    image: postgres:16-alpine
    container_name: forgejo_db
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${FORGEJO_DB_USER:-forgejo}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:-forgejo_password}
      POSTGRES_DB: ${FORGEJO_DB_NAME:-forgejo}
    volumes:
      - forgejo_postgres_data:/var/lib/postgresql/data
    networks:
      - forgejo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_DB_USER:-forgejo} -d ${FORGEJO_DB_NAME:-forgejo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Forgejo - Git Server with Package Registry
  # ==========================================================================
  forgejo:
    image: codeberg.org/forgejo/forgejo:9-rootless
    container_name: forgejo
    environment:
      # User configuration
      USER_UID: 1000
      USER_GID: 1000

      # Database
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo_db:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:-forgejo_password}

      # Server
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:3000}
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__server__SSH_PORT: 22
      FORGEJO__server__SSH_LISTEN_PORT: 2222

      # Package Registry (enabled by default, these are optional limits)
      FORGEJO__packages__ENABLED: "true"
      # -1 = unlimited
      FORGEJO__packages__LIMIT_TOTAL_OWNER_COUNT: -1
      FORGEJO__packages__LIMIT_TOTAL_OWNER_SIZE: -1

      # Security
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:-}

      # Service settings
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:-true}
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: ${FORGEJO_REQUIRE_SIGNIN:-false}

      # Enable Actions (CI/CD)
      FORGEJO__actions__ENABLED: "true"

      # OAuth2 Client Settings (for PocketID SSO)
      FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: "true"
      FORGEJO__oauth2_client__UPDATE_AVATAR: "true"
      FORGEJO__oauth2_client__ACCOUNT_LINKING: "auto"

    volumes:
      - forgejo_data:/var/lib/gitea
      - forgejo_config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:2222"
    networks:
      - forgejo_network
      - pangolin
    depends_on:
      forgejo_db:
        condition: service_healthy
    restart: unless-stopped
# ==========================================================================
# Networks
# ==========================================================================
networks:
  forgejo_network:
    driver: bridge
    name: forgejo_network
  pangolin:
    external: true

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  forgejo_postgres_data:
    name: forgejo_postgres_data
  forgejo_data:
    name: forgejo_data
  forgejo_config:
    name: forgejo_config
