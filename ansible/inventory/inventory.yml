---
# =============================================================================
# CIANFHOGHLAIM INFRASTRUCTURE INVENTORY
# =============================================================================
# Architecture:
#   - MacBook Pro (bunchloch): Komodo Core + Pangolin Site (Newt)
#   - Oracle Cloud (arm1.oci): Pangolin Core + Komodo Periphery
# =============================================================================

all:
  vars:
    # Common SSH settings
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3
    
    # Pangolin Defaults
    pangolin_domain: "cianfhoghlaim.ie"
    pangolin_config_src: "/Users/cianmacandeisigh/dev/kings_college_galway/infrastructure/pangolin/config"
    
    # Infisical
    infisical_pocketid_client_id: "{{ lookup('env', 'POCKETID_CLIENT_ID') }}"
    infisical_pocketid_client_secret: "{{ lookup('env', 'POCKETID_CLIENT_SECRET') }}"
    pangolin_infisical_host: "http://172.18.0.1:8081"
    infisical_project_id: "{{ lookup('env', 'INFISICAL_PROJECT_ID') }}"
    infisical_client_id: "{{ lookup('env', 'INFISICAL_CLIENT_ID') }}"

    # Locket
    locket_image: "ghcr.io/bpbradley/locket:infisical"

    # Komodo Defaults
    komodo_core_image_tag: "2"
    komodo_periphery_image_tag: "2"
    komodo_domain: "komodo.cianfhoghlaim.ie"
    
    # Newt Pangolin Tunnel
    pangolin_endpoint: "https://pangolin.cianfhoghlaim.ie"

  children:
    # =========================================================================
    # CONTROL PLANE (MacBook Pro)
    # =========================================================================
    infrastructure:
      hosts:
        bunchloch:
          ansible_connection: local
          ansible_host: localhost
          ansible_become: false

          pangolin_infisical_host: "http://host.docker.internal:8081"

          komodo_host: "https://komodo.cianfhoghlaim.ie"
          komodo_base_dir: "/Users/cianmacandeisigh/dev/kings_college_galway/.local/komodo"
          komodo_periphery_root: "/Users/cianmacandeisigh/dev/kings_college_galway/.local/komodo_periphery"
          
          komodo_local_auth: false
          komodo_enable_new_users: false
          komodo_disable_user_registration: true
          
          newt_base_dir: "/Users/cianmacandeisigh/dev/kings_college_galway/.local/newt"
          
          # Infisical integration is done via Locket Sidecar
          infisical_client_secret_file: "/Users/cianmacandeisigh/dev/kings_college_galway/infrastructure/pangolin/config/infisical_secret"
          infisical_secret_path: "/Users/cianmacandeisigh/dev/kings_college_galway/infrastructure/pangolin/config/infisical_secret"

    # =========================================================================
    # WORKLOADS (Oracle Cloud Free Tier)
    # =========================================================================
    periphery:
      hosts:
        arm1.oci:
          ansible_host: "{{ lookup('env', 'OCI_ARM1_IP') }}"
          ansible_user: ubuntu

          machine_type: oracle_arm
          architecture: arm64
          ram_gb: 2

          # Komodo Periphery uses WSS outbound, we don't need a Newt client for it
          deploy_newt: false
          
          # Komodo Periphery uses WSS outbound
          periphery_core_address: "wss://komodo.cianfhoghlaim.ie"
          periphery_connect_as: "arm1-oci"
          
          # Infisical Secret Path
          infisical_secret_path: "/opt/pangolin/config/infisical_secret"
