# =============================================================================
# PANGOLIN ENTERPRISE EDITION — PostgreSQL-backed fresh deploy on arm1-oci
# =============================================================================
# Official manual docker-compose layout per docs.pangolin.net, plus PocketID
# + TinyAuth for OIDC SSO, plus Locket sidecar for Infisical secret injection.
#
# Database: PostgreSQL 17 (per docs.pangolin.net/self-host/advanced/database-options)
# Image:    fosrl/pangolin:ee-latest (per docs.pangolin.net/self-host/enterprise-edition)
# =============================================================================

name: pangolin

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL — Production database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: pangolin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pangolin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pangolin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pangolin -d pangolin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # PANGOLIN EE — Identity-aware tunneled reverse proxy
  # ---------------------------------------------------------------------------
  pangolin:
    image: fosrl/pangolin:ee-latest
    container_name: pangolin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # GERBIL — WireGuard tunnel controller
  # ---------------------------------------------------------------------------
  gerbil:
    image: fosrl/gerbil:latest
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/gerbil/get-config
      - --reportBandwidthTo=http://pangolin:3001/api/v1/gerbil/receive-bandwidth
    volumes:
      - ./config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "21820:21820/udp"
      - "443:443"
      - "80:80"
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # TRAEFIK — Reverse proxy (shares Gerbil's network stack)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6.0
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ./config/traefik:/etc/traefik:ro
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik

  # ---------------------------------------------------------------------------
  # POCKET ID — Passkey-based OIDC provider (kept from previous stack)
  # ---------------------------------------------------------------------------
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: pocket-id
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${POCKETID_ENCRYPTION_KEY:-364c2b9c66851000c4062e7c8f40e21d7d456483744dc1ad7ee54a31b87efc74}
      APP_URL: https://auth.cianfhoghlaim.ie
      TRUST_PROXY: "true"
      PUID: "1000"
      PGID: "1000"
    volumes:
      - pocket-id-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1411/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # TINYAUTH — Forward auth with PocketID OAuth (kept from previous stack)
  # ---------------------------------------------------------------------------
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: tinyauth
    restart: unless-stopped
    environment:
      PORT: "10000"
      ADDRESS: "0.0.0.0"
      APP_URL: https://tinyauth.cianfhoghlaim.ie
      SECURE_COOKIE: "true"
      SESSION_EXPIRY: "86400"
      LOG_LEVEL: info
      DISABLE_ANALYTICS: "true"
      PROVIDERS_POCKETID_CLIENT_ID: ${POCKETID_CLIENT_ID}
      PROVIDERS_POCKETID_CLIENT_SECRET: ${POCKETID_CLIENT_SECRET}
      PROVIDERS_POCKETID_AUTH_URL: https://auth.cianfhoghlaim.ie/authorize
      PROVIDERS_POCKETID_TOKEN_URL: https://auth.cianfhoghlaim.ie/api/oidc/token
      PROVIDERS_POCKETID_USER_INFO_URL: https://auth.cianfhoghlaim.ie/api/oidc/userinfo
      PROVIDERS_POCKETID_REDIRECT_URL: https://tinyauth.cianfhoghlaim.ie/api/oauth/callback/pocketid
      PROVIDERS_POCKETID_SCOPES: openid email profile groups
      PROVIDERS_POCKETID_NAME: Pocket ID
    volumes:
      - tinyauth-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # LOCKET — Infisical secret injection sidecar
  # ---------------------------------------------------------------------------
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: pangolin-locket
    user: "65532:65532"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--provider=infisical"
      - "--infisical-client-id=$${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./secrets.env:/templates/secrets.env:ro
      - stack-secrets:/run/secrets/locket
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pangolin

volumes:
  postgres-data:
  pocket-id-data:
  tinyauth-data:
  stack-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700

secrets:
  infisical_secret:
    file: ${INFISICAL_SECRET_FILE:-../../../../infisical_secret}

networks:
  pangolin:
    driver: bridge
