# =============================================================================
# KOMODO SERVERS - Multi-Host Infrastructure
# =============================================================================
# Defines all Periphery agents in the distributed storage stack.
# Each server connects outbound to Komodo Core at komodo.cianfhoghlaim.ie
# =============================================================================

# -----------------------------------------------------------------------------
# OCI FREE TIER - Control Plane (arm1-oci)
# -----------------------------------------------------------------------------
# 4 ARM OCPUs, 24 GB RAM, 200 GB storage
# Runs: Pangolin, Komodo, 1Password, Garage, Beszel, Dozzle, Qdrant
# -----------------------------------------------------------------------------
[[server]]
name = "arm1-oci"
description = "Oracle Cloud ARM - Control Plane"
tags = ["location:oracle-london", "role:control-plane", "arch:arm64"]

[server.config]
# Empty address = Periphery connects outbound to Core (recommended for cloud servers)
address = ""
region = "uk-london-1"
enabled = true
passkey = "[[KOMODO_PASSKEY]]"

# -----------------------------------------------------------------------------
# HETZNER CAX41 - Workload Node (cax41-hetzner)
# -----------------------------------------------------------------------------
# 16 ARM vCPU, 32 GB RAM, 320 GB NVMe
# Runs: Memgraph, FalkorDB, Graphiti, LanceDB, Cognee, Langfuse, MLflow, Nimtable, Mathesar
# -----------------------------------------------------------------------------
[[server]]
name = "cax41-hetzner"
description = "Hetzner CAX41 ARM - Primary Workloads"
tags = ["location:hetzner-fsn1", "role:workloads", "arch:arm64"]

[server.config]
# Address will be updated after Pulumi deployment
# For now, use placeholder - Periphery connects outbound
address = ""
region = "eu-central"
enabled = true

# -----------------------------------------------------------------------------
# MACBOOK M4 MAX - Development/Analytics (bunchloch)
# -----------------------------------------------------------------------------
# ~14 cores, 48 GB RAM, local NVMe
# Runs: LakeFS, Lakekeeper, OLake-UI, Convex, Scraping Stack, ML Inference
# -----------------------------------------------------------------------------
[[server]]
name = "bunchloch"
description = "MacBook M4 Max - Dev & Analytics"
tags = ["location:local", "role:development", "arch:arm64"]

[server.config]
# Empty address = Periphery connects outbound to Core (recommended)
address = ""
region = "local"
enabled = true
passkey = "[[KOMODO_PASSKEY]]"
