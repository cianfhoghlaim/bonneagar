# =============================================================================
# MACBOOK MEDIA STACKS
# =============================================================================
# Media servers and local tools on MacBook (bunchloch)
# =============================================================================

# -----------------------------------------------------------------------------
# AUDIOBOOKSHELF - Audiobook Server
# -----------------------------------------------------------------------------
[[stack]]
name = "audiobookshelf"
description = "Self-hosted audiobook and podcast server"
tags = ["host:bunchloch", "tier:media", "type:audiobook"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/audiobookshelf"
file_paths = ["audiobookshelf.compose.yaml"]
environment = """
AUDIOBOOKSHELF_PORT=13378
"""

