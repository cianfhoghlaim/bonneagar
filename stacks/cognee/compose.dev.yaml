# Cognee — local dev override
# ----------------------------------------------------------------------------
# Mirrors the pattern in infrastructure/stacks/lancedb/compose.dev.yaml.
# Replaces the production Locket sidecar with a no-op alpine container and
# sources secrets from the local .env (hydrated by mise hooks from Infisical).
# ----------------------------------------------------------------------------

services:
  locket:
    image: alpine:3.20
    container_name: cianfhoghlaim-cognee-locket-dev
    restart: "no"
    command:
      - sh
      - -c
      - echo "[dev] no-op cognee locket — secrets from host .env via env_file"; sleep infinity
    networks:
      - lakehouse

  cognee:
    depends_on:
      locket:
        condition: service_started
    env_file:
      - ../../../../.env
