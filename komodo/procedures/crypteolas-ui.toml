# =============================================================================
# CRYPTEOLAS UI STACK
# =============================================================================
# TanStack UI for Crypteolas DeFi protocol analysis.
# Domain: crypteolas.ie
# Server: oci-devtools
# =============================================================================

[[stack]]
name = "crypteolas-ui"
description = "TanStack UI for Crypteolas DeFi analysis"
tags = ["host:oci-devtools", "tier:production", "type:ui", "domain:crypteolas.ie", "framework:tanstack"]

[stack.config]
server_id = "oci-devtools"
run_directory = "/etc/komodo/sruth/crypteolas/ui"
file_paths = ["docker-compose.yaml", "pangolin.yaml"]
environment = """
# Service Configuration
CRYPTOS_UI_DOMAIN=crypteolas.ie
CRYPTOS_UI_NAME=Crypteolas UI
VITE_API_URL=http://api:8000
VITE_COPILOTKIT_RUNTIME_URL=http://api:8000/copilotkit

# Observability
DD_SERVICE=crypteolas-ui
DD_ENV=production

# Infisical
INFISICAL_HOST=${INFISICAL_HOST:-http://132.145.27.89:8080}
LOCKET_MODE=watch
"""
