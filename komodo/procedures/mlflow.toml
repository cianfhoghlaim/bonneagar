# =============================================================================
# MLFLOW STACK
# =============================================================================
# ML experiment tracking and model registry.
# Domain: mlflow.cianfhoghlaim.ie
# Server: arm1-oci
# =============================================================================

[[stack]]
name = "mlflow"
description = "ML experiment tracking and model registry"
tags = ["host:arm1-oci", "tier:observability", "type:ml", "domain:mlflow.cianfhoghlaim.ie"]

[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/storage/mlflow"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
# Service Configuration
MLFLOW_DOMAIN=mlflow.cianfhoghlaim.ie
MLFLOW_NAME=MLflow
MLFLOW_PORT=5000

# Backend Store (PostgreSQL)
MLFLOW_BACKEND_STORE=postgresql://mlflow:${MLFLOW_DB_PASSWORD:-mlflow}@postgres:5432/mlflow

# Default Artifact Store (local filesystem)
MLFLOW_ARTIFACT_ROOT=/artifacts

# Environment
ENVIRONMENT=production

# Infisical
INFISICAL_HOST=${INFISICAL_HOST:-http://132.145.27.89:8080}
LOCKET_MODE=watch
"""
