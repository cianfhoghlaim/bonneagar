# =============================================================================
# QDRANT - Vector Similarity Search Engine
# =============================================================================
# High-performance vector database for AI/ML applications.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: qdrant

services:
  # ---------------------------------------------------------------------------
  # QDRANT - Vector Database
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "pangolin.resource.name=qdrant"
      - "pangolin.resource.domain=qdrant.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://qdrant:6333"
    networks:
      - qdrant
      - pangolin

volumes:
  qdrant-data:

networks:
  qdrant:
    driver: bridge
  pangolin:
    external: true
