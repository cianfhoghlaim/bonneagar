# Cognee knowledge graph stack for Cianfhoghlaim Oideachais.
# Serves 6 Cognee datasets (aistear, primary, junior_cycle, senior_cycle, tertiary, cross_stage)
# via the REST API on port 8000. Joins the lakehouse_lakehouse external network.
#
# To start: docker compose -f compose.yaml -f sidecar.yaml up -d

services:
  cognee:
    image: cognee-ai/cognee:latest
    container_name: cianfhoghlaim-cognee
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: /run/secrets/locket/secrets.env
        required: false
    environment:
      LLM_API_KEY: ${LITELLM_API_KEY:-sk-1234}
      LLM_PROVIDER: litellm
      LLM_BASE_URL: http://litellm:4000/v1
      LLM_MODEL: gemini-2.0-flash
      COGNEE_DATABASES: oideachais.aistear,oideachais.primary,oideachais.junior_cycle,oideachais.senior_cycle,oideachais.tertiary,oideachais.cross_stage
      COGNEE_STORAGE: postgresql
      COGNEE_POSTGRES_HOST: cognee-postgres
      COGNEE_POSTGRES_PORT: "5432"
      COGNEE_POSTGRES_USER: cognee
      COGNEE_POSTGRES_PASSWORD: ${COGNEE_POSTGRES_PASSWORD:-devpassword}
      COGNEE_POSTGRES_DB: cognee_oideachais
      VECTOR_DB_PROVIDER: pgvector
      GRAPH_DATABASE_PROVIDER: postgres
      LANCEDB_URI: rest://lakehouse-lance-namespace:8182
      LANCEDB_API_KEY: ${LANCEDB_API_KEY:-devtoken}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    depends_on:
      cognee-postgres:
        condition: service_healthy
      locket:
        condition: service_healthy
    networks:
      - lakehouse

  cognee-postgres:
    image: pgvector/pgvector:pg17
    container_name: cianfhoghlaim-cognee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: ${COGNEE_POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: cognee_oideachais
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cognee", "-d", "cognee_oideachais"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - cognee-postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    env_file:
      - path: /run/secrets/locket/secrets.env
        required: false

  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: cianfhoghlaim-cognee-locket
    user: "65532"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    volumes:
      - type: tmpfs
        target: /run/secrets/locket
        tmpfs:
          mode: 0700
    env_file:
      - ./secrets.env
    networks:
      - lakehouse

volumes:
  cognee-postgres-data:

networks:
  lakehouse:
    name: lakehouse_lakehouse
    external: true
