      mount r2:embeddings /data/embeddings
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 5G
      --vfs-read-chunk-size 128M
      --daemon-wait 30s
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
    volumes:
      - type: bind
        source: ${R2_MOUNT_BASE:-/mnt/r2}/embeddings
        target: /data/embeddings
        bind:
          propagation: rshared
    healthcheck:
      test: ["CMD", "ls", "/data/embeddings"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - r2

  # ---------------------------------------------------------------------------
  # ICEBERG BUCKET (Lakekeeper tables)
  # ---------------------------------------------------------------------------
  r2-iceberg:
    image: rclone/rclone:latest
    container_name: r2-iceberg
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    command: >
      mount r2:iceberg /data/iceberg
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 2G
      --vfs-read-chunk-size 64M
      --daemon-wait 30s
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
    volumes:
      - type: bind
        source: ${R2_MOUNT_BASE:-/mnt/r2}/iceberg
        target: /data/iceberg
        bind:
          propagation: rshared
    healthcheck:
      test: ["CMD", "ls", "/data/iceberg"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - r2

  # ---------------------------------------------------------------------------
  # EXPORTS BUCKET (Dagster asset exports)
  # ---------------------------------------------------------------------------
  r2-exports:
    image: rclone/rclone:latest
    container_name: r2-exports
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    command: >
      mount r2:exports /data/exports
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 1G
      --daemon-wait 30s
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:-}.r2.cloudflarestorage.com
    volumes:
      - type: bind
        source: ${R2_MOUNT_BASE:-/mnt/r2}/exports
        target: /data/exports
        bind:
          propagation: rshared
    healthcheck:
      test: ["CMD", "ls", "/data/exports"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - r2

networks:
  r2:
    driver: bridge
