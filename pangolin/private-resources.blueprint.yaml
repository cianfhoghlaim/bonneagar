# =============================================================================
# Private Resources Blueprint - ML Infrastructure
# =============================================================================
# Defines private resources accessible via Pangolin client with DNS aliases.
# When connected via Pangolin client, these domain names will resolve to
# the internal services without requiring public DNS or SSO.
#
# USAGE:
#   Import via Pangolin UI: Settings > Blueprints
#   Or via API:
#     curl -X PUT https://pangolin.cianfhoghlaim.ie/api/v1/org/{orgId}/blueprint \
#       -H "Authorization: Bearer $PANGOLIN_API_KEY" \
#       -H "Content-Type: application/json" \
#       -d '{"blueprint": "'"$(base64 -w0 private-resources.blueprint.yaml)"'"}'
#
# PREREQUISITES:
#   - Pangolin client installed on your device
#   - Connected to the organization via Pangolin client
#   - Sites: arm1-oci, arm1-oci must exist
# =============================================================================

private-resources:
  # ---------------------------------------------------------------------------
  # Observability - MLflow & Langfuse
  # ---------------------------------------------------------------------------
  mlflow:
    name: "MLflow Tracking Server"
    mode: host
    destination: mlflow-server
    site: arm1-oci
    alias: mlflow.cianfhoghlaim.ie
    users:
      - eolas@cianfhoghlaim.ie
    machines:
      - crazy-siberian-chipmunk

