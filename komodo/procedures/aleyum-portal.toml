# -----------------------------------------------------------------------------
# ALEYUM PORTAL - Main Application
# -----------------------------------------------------------------------------
[[stack]]
name = "aleyum-portal"
description = "Developer homelab portal with AG-UI agent chat, MCP tools browser, and Glance-style widgets"
tags = ["host:bunchloch", "tier:devtools", "type:portal", "domain:aleyum.cianfhoghlaim.ie"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/sruth/aleyum/portal"
file_paths = ["compose.yaml", "pangolin.yaml"]
environment = """
PORTAL_PORT=3000
"""
