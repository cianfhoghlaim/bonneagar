# =============================================================================
# MULTI-TENANT ROUTING CONFIGURATION
# Routes for cianfhoghlaim.ie and aleyum.com domains
# =============================================================================

http:
  # ---------------------------------------------------------------------------
  # Middlewares - Tenant Injection
  # ---------------------------------------------------------------------------
  middlewares:
    # Inject X-Tenant-ID header for cianfhoghlaim.ie
    tenant-cianfhoghlaim:
      headers:
        customRequestHeaders:
          X-Tenant-ID: "cianfhoghlaim"

    # Inject X-Tenant-ID header for aleyum.com
    tenant-aleyum:
      headers:
        customRequestHeaders:
          X-Tenant-ID: "aleyum"

    # CORS middleware for cross-origin requests
    tenant-cors:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Tenant-ID"
        accessControlAllowOriginList:
          - "https://cianfhoghlaim.ie"
          - "https://www.cianfhoghlaim.ie"
          - "https://aleyum.com"
          - "https://www.aleyum.com"
        accessControlMaxAge: 100
        addVaryHeader: true

  # ---------------------------------------------------------------------------
  # Routers - Cianfhoghlaim.ie (Celtic Education Portal)
  # ---------------------------------------------------------------------------
  routers:
    # HTTP redirect for main domain
    cianfhoghlaim-redirect:
      rule: "Host(`cianfhoghlaim.ie`) || Host(`www.cianfhoghlaim.ie`)"
      service: portal-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Main portal router
    cianfhoghlaim-portal:
      rule: "Host(`cianfhoghlaim.ie`) || Host(`www.cianfhoghlaim.ie`)"
      service: portal-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-wildcard
        domains:
          - main: "cianfhoghlaim.ie"
            sans:
              - "*.cianfhoghlaim.ie"
      middlewares:
        - secure-headers
        - tenant-cianfhoghlaim

    # API routes for cianfhoghlaim
    cianfhoghlaim-api:
      rule: "(Host(`cianfhoghlaim.ie`) || Host(`www.cianfhoghlaim.ie`)) && PathPrefix(`/api`)"
      service: portal-api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-wildcard
      middlewares:
        - secure-headers
        - tenant-cianfhoghlaim
        - rate-limit-api
        - tenant-cors
      priority: 100

  # ---------------------------------------------------------------------------
  # Routers - Aleyum.com (Music Portfolio)
  # ---------------------------------------------------------------------------
    # HTTP redirect for aleyum domain
    aleyum-redirect:
      rule: "Host(`aleyum.com`) || Host(`www.aleyum.com`)"
      service: portal-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Main portal router for aleyum
    aleyum-portal:
      rule: "Host(`aleyum.com`) || Host(`www.aleyum.com`)"
      service: portal-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-aleyum
        domains:
          - main: "aleyum.com"
            sans:
              - "*.aleyum.com"
      middlewares:
        - secure-headers
        - tenant-aleyum

    # API routes for aleyum
    aleyum-api:
      rule: "(Host(`aleyum.com`) || Host(`www.aleyum.com`)) && PathPrefix(`/api`)"
      service: portal-api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-aleyum
      middlewares:
        - secure-headers
        - tenant-aleyum
        - rate-limit-api
        - tenant-cors
      priority: 100

  # ---------------------------------------------------------------------------
  # Services - Shared Portal
  # ---------------------------------------------------------------------------
  services:
    # Portal frontend (TanStack Start)
    portal-service:
      loadBalancer:
        servers:
          - url: "http://portal:3000"
        healthCheck:
          path: "/api/health"
          interval: "30s"
          timeout: "5s"

    # Portal API service (same container, different path handling)
    portal-api-service:
      loadBalancer:
        servers:
          - url: "http://portal:3000"
        healthCheck:
          path: "/api/health"
          interval: "30s"
          timeout: "5s"
