# Pangolin auto-discovery labels for Lakehouse
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
# NOTE: S3 endpoints are public for programmatic access; admin/UI resources are private
services:
  garage:
    labels:
      - "pangolin.public-resources.lakehouse-s3.name=Lakehouse S3 API"
      - "pangolin.public-resources.lakehouse-s3.full-domain=s3.lakehouse.cianfhoghlaim.ie"
      - "pangolin.public-resources.lakehouse-s3.protocol=http"
      - "pangolin.public-resources.lakehouse-s3.target=http://lakehouse-garage:3900"

      - "pangolin.public-resources.lakehouse-s3-iceberg.name=Lakehouse Iceberg Bucket"
      - "pangolin.public-resources.lakehouse-s3-iceberg.full-domain=iceberg.s3.lakehouse.cianfhoghlaim.ie"
      - "pangolin.public-resources.lakehouse-s3-iceberg.protocol=http"
      - "pangolin.public-resources.lakehouse-s3-iceberg.target=http://lakehouse-garage:3900"

      - "pangolin.public-resources.lakehouse-s3-lance.name=Lakehouse Lance Bucket"
      - "pangolin.public-resources.lakehouse-s3-lance.full-domain=lance.s3.lakehouse.cianfhoghlaim.ie"
      - "pangolin.public-resources.lakehouse-s3-lance.protocol=http"
      - "pangolin.public-resources.lakehouse-s3-lance.target=http://lakehouse-garage:3900"

      - "pangolin.public-resources.lakehouse-s3-ducklake.name=Lakehouse DuckLake Bucket"
      - "pangolin.public-resources.lakehouse-s3-ducklake.full-domain=ducklake.s3.lakehouse.cianfhoghlaim.ie"
      - "pangolin.public-resources.lakehouse-s3-ducklake.protocol=http"
      - "pangolin.public-resources.lakehouse-s3-ducklake.target=http://lakehouse-garage:3900"

      - "pangolin.private-resources.lakehouse-admin.name=Lakehouse Admin"
      - "pangolin.private-resources.lakehouse-admin.mode=http"
      - "pangolin.private-resources.lakehouse-admin.destination-port=3903"
      - "pangolin.private-resources.lakehouse-admin.protocol=http"
      - "pangolin.private-resources.lakehouse-admin.roles[0]=Member"
      - "pangolin.private-resources.lakehouse-admin.full-domain=lakehouse-admin.cianfhoghlaim.ie"

  lakekeeper:
    labels:
      - "pangolin.private-resources.lakekeeper.name=Lakekeeper REST Catalog"
      - "pangolin.private-resources.lakekeeper.mode=http"
      - "pangolin.private-resources.lakekeeper.destination-port=8181"
      - "pangolin.private-resources.lakekeeper.protocol=http"
      - "pangolin.private-resources.lakekeeper.roles[0]=Member"
      - "pangolin.private-resources.lakekeeper.full-domain=lakekeeper.cianfhoghlaim.ie"

  lance-namespace:
    labels:
      - "pangolin.private-resources.lance-api.name=Lance Namespace API"
      - "pangolin.private-resources.lance-api.mode=http"
      - "pangolin.private-resources.lance-api.destination-port=8182"
      - "pangolin.private-resources.lance-api.protocol=http"
      - "pangolin.private-resources.lance-api.roles[0]=Member"
      - "pangolin.private-resources.lance-api.full-domain=lance-api.cianfhoghlaim.ie"