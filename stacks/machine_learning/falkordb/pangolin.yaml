# Pangolin auto-discovery labels for FalkorDB
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  falkordb:
    labels:
      - "pangolin.private-resources.falkordb.name=FalkorDB Browser"
      - "pangolin.private-resources.falkordb.mode=http"
      - "pangolin.private-resources.falkordb.destination-port=3000"
      - "pangolin.private-resources.falkordb.protocol=http"
      - "pangolin.private-resources.falkordb.roles[0]=Member"
      - "pangolin.private-resources.falkordb.full-domain=falkordb.cianfhoghlaim.ie"