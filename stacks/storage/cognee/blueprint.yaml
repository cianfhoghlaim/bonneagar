# =============================================================================
# COGNEE - Pangolin Blueprint
# =============================================================================
# Defines private routing for Cognee via Pangolin/Newt.
#
# LOADING:
#   Via Newt CLI:     newt --blueprint-file blueprint.yaml
#   Via directory:    Place in /opt/newt/blueprints/
#   Via sync script:  ./scripts/sync-blueprints.sh
# =============================================================================

private-resources:
  cognee:
    name: "Cognee"
    full-domain: "cognee.cianfhoghlaim.ie"
    mode: http
    destination-port: 8000
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member

  cognee-mcp:
    name: "Cognee MCP"
    full-domain: "cognee-mcp.cianfhoghlaim.ie"
    mode: http
    destination-port: 8000
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member
