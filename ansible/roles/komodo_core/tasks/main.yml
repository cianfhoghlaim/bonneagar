---
# =============================================================================
# KOMODO CORE ROLE - MAIN TASKS
# =============================================================================

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - komodo_host | length > 0
    fail_msg: "komodo_host must be set"

# -----------------------------------------------------------------------------
# CREATE DIRECTORIES
# -----------------------------------------------------------------------------

- name: Create Komodo base directory
  ansible.builtin.file:
    path: "{{ komodo_base_dir }}"
    state: directory
    mode: "0755"

- name: Create Komodo subdirectories
  ansible.builtin.file:
    path: "{{ komodo_base_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - backups
    - syncs

- name: Create Periphery root directory
  ansible.builtin.file:
    path: "{{ komodo_periphery_root }}"
    state: directory
    mode: "0755"

# -----------------------------------------------------------------------------
# DEPLOY CONFIGURATION FILES
# -----------------------------------------------------------------------------

- name: Deploy secrets.env template
  ansible.builtin.template:
    src: secrets.env.j2
    dest: "{{ komodo_base_dir }}/secrets.env.template"
    mode: "0600"

- name: Render secrets.env using Locket
  ansible.builtin.shell: |
    docker run --rm \
      -v {{ komodo_base_dir }}:{{ komodo_base_dir }} \
      -v {{ infisical_client_secret_file }}:{{ infisical_client_secret_file }}:ro \
      -e INFISICAL_URL \
      {{ locket_image }} \
      --mode one-shot \
      --provider infisical \
      --infisical-client-id "$INFISICAL_CLIENT_ID" \
      --infisical-client-secret "$INFISICAL_CLIENT_SECRET" \
      --infisical-default-environment dev \
      --infisical-default-project-id "$INFISICAL_PROJECT_ID" \
      --map {{ komodo_base_dir }}/secrets.env.template:{{ komodo_base_dir }}/secrets.env
  environment:
    INFISICAL_CLIENT_ID: "{{ infisical_client_id }}"
    INFISICAL_CLIENT_SECRET: "file:{{ infisical_client_secret_file }}"
    INFISICAL_PROJECT_ID: "{{ infisical_project_id }}"
    INFISICAL_URL: "{{ pangolin_infisical_host }}"
  register: _locket_render
  changed_when: false

- name: Deploy docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ komodo_base_dir }}/docker-compose.yaml"
    mode: "0644"

# -----------------------------------------------------------------------------
# START STACK
# -----------------------------------------------------------------------------

- name: Pull Docker images
  ansible.builtin.command: docker compose --env-file secrets.env -f docker-compose.yaml pull
  args:
    chdir: "{{ komodo_base_dir }}"
  changed_when: false

- name: Start Komodo stack
  ansible.builtin.command: docker compose --env-file secrets.env -f docker-compose.yaml up -d --remove-orphans
  args:
    chdir: "{{ komodo_base_dir }}"
  register: _komodo_compose

- name: Display compose output
  ansible.builtin.debug:
    var: _komodo_compose.stdout_lines
    verbosity: 1

# -----------------------------------------------------------------------------
# HEALTH CHECK
# -----------------------------------------------------------------------------

- name: Wait for Komodo Core to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ komodo_core_port }}/"
    method: GET
    status_code: 200
  register: _komodo_health
  until: _komodo_health.status == 200
  retries: "{{ (komodo_health_timeout / komodo_health_interval) | int }}"
  delay: "{{ komodo_health_interval }}"
  when: komodo_wait_healthy

- name: Display Komodo health status
  ansible.builtin.debug:
    msg: "Komodo Core is healthy at {{ komodo_host }}"
  when: komodo_wait_healthy
