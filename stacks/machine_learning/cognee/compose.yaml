# Cognee v1.1 — AI Memory Platform (Docker)
# Uses pre-built cognee/cognee:latest image with Neo4j backend
#
# Usage:
#   docker compose -f compose.yaml up -d
#   # API at http://localhost:8000
#   # Docs at http://localhost:8000/docs
#

name: cognee

services:
  cognee:
    image: cognee/cognee:latest
    container_name: cognee
    restart: unless-stopped
    ports:
      - "8100:8000"
      - "5678:5678"
    environment:
      # LLM: OpenAI (via OPENAI_API_KEY from env)
      - LLM_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_PROVIDER=openai
      - LLM_MODEL=deepseek-chat
      - LLM_ENDPOINT=https://api.deepseek.com/v1
      - EMBEDDING_PROVIDER=openai
      - EMBEDDING_MODEL=text-embedding-3-small
      - EMBEDDING_API_KEY=${DEEPSEEK_API_KEY}
      - EMBEDDING_ENDPOINT=https://api.deepseek.com/v1
      # Embedding
      - EMBEDDING_PROVIDER=openai
      - EMBEDDING_MODEL=text-embedding-3-small
      # Graph: Neo4j
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_URL=bolt://host.docker.internal:7687
      - GRAPH_DATABASE_USERNAME=neo4j
      - GRAPH_DATABASE_PASSWORD=devpassword
      # Vector: LanceDB
      - VECTOR_DATABASE_PROVIDER=lancedb
      - VECTOR_DATABASE_URL=/data/lancedb
      # Disable multi-user access control for local use
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      - CACHING=false
      # Data persistence
      - DATA_PATH=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cognee_data:/data
    networks:
      - cognee

  neo4j:
    image: neo4j:5.26.2
    container_name: cognee-neo4j
    profiles:
      - neo4j
    ports:
      - "7474:7474"
      - "17687:7687"
    environment:
      - NEO4J_AUTH=neo4j/devpassword
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - cognee_neo4j_data:/data
    networks:
      - cognee

volumes:
  cognee_data:
  cognee_neo4j_data:

networks:
  cognee:
    driver: bridge
