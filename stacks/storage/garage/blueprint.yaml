public-resources:
  garage-s3:
    name: "Garage S3 API"
    full-domain: "s3.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "arm1-oci"
        hostname: "garage"
        method: "http"
        port: 3900

private-resources:
  garage-web:
    name: "Garage Web"
    mode: "http"
    destination-port: 3903
    full-domain: "garage.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "garage-web"

