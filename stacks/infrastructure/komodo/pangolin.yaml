# Pangolin private resource labels (zero-trust access) for Komodo Core
# Include with: docker compose -f compose.yaml -f sidecar.yaml -f pangolin.yaml up -d
#
# Uses the new Pangolin label format (pangolin.private-resources.<id>.<property>)
# Authentication is OFF - Komodo handles its own local authentication.

services:
  core:
    labels:
      # Resource definition using new format.
      # The newt validates a `destination` string (host:port).
      # `destination-port` is the older form and is rejected with
      # "Invalid input: expected string, received undefined at
      # private-resources.komodo.destination". The host portion is
      # the komodo-core container_name (see compose.yaml) so the
      # newt's Docker network DNS resolves it.
      - "pangolin.private-resources.komodo.name=Komodo"
      - "pangolin.private-resources.komodo.mode=http"
      - "pangolin.private-resources.komodo.destination=komodo-core:9120"
      - "pangolin.private-resources.komodo.protocol=http"
      - "pangolin.private-resources.komodo.roles[0]=Member"

      - "pangolin.private-resources.komodo.full-domain=komodo.cianfhoghlaim.ie"
      # NO auth labels = authentication disabled (off by default for blueprints)
