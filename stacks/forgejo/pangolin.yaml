# Pangolin auto-discovery labels for Forgejo
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
# NOTE: No middleware - Forgejo handles its own authentication
services:
  forgejo:
    labels:
      - "pangolin.public-resources.forgejo.name=Forgejo"
      - "pangolin.public-resources.forgejo.full-domain=git.cianfhoghlaim.ie"
      - "pangolin.public-resources.forgejo.protocol=http"
      - "pangolin.public-resources.forgejo.targets[0].method=http"
      - "pangolin.public-resources.forgejo.targets[0].port=3000"
