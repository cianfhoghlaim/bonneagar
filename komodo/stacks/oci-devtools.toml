# OCI dev tools — 7 stacks on arm1-oci (all upgraded to 5-file Gold Standard)

[[stack]]
name = "glance"
description = "Self-hosted dashboard with feeds and widgets"
tags = ["host:arm1-oci","tier:devtools","domain:glance.cianfhoghlaim.ie"]
[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/uirlisi/glance"
file_paths = ["compose.yaml","sidecar.yaml","pangolin.yaml","blueprint.yaml"]
environment = """
GLANCE_PORT=8080
TZ=Europe/Dublin
INFISICAL_HOST=http://infisical-backend:8080
LOCKET_MODE=watch
"""

