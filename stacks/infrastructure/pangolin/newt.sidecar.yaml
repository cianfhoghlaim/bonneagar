# =============================================================================
# NEWT - Locket Sidecar Configuration
# =============================================================================
# Adds Locket sidecar for Infisical-based secret injection.
#
# USAGE:
#   docker compose -f newt.compose.yaml -f newt.sidecar.yaml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # LOCKET - Secrets Management Sidecar
  # ---------------------------------------------------------------------------
  locket:
    image: ghcr.io/bpbradley/locket:infisical
    container_name: newt-locket
    user: "65532:65532"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "--provider=infisical"
      - "--infisical-url=https://infisical.cianfhoghlaim.ie"
      - "--infisical-client-id=${INFISICAL_CLIENT_ID}"
      - "--infisical-client-secret=file:/run/secrets/infisical_secret"
      - "--infisical-default-environment=${INFISICAL_ENVIRONMENT:-dev}"
      - "--infisical-default-project-id=${INFISICAL_PROJECT_ID:-}"
      - "--map=/templates:/run/secrets/locket"
      - "--mode=${LOCKET_MODE:-watch}"
    secrets:
      - infisical_secret
    volumes:
      - ./newt.secrets.env:/templates/secrets.env:ro
      - newt-secrets:/run/secrets/locket
    extra_hosts:
      - host.docker.internal:host-gateway
    healthcheck:
      test: ["CMD", "/locket", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pangolin

  # ---------------------------------------------------------------------------
  # NEWT - Override to use Locket secrets
  # ---------------------------------------------------------------------------
  newt:
    depends_on:
      locket:
        condition: service_healthy
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-https://pangolin.cianfhoghlaim.ie}
      NEWT_ID_FILE: /run/secrets/locket/newt_id
      NEWT_SECRET_FILE: /run/secrets/locket/newt_secret
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - newt-secrets:/run/secrets/locket:ro

secrets:
  infisical_secret:
    file: ${INFISICAL_SECRET_FILE:-../../infisical_secret}

volumes:
  newt-secrets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=65532,gid=65532,mode=700
