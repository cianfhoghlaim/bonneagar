# Pangolin private-resource blueprint (generated from pangolin.yaml label form)
# See: https://docs.pangolin.net/manage/blueprints
private-resources:
  alertmanager:
    name: "Alertmanager"
    mode: "http"
    destination-port: 9093
    full-domain: "alerts.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "alertmanager"

  grafana:
    name: "Grafana Monitoring"
    mode: "http"
    destination-port: 3000
    full-domain: "grafana.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "grafana"

  prometheus:
    name: "Prometheus"
    mode: "http"
    destination-port: 9090
    full-domain: "prometheus.cianfhoghlaim.ie"
    protocol: "http"
    roles:
      - "Member"
    destination: "prometheus"

