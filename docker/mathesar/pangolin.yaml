# Pangolin auto-discovery labels for Mathesar
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  mathesar:
    labels:
      - "pangolin.resource.name=Mathesar"
      - "pangolin.resource.domain=mathesar.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://mathesar:8000"
      - "pangolin.resource.middlewares=tinyauth"
