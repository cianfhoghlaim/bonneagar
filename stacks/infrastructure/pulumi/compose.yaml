name: pulumi
services:
  pulumi:
    image: pulumi/pulumi:latest
    container_name: pulumi
    restart: unless-stopped
    ports: ["8080:8080"]
    command: ["server","--address=0.0.0.0:8080"]
    environment:
      - PULUMI_BACKEND_URL=${PULUMI_BACKEND_URL}
      - PULUMI_CONFIG_PASSPHRASE=${PULUMI_CONFIG_PASSPHRASE}
    volumes:
      - pulumi_state:/pulumi/state
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 20s
    deploy:
      resources:
        limits: {memory: 2G, cpus: '2'}
    networks: [cianfhoghlaim]
volumes:
  pulumi_state: {driver: local}
networks:
  cianfhoghlaim: {driver: bridge}
