      description: "Alias: extract → Gemini 2.5 Pro, falls back to GLM 4.6, then Gemini Flash"
      capabilities: ["extraction", "baml", "alias"]
      tier: paid
      fallback_chain: ["gemini/gemini-2.5-pro", "openai/glm-4.6", "gemini/gemini-2.5-flash"]

  # Math — primary: Qwen2.5-Math GGUF
  - model_name: math
    litellm_params:
      model: openai/qwen2.5-math-7b
      api_base: http://llama-swap:8080/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Alias: math → Qwen2.5-Math 7B GGUF"
      capabilities: ["math", "alias"]
      tier: paid
      fallback_chain: ["local/math/qwen25-math", "openai/glm-4.6"]

  # Irish — primary: UCCIX GGUF, fallback: Qwen2.5-Math
  - model_name: irish
    litellm_params:
      model: openai/uccix-llama2-13b
      api_base: http://llama-swap:8080/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Alias: irish → UCCIX Llama2 13B Irish, falls back to Qwen2.5-Math, Gemini"
      capabilities: ["irish", "alias"]
      tier: paid
      fallback_chain: ["local/irish/uccix", "local/math/qwen25-math", "gemini/gemini-2.5-flash"]

  # Image — primary: Z-Image-Turbo (fast), fallback: Qwen-Image, FLUX.2
  - model_name: image
    litellm_params:
      model: openai/z-image-turbo
      api_base: http://llama-swap:8080/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Alias: image → Z-Image-Turbo (fast), falls back to Qwen-Image, FLUX.2, SDXL"
      capabilities: ["image", "alias"]
      tier: paid
      fallback_chain: ["local/image/z-image-turbo", "local/image/qwen-image", "local/image/flux2", "local/image/sdxl"]

  # Image FIBO — JSON-config driven
  - model_name: image-fibo
    litellm_params:
      model: openai/fibo
      api_base: http://mlx-omni:10240/v1
      api_key: not-needed
      timeout: 600
    model_info:
      description: "Alias: image-fibo → Bria FIBO (MLX), JSON-config driven, deterministic"
      capabilities: ["image", "json_config", "deterministic", "alias"]
      tier: paid
      fallback_chain: ["local/image/fibo", "local/image/z-image-turbo"]

  # Embedding (curriculum, default)
  - model_name: embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      description: "Alias: embedding → OpenAI text-embedding-3-small (default)"
      capabilities: ["embeddings", "alias"]
      tier: paid
      fallback_chain: ["openai/text-embedding-3-small", "celtic/embedding/bge-m3"]

  # Embedding (curriculum, BGE-M3 — preferred for cross-language)
  - model_name: embedding-curriculum
    litellm_params:
      model: huggingface/BAAI/bge-m3
      api_key: os.environ/HF_TOKEN
    model_info:
      description: "Alias: embedding-curriculum → BGE-M3 1024d multilingual"
      capabilities: ["embeddings", "multilingual", "alias"]
      tier: paid
      dimensions: 1024

  # Generic general-purpose (OpenCode Go primary)
  - model_name: general
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://opencode.ai/zen/go/v1/chat/completions
      api_key: os.environ/OPENCODE_GO_API_KEY
    model_info:
      description: "Alias: general → OpenCode Go DeepSeek V4 Flash (fast + cheap)"
      capabilities: ["general", "alias"]
      tier: paid
      fallback_chain: ["opencode-go/deepseek-v4-flash", "openai/glm-4.6", "gpt-4o-mini"]

  # =========================================================================
  # MiniMax-M3 ALIAS — vendor-de-risked with 4-tier paid + 1 local fallback
  # =========================================================================
  # Three OPENCODE_GO_API_KEY_{0,1,2} slots are 5-hour-window independent.
  # The first 3 entries of the chain are the 3 M3 slots — LiteLLM's
  # `num_retries: 3` (router_settings) cycles through them on 429/timeout.
  # If the entire opencode-go gateway is unavailable, the chain falls
  # through to qwen3.7-max + kimi-k2.6 (same gateway, different models),
  # then glm-4.6 (Z.ai direct — fully independent provider), and finally
  # to local qwen2.5-math (llama-swap GGUF, runs on the MacBook M4 even
  # with no internet).
  #
  # BAML client: `client MiniMax` in baml_src/clients.baml points here.
  # =========================================================================
  - model_name: minimax
    litellm_params:
      model: anthropic/minimax-m3
      api_base: https://opencode.ai/zen/go/v1/messages
      api_key: os.environ/OPENCODE_GO_API_KEY
    model_info:
      description: "Alias: minimax → M3 (3-key round-robin), then qwen3.7-max, kimi-k2.6, glm-4.6, then local qwen-math GGUF"
      capabilities: ["general", "agentic", "alias"]
      tier: paid
      fallback_chain:
        - "opencode-go/minimax-m3-slot0"
        - "opencode-go/minimax-m3-slot1"
        - "opencode-go/minimax-m3-slot2"
        - "opencode-go/qwen3.7-max"
        - "opencode-go/kimi-k2.6"
        - "openai/glm-4.6"
        - "local/math/qwen25-math"


# =============================================================================
# GENERAL SETTINGS
# =============================================================================
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  store_model_in_db: true
  database_connection_pool_limit: 10
  disable_spend_logs: false
  disable_error_logs: false
  telemetry: false
  drop_params: true  # drop unsupported params rather than 400-error
  enable_json_schema_validation: true  # BAML strict schema enforcement
  redact_user_api_key_info: true
  forward_client_headers_to_llm_api: ["X-Request-Id", "X-Trace-Id"]

  # Proxy-level request timeouts
  request_timeout: 600
  # Health checks
  health_check_interval: 30

  # Langfuse observability (when LANGFUSE_HOST is set)
  langfuse:
    langfuse_enabled: true
    langfuse_host: os.environ/LANGFUSE_HOST
    langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
    langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY

# =============================================================================
# ROUTING FALLBACKS (per route)
# =============================================================================
router_settings:
  num_retries: 3
  timeout: 600
  redis_host: null  # no redis required for single-instance dev
  redis_port: null
  enable_caching: false  # curriculum is dynamic per request
  caching_groups: []
