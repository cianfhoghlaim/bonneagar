global:
  resolve_timeout: 5m
  smtp_smarthost: localhost:25
  smtp_from: alerts@cianfhoghlaim.ie
  smtp_require_tls: false

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "team-default"

receivers:
  - name: "team-default"
    webhook_configs:
      - url: "http://n8n:5678/webhook/team-alerting"
        send_resolved: true
        max_alerts: 0
  - name: "critical"
    webhook_configs:
      - url: "http://n8n:5678/webhook/team-alerting-critical"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
