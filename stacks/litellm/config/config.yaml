  # =========================================================================
  # MiniMax-M3 — 3 parallel slots (round-robin via fallback_chain)
  # =========================================================================
  # Same model, three independent OPENCODE_GO_API_KEY_{0,1,2} credentials.
  # The `minimax` alias route below chains them in order; LiteLLM's
  # `num_retries: 3` (router_settings) means a 429 from one slot
  # auto-falls-through to the next within the same request.
  # =========================================================================

  - model_name: opencode-go/minimax-m3-slot0
    litellm_params:
      model: anthropic/minimax-m3
      api_base: https://opencode.ai/zen/go/v1/messages
      api_key: os.environ/OPENCODE_GO_API_KEY_0
    model_info:
