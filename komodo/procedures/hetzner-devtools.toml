# =============================================================================
# HETZNER DEV TOOLS STACKS
# =============================================================================
# Resource-intensive developer tools on Hetzner CAX41 (cax41-hetzner)
# =============================================================================

# -----------------------------------------------------------------------------
# PERPLEXICA - AI Search Engine
# -----------------------------------------------------------------------------
[[stack]]
name = "perplexica"
description = "AI-powered search engine with citations"
tags = ["host:cax41-hetzner", "tier:devtools", "type:ai-search"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/uirlisi/perplexica"
file_paths = ["perplexica.compose.yaml"]
environment = """
PERPLEXICA_PORT=3001
"""

# -----------------------------------------------------------------------------
# RESTATE - Durable Execution Platform
# -----------------------------------------------------------------------------
[[stack]]
name = "restate"
description = "Durable execution and workflow engine"
tags = ["host:cax41-hetzner", "tier:devtools", "type:workflow"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/uirlisi/restate"
file_paths = ["restate.compose.yaml"]
environment = """
RESTATE_PORT=8080
RESTATE_ADMIN_PORT=9070
RESTATE_INGRESS_PORT=8081
"""

# -----------------------------------------------------------------------------
# STORYBOOK - UI Component Library
# -----------------------------------------------------------------------------
[[stack]]
name = "storybook"
description = "UI component development environment"
tags = ["host:cax41-hetzner", "tier:devtools", "type:ui"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/uirlisi/storybook"
file_paths = ["storybook.compose.yaml"]
environment = """
STORYBOOK_PORT=6006
"""
