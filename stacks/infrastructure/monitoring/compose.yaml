# =============================================================================
# MONITORING - Prometheus + Grafana + Loki + Alertmanager + Promtail
# =============================================================================
# Centralised observability for the 70+ stacks. Sits on the cianfhoghlaim
# Docker network so it can scrape every container's /metrics endpoint.
#
# Components:
#   - Prometheus (port 9090): metrics scraping + storage
#   - Grafana (port 3000):   dashboards
#   - Loki (port 3100):      log aggregation
#   - Promtail:              log shipping agent
#   - Alertmanager (9093):   alert routing
#
# USAGE:
#   Production:  docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

name: monitoring

services:
  # ---------------------------------------------------------------------------
  # PROMETHEUS - metrics scraping + storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # GRAFANA - dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auto-provision datasources from /etc/grafana/provisioning/datasources
      GF_DATASOURCES_DEFAULT_NAME: Prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # LOKI - log aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # PROMTAIL - log shipping agent
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # ALERTMANAGER - alert routing
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9093/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - cianfhoghlaim

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  cianfhoghlaim:
    driver: bridge
