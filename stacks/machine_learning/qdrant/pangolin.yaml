# Pangolin auto-discovery labels for Qdrant
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  qdrant:
    labels:
      - "pangolin.private-resources.qdrant.name=Qdrant"
      - "pangolin.private-resources.qdrant.mode=http"
      - "pangolin.private-resources.qdrant.destination=qdrant:6333"
      - "pangolin.private-resources.qdrant.protocol=http"
      - "pangolin.private-resources.qdrant.roles[0]=Member"
      - "pangolin.private-resources.qdrant.full-domain=qdrant.cianfhoghlaim.ie"