---
# =============================================================================
# KOMODO INVENTORY
# =============================================================================
# Inventory file for Komodo Periphery and Locket deployment.
#
# IMPORTANT: For best automation with Komodo Actions, name your inventory
# hosts EXACTLY the same as they appear in the Komodo UI.
#
# CONNECTION MODES:
#   - core_to_periphery: Komodo Core connects TO Periphery (requires port 8120 exposed)
#     Used when Core and Periphery are on the same Docker network
#   - periphery_to_core: Periphery connects TO Core (no exposed ports needed)
#     Used for remote servers that need to connect outbound to Core
# =============================================================================

all:
  # ---------------------------------------------------------------------------
  # HOSTS
  # ---------------------------------------------------------------------------
  hosts:
    # Names should match exactly what's shown in Komodo UI
    arm1-oci:
      ansible_host: 132.145.27.89
      ansible_user: ubuntu
      # Core→Periphery: Same Docker network as Komodo Core
      # Use internal Docker hostname, NOT external IP
      periphery_connection_mode: core_to_periphery
      periphery_address: "https://komodo-periphery:8120"
      docker_network: pangolin

    cax41-hetzner:
      ansible_host: "{{ lookup('env', 'HETZNER_IP') | default('5.78.79.85') }}"
      ansible_user: root
      # Periphery→Core: Remote server connects outbound
      periphery_connection_mode: periphery_to_core
      periphery_address: "https://{{ ansible_host }}:8120"
      docker_network: pangolin

    bunchloch:
      ansible_host: localhost
      ansible_user: cliste
      ansible_connection: local
      # Periphery→Core: Local dev connects outbound
      periphery_connection_mode: periphery_to_core
      periphery_address: "https://host.docker.internal:8120"
      docker_network: pangolin

  # ---------------------------------------------------------------------------
  # GLOBAL VARIABLES
  # ---------------------------------------------------------------------------
  vars:
    # No become password configured - using passwordless sudo

    # SSH key (path inside the ansible container)
    ansible_ssh_private_key_file: /root/.ssh/id_ed25519

    # -------------------------------------------------------------------------
    # PERIPHERY CONFIGURATION (Global)
    # -------------------------------------------------------------------------
    # Komodo Core address for outbound connections
    komodo_core_address: "wss://komodo.cianfhoghlaim.ie"
    komodo_external_address: "https://komodo.cianfhoghlaim.ie"

    # Default connection mode (can be overridden per host)
    periphery_connection_mode: periphery_to_core

    # -------------------------------------------------------------------------
    # LOCKET CONFIGURATION (Global)
    # -------------------------------------------------------------------------
    # Enable locket on all servers
    locket_enabled: true
    locket_provider: op-connect

    # 1Password Connect settings (running on arm1.oci - Oracle Cloud)
    locket_op_connect_host: "http://132.145.27.89:8080"

    # 1Password Connect token - ENCRYPTED WITH VAULT
    locket_op_connect_token: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      5172c220ddfc0524c0030fc96250483803fa22a71216c1e813612cd76ad20749e78e8e6ed47150d1
      96ec21378621ff3f32190e4eb75cce82be5f733f3728bae0f70484ab8a7b42aa1895360fd66319e8
      4ff6392ecdd4d57f8666167145a69e234b9a015767763d0733dd5f89d89e1080c988962797f693d1
      9e3390c7aa0226d2aa6a4386e1aff24ada839a356f1c0095988f6bf4ea69580e6c11721b268d11c1
      a8e49d5dad671c33283e5bde1bc5f06668f2b68ac010cea2a2def909cd623cdec02f31ec43bd0f21
      c2716d7e400fa589b4feaca4bddd82e0978c50851af1265d98e2d9e14cef608d30f46caf131493ad
      d29be35ff80c26b3b8305f99664d8e5666f93573d315b70d00f8fd72a2c8f5998d492565913ab72f
      2f4e4f951c3c1809fea1e5f603f0c56176075e37265a43f39068970d56551077ce17e69826c85be4
      6da797d32bf6965eb412e64009c4425d0019eac6f044e237292e1623c95a4ab0cd0bf5a406a2db85
      33eb7d52b015dcc6f9612e6362106565e6cebbe71dc54c49a90387a24e5c008ae166f28a9179efe8
      0952c729b48fa68fa8ab405dad969d94846019113cab835ee1d18025a576f9b3e8f3b1f739fa7bc1
      1be2f23c4344cd44e633ded825bea3e00e23c41539e9b402570511b2e85b3076bc5af133ee76148e
      70af11d1c71b28a14859cf9497077496732de95cc277697e4be3b65118aae09f665cf8bbedd5fdda
      18095cabbcd32acfbc82682c8ed1b33e49643546ac3db51ec8fe2fc7fc370e203d9ff8c546b999cd
      76b4e346d9d660c58098c3bd501834d87fae4bc75f483e4eaae34835be1b592a7b36916946e6dfad
