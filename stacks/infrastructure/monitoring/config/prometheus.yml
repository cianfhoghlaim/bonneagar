# =============================================================================
# PROMETHEUS - Master scrape config for the cianfhoghlaim platform
# =============================================================================
# Scrapes every container on the cianfhoghlaim Docker network that exposes
# /metrics (or has an alternate scrape path declared).
# =============================================================================
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: cianfhoghlaim
    region: arm1-oci

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ---------------------------------------------------------------------------
  # Self
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels: { stack: "infrastructure", service: "prometheus" }

  # ---------------------------------------------------------------------------
  # cAdvisor (host container metrics)
  # ---------------------------------------------------------------------------
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels: { stack: "infrastructure", service: "cadvisor" }

  # ---------------------------------------------------------------------------
  # Beszel (host system metrics)
  # ---------------------------------------------------------------------------
  - job_name: beszel
    static_configs:
      - targets: ["beszel:8090"]
        labels: { stack: "storage", service: "beszel" }

  # ---------------------------------------------------------------------------
  # LiteLLM (LLM gateway)
  # ---------------------------------------------------------------------------
  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]
        labels: { stack: "engineering", service: "litellm", tier: "gateway" }

  # ---------------------------------------------------------------------------
  # n8n (workflow)
  # ---------------------------------------------------------------------------
  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n:5678"]
        labels: { stack: "engineering", service: "n8n", tier: "workflow" }

  # ---------------------------------------------------------------------------
  # Vikunja (task management)
  # ---------------------------------------------------------------------------
  - job_name: vikunja
    static_configs:
      - targets: ["vikunja:3456"]
        labels: { stack: "tools", service: "vikunja", tier: "task-management" }

  # ---------------------------------------------------------------------------
  # cal-diy (scheduling)
  # ---------------------------------------------------------------------------
  - job_name: cald-diy
    static_configs:
      - targets: ["calcom-web:3000"]
        labels: { stack: "tools", service: "cal-diy", tier: "scheduling" }

  # ---------------------------------------------------------------------------
  # Dagster (unified)
  # ---------------------------------------------------------------------------
  - job_name: dagster
    metrics_path: /server_info
    static_configs:
      - targets: ["dagster:3000"]
        labels: { stack: "storage", service: "dagster", tier: "orchestration" }

  # ---------------------------------------------------------------------------
  # Langfuse (LLM observability)
  # ---------------------------------------------------------------------------
  - job_name: langfuse
    metrics_path: /metrics
    static_configs:
      - targets: ["langfuse-web:3000"]
        labels: { stack: "machine_learning", service: "langfuse", tier: "observability" }

  # ---------------------------------------------------------------------------
  # MLflow
  # ---------------------------------------------------------------------------
  - job_name: mlflow
    static_configs:
      - targets: ["mlflow:5000"]
        labels: { stack: "machine_learning", service: "mlflow", tier: "observability" }

  # ---------------------------------------------------------------------------
  # PostgreSQL exporters (per-stack)
  # ---------------------------------------------------------------------------
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels: { stack: "shared", service: "postgres-exporter", tier: "database" }

  # ---------------------------------------------------------------------------
  # Redis exporters
  # ---------------------------------------------------------------------------
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels: { stack: "shared", service: "redis-exporter", tier: "cache" }

  # ---------------------------------------------------------------------------
  # Kafka exporter
  # ---------------------------------------------------------------------------
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels: { stack: "storage", service: "kafka", tier: "streaming" }

  # ---------------------------------------------------------------------------
  # Node exporter (host metrics)
  # ---------------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { stack: "host", service: "node-exporter", tier: "system" }
