environment = """
PAPERLESS_URL=https://paperless.cianfhoghlaim.ie
PAPERLESS_TIME_ZONE=Europe/Dublin
INFISICAL_HOST=http://infisical-backend:8080
LOCKET_MODE=watch
"""
