# Browser AgentOS Configuration
# Web Automation Agent Runtime

name: Browser Automation AgentOS
id: browser-agent-os
version: "1.0.0"

# Quick prompts for common queries
quick_prompts:
  - name: "Scrape Page"
    description: "Extract content from a webpage"
    prompt: "Scrape and extract the main content from"
    icon: "download"

  - name: "Fill Form"
    description: "Automate form filling"
    prompt: "Navigate to and fill the form at"
    icon: "edit"

  - name: "Take Screenshot"
    description: "Capture webpage screenshot"
    prompt: "Take a screenshot of"
    icon: "camera"

  - name: "Extract Data"
    description: "Extract structured data"
    prompt: "Extract structured data from"
    icon: "table"

  - name: "Multi-page Crawl"
    description: "Crawl multiple pages"
    prompt: "Crawl and extract from all pages at"
    icon: "layers"

# Agent configuration
agents:
  stagehand-agent:
    enabled: true
    model: claude-sonnet-4-20250514
    description: "Vision-driven web automation using natural language"

  crawl4ai-agent:
    enabled: true
    model: gpt-4o
    description: "High-performance web scraping with JavaScript rendering"

  skyvern-agent:
    enabled: true
    model: gpt-4o
    description: "RPA-style browser workflows for complex tasks"

# Team configuration
teams:
  browser-orchestrator:
    enabled: true
    model: gpt-4o
    share_member_interactions: true
    description: "Routes to best backend for each task"

# Session configuration
sessions:
  storage: sqlite
  db_file: ./storage/sessions/browser_team.db
  ttl_hours: 24

# A2A configuration
a2a:
  enabled: true
  require_service_auth: false
  allowed_services:
    - oideachais
    - crypteolas
    - aleyum

# Backend configuration
backends:
  stagehand:
    enabled: true
    url: "${STAGEHAND_URL:-http://localhost:3100}"
  crawl4ai:
    enabled: true
    url: "${CRAWL4AI_URL:-http://localhost:11235}"
  skyvern:
    enabled: true
    url: "${SKYVERN_URL:-http://localhost:8000}"
  browserbase:
    enabled: true
    api_key: "${BROWSERBASE_API_KEY}"

# Observability
observability:
  langfuse_enabled: true
  trace_level: info
