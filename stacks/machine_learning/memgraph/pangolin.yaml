# Pangolin auto-discovery labels for Memgraph
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  memgraph-lab:
    labels:
      - "pangolin.private-resources.memgraph-lab.name=Memgraph Lab"
      - "pangolin.private-resources.memgraph-lab.mode=http"
      - "pangolin.private-resources.memgraph-lab.destination=memgraph-lab:3000"
      - "pangolin.private-resources.memgraph-lab.protocol=http"
      - "pangolin.private-resources.memgraph-lab.roles[0]=Member"
      - "pangolin.private-resources.memgraph-lab.full-domain=memgraph.cianfhoghlaim.ie"