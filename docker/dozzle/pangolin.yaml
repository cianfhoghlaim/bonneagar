# Pangolin auto-discovery labels for Dozzle
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  dozzle:
    labels:
      - "pangolin.resource.name=Dozzle"
      - "pangolin.resource.domain=dozzle.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://dozzle:8080"
      - "pangolin.resource.middlewares=tinyauth"
