# =============================================================================
# GARAGE - Distributed S3-Compatible Storage
# =============================================================================
# Lightweight, self-hosted S3-compatible object storage.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
#
# NOTE: Requires garage.toml configuration file. See Garage documentation.
# =============================================================================

name: garage

services:
  # ---------------------------------------------------------------------------
  # GARAGE - S3-Compatible Storage
  # ---------------------------------------------------------------------------
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: garage
    restart: unless-stopped
    ports:
      - "${GARAGE_RPC_PORT:-3901}:3901"
      - "${GARAGE_S3_API_PORT:-3900}:3900"
      - "${GARAGE_K2V_API_PORT:-3902}:3902"
      - "${GARAGE_WEB_PORT:-3903}:3903"
      - "${GARAGE_ADMIN_PORT:-3904}:3904"
    environment:
      RUST_LOG: ${RUST_LOG:-garage=info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - garage

volumes:
  garage-meta:
  garage-data:

networks:
  garage:
    driver: bridge
