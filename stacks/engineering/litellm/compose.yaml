name: litellm

services:
  # ---------------------------------------------------------------------------
  # LITELLM GATEWAY
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    # Command: load the model registry from /app/config/config.yaml
    command:
      - "--config=/app/config/config.yaml"
      - "--host=0.0.0.0"
      - "--port=4000"
      - "--num_workers=4"
      - "--detailed_debug=false"
    ports:
      - "4000:4000" # Map the container port to the host
    volumes:
      - ./config:/app/config:ro
      - ../../stedding/huggingface:/stedding/huggingface:ro  # shared HF cache (read-only)
    environment:
      # Gateway
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-}
      # Database (LiteLLM's own Postgres, separate from lakehouse)
      DATABASE_URL: ${LITELLM_DATABASE_URL}
      STORE_MODEL_IN_DB: "True"
      # Cloud LLM providers
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      Z_AI_API_KEY: ${Z_AI_API_KEY}
      ZAI_API_KEY: ${ZAI_API_KEY}
      # OpenCode Go (per Go.md)
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY}
      OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
      # HuggingFace
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      HF_HOME: /stedding/huggingface
      HF_HUB_CACHE: /stedding/huggingface/hub
      HF_HUB_DOWNLOAD_TIMEOUT: "600"
      # Observability
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      LANCEDB_API_KEY: ${LANCEDB_API_KEY:-}
      # Feature flags
      USE_GEMINI_3: ${USE_GEMINI_3:-false}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
      # Python (LiteLLM's telemetry path)
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --no-verbose --tries=1 http://localhost:4000/health/liveliness || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    networks:
      - cianfhoghlaim
      - lakehouse

  # ---------------------------------------------------------------------------
  # LITELLM POSTGRES (separate from lakehouse, holds model registry)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_POSTGRES_DB:-litellm}
      POSTGRES_USER: ${LITELLM_POSTGRES_USER:-llmproxy}
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD}
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${LITELLM_POSTGRES_DB:-litellm} -U ${LITELLM_POSTGRES_USER:-llmproxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # PROMETHEUS (LiteLLM exposes /metrics)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    container_name: litellm-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    networks:
      - cianfhoghlaim

volumes:
  prometheus_data:
    driver: local
  litellm_postgres_data:
    name: litellm_postgres_data

networks:
  cianfhoghlaim:
    driver: bridge
  lakehouse:
    name: lakehouse_lakehouse
    external: true
