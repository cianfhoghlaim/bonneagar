# =============================================================================
# UIRLÍSÍ DEV-TOOLS STACKS
# =============================================================================
# Development tools deployed across sites.
# These use ${DOMAIN} and ${SITE_ID} environment variable substitution.
# =============================================================================

# -----------------------------------------------------------------------------
# GLANCE - Dashboard
# -----------------------------------------------------------------------------
[[stack]]
name = "glance-bunchloch"
description = "Personal dashboard with customizable widgets"
tags = ["host:bunchloch", "tier:devtools"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/glance"
file_paths = ["compose.yaml", "pangolin.yaml"]
environment = """
DOMAIN=cianfhoghlaim.ie
SITE_ID=bunchloch
"""

