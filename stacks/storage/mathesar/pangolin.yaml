# Pangolin auto-discovery labels for Mathesar
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  mathesar:
    labels:
      - "pangolin.private-resources.mathesar.name=Mathesar"
      - "pangolin.private-resources.mathesar.mode=http"
      - "pangolin.private-resources.mathesar.destination-port=8000"
      - "pangolin.private-resources.mathesar.protocol=http"
      - "pangolin.private-resources.mathesar.roles[0]=Member"
      - "pangolin.private-resources.mathesar.full-domain=mathesar.cianfhoghlaim.ie"