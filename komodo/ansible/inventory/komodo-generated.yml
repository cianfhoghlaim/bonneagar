all:
  hosts:
    bunchloch:
      ansible_host: "host.docker.internal"
      ansible_user: cliste
      ansible_become: false  # macOS doesn't need sudo for locket install
    security.hetzner:
      ansible_host: "78.47.231.137"
      ansible_user: root
    arm1.oci:
      ansible_host: "132.145.27.89"

  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: /root/.ssh/id_ed25519

    # Periphery version (use specific version, not "latest")
    periphery_version: "2.0.0-dev-90"

    # Periphery configuration (outbound mode)
    periphery_core_address: "wss://komodo.local"
    periphery_mode: outbound
    periphery_server_enabled: false
    periphery_passkey_op_ref: "op://dev-baile/komodo/passkey"

    # Locket configuration
    locket_enabled: true
    locket_provider: op-connect
    locket_op_connect_host: "http://connect.internal:8080"

  children:
    # All hosts that get locket installed (for op:// refs in compose files)
    locket:
      hosts:
        security.hetzner:
        arm1.oci:
        bunchloch:

    # Hosts that get periphery + locket (Linux servers managed by Komodo)
    komodo:
      vars:
        periphery_agent_secrets:
          - name: "PERIPHERY_PASSKEYS"
            value: "{{ periphery_passkey_op_ref }}"
          - name: "OP_CONNECT_HOST"
            value: "{{ locket_op_connect_host }}"
      hosts:
        security.hetzner:
        arm1.oci:

    # Core hosts (for reference - Komodo Core runs here)
    core:
      hosts:
        bunchloch:

    # Locket-only hosts (no periphery - e.g., macOS)
    locket_only:
      hosts:
        bunchloch:
