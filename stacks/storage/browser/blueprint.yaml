# =============================================================================
# BROWSER STACK - Pangolin Blueprint
# =============================================================================
# Defines private routing for Browser automation services via Pangolin/Newt.
#
# Services exposed:
#   - browser.cianfhoghlaim.ie     -> API (port 8000)
#   - stagehand.cianfhoghlaim.ie   -> Stagehand (port 3100)
#   - skyvern.cianfhoghlaim.ie     -> Skyvern API (port 8000)
#   - skyvern-ui.cianfhoghlaim.ie  -> Skyvern UI (port 8080)
#
# LOADING:
#   Via Newt CLI:     newt --blueprint-file blueprint.yaml
#   Via directory:    Place in /opt/newt/blueprints/
#   Via sync script:  ./scripts/sync-blueprints.sh
# =============================================================================

private-resources:
  browser-api:
    name: "Browser API"
    full-domain: "browser.cianfhoghlaim.ie"
    mode: http
    destination-port: 8000
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member

  stagehand:
    name: "Stagehand"
    full-domain: "stagehand.cianfhoghlaim.ie"
    mode: http
    destination-port: 3100
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member

  skyvern:
    name: "Skyvern"
    full-domain: "skyvern.cianfhoghlaim.ie"
    mode: http
    destination-port: 8000
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member

  skyvern-ui:
    name: "Skyvern UI"
    full-domain: "skyvern-ui.cianfhoghlaim.ie"
    mode: http
    destination-port: 8080
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member
