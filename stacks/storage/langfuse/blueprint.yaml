# =============================================================================
# LANGFUSE - Pangolin Blueprint
# =============================================================================
# Defines private routing for Langfuse via Pangolin/Newt.
#
# LOADING:
#   Via Newt CLI:     newt --blueprint-file blueprint.yaml
#   Via directory:    Place in /opt/newt/blueprints/
#   Via sync script:  ./scripts/sync-blueprints.sh
# =============================================================================

private-resources:
  langfuse:
    name: "Langfuse"
    full-domain: "langfuse.cianfhoghlaim.ie"
    mode: http
    destination-port: 3000
    protocol: http
    sites:
      - arm1-oci
    roles:
      - Member
