---
# =============================================================================
# SITE INFRASTRUCTURE PLAYBOOK
# =============================================================================
# Deploys site infrastructure (Newt + Periphery) to managed hosts
#
# USAGE:
#   Deploy to all sites:
#     ansible-playbook playbooks/site.yml
#
#   Deploy to specific host:
#     ansible-playbook playbooks/site.yml -l cax41-hetzner
#
#   Deploy to MacBook:
#     ansible-playbook playbooks/site.yml -l bunchloch
#
# PREREQUISITES:
#   1. Infisical running
#   2. Newt credentials created in Pangolin UI
#   3. Credentials stored in Infisical
# =============================================================================

- name: Deploy Site Infrastructure
  hosts: all
  become: "{{ 'false' if inventory_hostname == 'bunchloch' else 'true' }}"

  pre_tasks:
    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false
      register: docker_version

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "Docker version: {{ docker_version.stdout }}"

  roles:
    - role: newt
      tags:
        - newt
        - site

  post_tasks:
    - name: Show deployment summary
      ansible.builtin.debug:
        msg: |
          Site Infrastructure Deployed Successfully!

          Host: {{ inventory_hostname }}
          Pangolin Endpoint: {{ pangolin_endpoint }}
          Komodo Core: {{ periphery_core_address }}

          Services:
            - Newt (tunnel): {{ inventory_hostname }}-newt
            - Periphery (agent): {{ inventory_hostname }}-periphery

          Next Steps:
            1. Verify Newt connection in Pangolin UI
            2. Verify Periphery connection in Komodo UI
            3. Deploy storage stacks via Komodo
