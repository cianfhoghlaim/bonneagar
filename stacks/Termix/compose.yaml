name: termix
services:
  termix:
    image: ghcr.io/justinlawrence/termix:latest
    container_name: termix
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgresql://termix:${TERMIX_DB_PASSWORD}@termix-pg/termix
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 15s
    deploy:
      resources:
        limits: {memory: 512M, cpus: '1'}
    networks: [cianfhoghlaim]
  termix-pg:
    image: postgres:16
    container_name: termix-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: termix
      POSTGRES_USER: termix
      POSTGRES_PASSWORD: ${TERMIX_DB_PASSWORD}
    volumes: [termix_pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d termix -U termix"]
      interval: 10s; timeout: 5s; retries: 5
    networks: [cianfhoghlaim]
volumes:
  termix_pg_data: {driver: local}
networks:
  cianfhoghlaim: {driver: bridge}
