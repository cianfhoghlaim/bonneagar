# =============================================================================
# MULTI-CLOUD DEPLOYMENT PROCEDURE
# =============================================================================
# Deploys all infrastructure stacks across local, Hetzner, and Oracle Cloud.
# Executes deployments in dependency order with health checks.
#
# USAGE:
#   komodo-cli execute deploy-multi-cloud --target=all
#   komodo-cli execute deploy-multi-cloud --target=hetzner
#   komodo-cli execute deploy-multi-cloud --target=oci
#   komodo-cli execute deploy-multi-cloud --target=local
# =============================================================================

[[procedure]]
name = "deploy-multi-cloud"
description = "Deploy all infrastructure across multi-cloud environment"
type = "shell"
command = """
TARGET="${TARGET:-all}"

echo "Starting multi-cloud deployment: $TARGET"
echo "=========================================="

# -----------------------------------------------------------------------------
# DEPLOYMENT ORDER (to respect dependencies)
# -----------------------------------------------------------------------------
# Phase 1: Control Plane (OCI)
#   1. garage (S3 storage)
#   2. postgres (if standalone)
#   3. lakehouse-oci (Garage + Lakekeeper + Lance)
#   4. forgejo
#   5. forgejo-runner
#
# Phase 2: Production Workloads (Hetzner)
#   1. postgres (shared)
#   2. lakekeeper-hetzner
#   3. lance-hetzner
#   4. ducklake-hetzner
#   5. forgejo-hetzner (backup)
#   6. forgejo-runner-hetzner
#   7. dagster-unified
#
# Phase 3: Development (Local)
#   1. lakehouse (dev)
#   2. dagster-dev
# -----------------------------------------------------------------------------

if [ "$TARGET" = "all" ] || [ "$TARGET" = "oci" ]; then
  echo ""
  echo ">>> DEPLOYING ORACLE CLOUD (arm1-oci)"
  echo "-----------------------------------"

  # Control Plane
  echo "Deploying Garage S3..."
  komodo-cli deploy garage --server arm1-oci

  echo "Deploying Lakehouse OCI..."
  komodo-cli deploy lakehouse-oci --server arm1-oci

  echo "Running Lakekeeper migrations..."
  komodo-cli execute lakehouse-oci-migrate --server arm1-oci

  echo "Deploying Forgejo..."
  komodo-cli deploy forgejo --server arm1-oci

  echo "Deploying Forgejo Runner..."
  komodo-cli deploy forgejo-runner --server arm1-oci

  echo "Health checks..."
  komodo-cli execute lakehouse-oci-health --server arm1-oci
fi

if [ "$TARGET" = "all" ] || [ "$TARGET" = "hetzner" ]; then
  echo ""
  echo ">>> DEPLOYING HETZNER (cax41-hetzner)"
  echo "------------------------------------"

  # Databases first
  echo "Deploying PostgreSQL..."
  komodo-cli deploy postgres --server cax41-hetzner

  # Lakehouse components
  echo "Deploying Lakekeeper Hetzner..."
  komodo-cli deploy lakekeeper-hetzner --server cax41-hetzner

  echo "Running Lakekeeper migrations..."
  komodo-cli execute lakekeeper-hetzner-migrate --server cax41-hetzner

  echo "Deploying Lance Namespace..."
  komodo-cli deploy lance-hetzner --server cax41-hetzner

  echo "Initializing DuckLake..."
  komodo-cli deploy ducklake-hetzner --server cax41-hetzner
  komodo-cli execute ducklake-init-cdc --server cax41-hetzner

  # Forgejo backup
  echo "Deploying Forgejo backup..."
  komodo-cli deploy forgejo-hetzner --server cax41-hetzner

  echo "Deploying Forgejo Runner Hetzner..."
  komodo-cli deploy forgejo-runner-hetzner --server cax41-hetzner

  # Pipeline orchestration
  echo "Deploying Dagster Unified..."
  komodo-cli deploy dagster-unified --server cax41-hetzner

  echo "Health checks..."
  komodo-cli execute lakekeeper-hetzner-health --server cax41-hetzner
  komodo-cli execute lance-hetzner-health --server cax41-hetzner
fi

if [ "$TARGET" = "all" ] || [ "$TARGET" = "local" ]; then
  echo ""
  echo ">>> DEPLOYING LOCAL (bunchloch)"
  echo "------------------------------"

  echo "Deploying Lakehouse dev..."
  komodo-cli deploy lakehouse --server bunchloch

  echo "Running migrations..."
  komodo-cli execute lakehouse-migrate --server bunchloch

  echo "Deploying Dagster dev..."
  komodo-cli deploy dagster-dev --server bunchloch
fi

echo ""
echo ">>> MULTI-CLOUD DEPLOYMENT COMPLETE"
echo "===================================="
echo "Verify deployment:"
echo "  - OCI:      https://komodo.cianfhoghlaim.ie"
echo "  - Hetzner:  https://komodo.cianfhoghlaim.ie (filter by server)"
echo "  - Local:    docker ps"
"""

# -----------------------------------------------------------------------------
# ROLLBACK PROCEDURE
# -----------------------------------------------------------------------------
[[procedure]]
name = "rollback-multi-cloud"
description = "Rollback all stacks to previous stable version"
type = "shell"
command = """
TARGET="${TARGET:-all}"

echo "Starting multi-cloud rollback: $TARGET"
echo "======================================"

if [ "$TARGET" = "all" ] || [ "$TARGET" = "oci" ]; then
  echo "Rolling back OCI stacks..."
  komodo-cli execute rollback --stack lakehouse-oci --server arm1-oci
  komodo-cli execute rollback --stack forgejo --server arm1-oci
fi

if [ "$TARGET" = "all" ] || [ "$TARGET" = "hetzner" ]; then
  echo "Rolling back Hetzner stacks..."
  komodo-cli execute rollback --stack lakekeeper-hetzner --server cax41-hetzner
  komodo-cli execute rollback --stack lance-hetzner --server cax41-hetzner
  komodo-cli execute rollback --stack dagster-unified --server cax41-hetzner
fi

echo "Rollback complete"
"""

# -----------------------------------------------------------------------------
# HEALTH CHECK PROCEDURE
# -----------------------------------------------------------------------------
[[procedure]]
name = "health-check-multi-cloud"
description = "Health check all deployed stacks across clouds"
type = "shell"
command = """
echo "Multi-Cloud Health Check"
echo "========================"

# OCI
echo ""
echo "Oracle Cloud (arm1-oci):"
echo "  - Garage:      $(curl -sf http://localhost:3900/health && echo OK || echo FAIL)"
echo "  - Lakekeeper:  $(curl -sf http://localhost:8181/v1/config && echo OK || echo FAIL)"
echo "  - Forgejo:     $(curl -sf https://git.cianfhoghlaim.ie/api/v1/version && echo OK || echo FAIL)"

# Hetzner (via Komodo API)
echo ""
echo "Hetzner (cax41-hetzner):"
komodo-cli execute lakekeeper-hetzner-health --server cax41-hetzner 2>/dev/null || echo "  Health check not available"

# Local
echo ""
echo "Local (bunchloch):"
docker ps --filter "name=lakehouse" --format "{{.Names}}: {{.Status}}"
"""

# -----------------------------------------------------------------------------
# BACKUP PROCEDURE
# -----------------------------------------------------------------------------
[[procedure]]
name = "backup-multi-cloud"
description = "Backup all lakehouse instances across clouds"
type = "shell"
command = """
TIMESTAMP=$(date +%Y%m%d_%H%M%S)
echo "Creating multi-cloud backup: $TIMESTAMP"

# OCI Backup
echo "Backing up OCI lakehouse..."
komodo-cli execute lakehouse-oci-backup --server arm1-oci

# Hetzner Backup
echo "Backing up Hetzner databases..."
docker exec cax41-hetzner-postgres pg_dump -U lakekeeper lakekeeper_hetzner | gzip > /tmp/hetzner_backup_${TIMESTAMP}.sql.gz

# Local Backup
echo "Backing up local lakehouse..."
docker exec lakehouse-postgres pg_dump -U lakekeeper lakekeeper | gzip > /tmp/local_backup_${TIMESTAMP}.sql.gz

echo "Backup complete: ${TIMESTAMP}"
"""
