# =============================================================================
# Oideachais — Locket sidecar (MERGED canonical)
# =============================================================================
# Injects secrets from Infisical dev-baile vault at runtime.
#
# compose.yaml declares the three app services (dagster, api, frontend)
# without any locket reference; this file adds:
#   1. The `locket` sidecar service (ghcr.io/cianfhoghlaim/locket:latest).
#   2. `depends_on: locket: service_healthy` and `env_file: /run/secrets/...`
#      to each app service so the secrets volume is mounted and the env
#      file is loaded before the apps start.
#   3. A `locket_secrets` tmpfs volume (in-process to this stack). The
#      external `cianfhoghlaim_locket_secrets` volume is reserved for future
#      cross-stack secret sharing; for now each stack materialises its own.
#
# In production the full chain is:
#   docker compose -f compose.yaml -f sidecar.yaml -f pangolin.yaml up -d

services:
  locket:
    image: ghcr.io/cianfhoghlaim/locket:latest
    container_name: cianfhoghlaim-oideachais-locket
    restart: unless-stopped
    env_file:
      - ./secrets.env
    environment:
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-dev-baile}
      TEMPLATE_PATH: /etc/locket/secrets.env
      OUTPUT_PATH: /run/secrets/locket/secrets.env
    volumes:
      - ./secrets.env:/etc/locket/secrets.env:ro
      - locket_secrets:/run/secrets/locket:rw
    healthcheck:
      test: ["CMD-SHELL", "test -f /run/secrets/locket/secrets.env"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cianfhoghlaim

  dagster:
    depends_on:
      locket:
        condition: service_healthy
    env_file:
      - /run/secrets/locket/secrets.env
    volumes:
      - locket_secrets:/run/secrets/locket:ro

  api:
    depends_on:
      locket:
        condition: service_healthy
    env_file:
      - /run/secrets/locket/secrets.env
    volumes:
      - locket_secrets:/run/secrets/locket:ro

  frontend:
    depends_on:
      locket:
        condition: service_healthy
    env_file:
      - /run/secrets/locket/secrets.env
    volumes:
      - locket_secrets:/run/secrets/locket:ro

volumes:
  locket_secrets:
    external: true
    name: cianfhoghlaim_locket_secrets

networks:
  cianfhoghlaim:
    external: true
