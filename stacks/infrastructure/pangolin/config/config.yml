# Pangolin Enterprise Edition Configuration
# Docs: https://docs.pangolin.net/self-host/advanced/config-file

gerbil:
    start_port: 51820
    base_endpoint: "pangolin.cianfhoghlaim.ie"

app:
    dashboard_url: "https://pangolin.cianfhoghlaim.ie"
    log_level: "info"
    telemetry:
        anonymous_usage: false

domains:
    cianfhoghlaim:
        base_domain: "cianfhoghlaim.ie"
        cert_resolver: "letsencrypt"
        prefer_wildcard_cert: true

server:
    secret: "devserversecret"
    trust_proxy: 1
    cors:
        origins: ["https://pangolin.cianfhoghlaim.ie"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        allowed_headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

traefik:
    http_entrypoint: "web"
    https_entrypoint: "websecure"

flags:
    require_email_verification: false
    disable_signup_without_invite: true
    disable_user_create_org: true
    allow_raw_resources: true
    enable_integration_api: true
    disable_local_sites: false
