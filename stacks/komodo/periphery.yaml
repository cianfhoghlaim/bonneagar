# =============================================================================
# KOMODO PERIPHERY - Standalone Agent Deployment
# =============================================================================
# Deploy Periphery on remote servers to allow Komodo Core to manage them.
#
# CONNECTION MODES:
#   1. core_to_periphery (inbound): Periphery listens, Core connects
#      - Set: PERIPHERY_MODE=inbound
#      - Use when on same Docker network as Core
#      - Core connects via container hostname (e.g., https://komodo-periphery:8120)
#
#   2. periphery_to_core (outbound): Periphery connects to Core
#      - Set: PERIPHERY_MODE=outbound (default)
#      - Set: CORE_ADDRESS=wss://komodo.cianfhoghlaim.ie:9120
#      - Set: CONNECT_AS=<server-name-in-komodo>
#      - Use for remote servers behind NAT
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

name: komodo-periphery

services:
  # ---------------------------------------------------------------------------
  # KOMODO PERIPHERY - Server Agent
  # ---------------------------------------------------------------------------
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:${KOMODO_IMAGE_TAG:-2-dev}
    container_name: komodo-periphery
    init: true
    restart: unless-stopped
    ports:
      - "${PERIPHERY_PORT:-8120}:8120"
    environment:
      # Authentication passkey (must match Core)
      KOMODO_PASSKEY: ${KOMODO_PASSKEY:-}
      PERIPHERY_PASSKEYS: ${KOMODO_PASSKEY:-}

      # =======================================================================
      # CONNECTION MODE SETTINGS
      # =======================================================================
      # Mode: "inbound" (Core→Periphery) or "outbound" (Periphery→Core)
      # For inbound: Leave PERIPHERY_CORE_ADDRESSES empty
      # For outbound: Set PERIPHERY_CORE_ADDRESSES and PERIPHERY_CONNECT_AS

      # Outbound mode: Connect to Core (leave empty for inbound mode)
      PERIPHERY_CORE_ADDRESSES: ${CORE_ADDRESS:-}
      PERIPHERY_CONNECT_AS: ${CONNECT_AS:-}
      PERIPHERY_CORE_TLS_INSECURE_SKIP_VERIFY: ${CORE_TLS_INSECURE:-true}

      # Stats monitoring interval
      PERIPHERY_STATS_POLL_INTERVAL: ${PERIPHERY_STATS_POLL_INTERVAL:-5s}

      # Allowed IPs for incoming connections (comma-separated, empty = all)
      PERIPHERY_ALLOWED_IPS: ${PERIPHERY_ALLOWED_IPS:-}
    volumes:
      # External docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock

      # Process visibility for stats
      - /proc:/proc

      # Periphery agent root directory
      # Must be the same inside and outside the container
      - ${PERIPHERY_ROOT:-~/.local/komodo-periphery}:/etc/komodo
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8120/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pangolin
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  pangolin:
    external: true
