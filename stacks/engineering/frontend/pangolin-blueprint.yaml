# Master Pangolin resource assignment for the 5 frontend workspaces
#
# Resolves port conflicts by giving each app a unique subdomain and using
# private-resource labels (vs public). The deploy environment controls which
# apps are exposed publicly; private resources are accessible only via
# Pangolin + Pocket ID OIDC.
#
# Pattern reference: https://github.com/fosrl/pangolin
# See: infrastructure/stacks/engineering/frontend/pangolin.yaml for the
# composable version of this same map.

# ============================================================================
# CIANFHOGHLAIM-OIDEACHAIS (Port conflicts resolved via subdomains)
# ============================================================================

# Public — oideachais.cianfhoghlaim.ie (default public route, OIDC-protected)
services:
  oideachais-web:
    labels:
      - "pangolin.public-resources.oideachais-web.name=Oideachais Web"
      - "pangolin.public-resources.oideachais-web.full-domain=oideachais.cianfhoghlaim.ie"
      - "pangolin.public-resources.oideachais-web.protocol=http"
      - "pangolin.public-resources.oideachais-web.targets[0].method=http"
      - "pangolin.public-resources.oideachais-web.targets[0].port=3001"

  # Private — oideachais-api.cianfhoghlaim.ie (OIDC + IP allowlist)
  oideachais-api:
    labels:
      - "pangolin.resource.name=Oideachais API"
      - "pangolin.resource.domain=oideachais-api.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://oideachais-api:8787"
      - "pangolin.resource.middlewares=oidc-oideachais,rate-limit"
      - "pangolin.resource.sso=Pocket ID"

# ============================================================================
# TUATHA-UI (Port 3004)
# ============================================================================

  # Public — tuath.cianfhoghlaim.ie
  tuatha-ui:
    labels:
      - "pangolin.public-resources.tuatha-ui.name=Túatha Game"
      - "pangolin.public-resources.tuatha-ui.full-domain=tuath.cianfhoghlaim.ie"
      - "pangolin.public-resources.tuatha-ui.protocol=http"
      - "pangolin.public-resources.tuatha-ui.targets[0].method=http"
      - "pangolin.public-resources.tuatha-ui.targets[0].port=3004"

# ============================================================================
# CROILAR-WEB (Port 3003)
# ============================================================================

  # Public — croilar.cianfhoghlaim.ie
  croilar-web:
    labels:
      - "pangolin.public-resources.croilar-web.name=Croílár Web"
      - "pangolin.public-resources.croilar-web.full-domain=croilar.cianfhoghlaim.ie"
      - "pangolin.public-resources.croilar-web.protocol=http"
      - "pangolin.public-resources.croilar-web.targets[0].method=http"
      - "pangolin.public-resources.croilar-web.targets[0].port=3003"

# ============================================================================
# CROILAR-PORTAL (Port 3000 — CONFLICTS with oideachais-frontend)
# Resolution: assign a different public domain, port 3000 stays local
# ============================================================================

  # Private — portal.cianfhoghlaim.ie (OIDC, IP-restricted)
  croilar-portal:
    labels:
      - "pangolin.resource.name=Croílár Portal"
      - "pangolin.resource.domain=portal.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://croilar-portal:3000"
      - "pangolin.resource.middlewares=oidc-portal,rate-limit"
      - "pangolin.resource.sso=Pocket ID"
      - "pangolin.resource.require-auth=true"

# ============================================================================
# CROILAR-HONO-API (Port 4000 — used by both hono-api and langfuse)
# Resolution: NOT exposed publicly; only via internal network
# ============================================================================

  # Private — auth.cianfhoghlaim.ie (OIDC issuer)
  hono-api:
    labels:
      - "pangolin.resource.name=Croílár Hono API"
      - "pangolin.resource.domain=auth.cianfhoghlaim.ie"
      - "pangolin.resource.target=http://hono-api:4000"
      - "pangolin.resource.middlewares=oidc-portal"
      - "pangolin.resource.sso=Pocket ID"
      - "pangolin.resource.require-auth=true"

# ============================================================================
# PORT CONFLICT RESOLUTION NOTES
# ============================================================================
#
# Conflict 1: oideachais-frontend (3000) vs croilar-portal (3000)
#   → oideachais-frontend is the live production service
#   → croilar-portal gets its own subdomain portal.cianfhoghlaim.ie
#   → Both can run on different containers in the same Docker network
#   → Local dev: only one can bind 3000 on host
#
# Conflict 2: langfuse-web (3001) vs (none)
#   → langfuse is the only service on 3001
#   → No conflict
#
# Conflict 3: oideachais-api (8787) vs (none)
#   → oideachais-api uses 8787, no conflict
#
# Conflict 4: langfuse-web (3000 internal) vs oideachais-frontend (3000)
#   → langfuse-web maps 3001:3000 — no actual conflict
#   → Both work because of port mapping
#
# DEPLOY ORDER (avoid 3000 host conflict in dev):
#   1. Stop oideachais-frontend container (if not needed in dev)
#   2. Start croilar-portal on 3000
#   OR
#   3. Map croilar-portal to 3000:3001 in docker-compose (host 3001, container 3000)
#
# KUBERNETES ALTERNATIVE: use NodePort services with assigned ranges
#   - 30000-30010: public oideachais
#   - 30020-30030: public tuatha
#   - 30040-30050: public croilar-web
#   - 30060-30070: private portal
#   - 30080-30090: private hono-api
# ============================================================================
