# =============================================================================
# STORAGE INFRASTRUCTURE RESOURCE SYNC
# =============================================================================
# GitOps configuration for all storage stack resources.
# Syncs servers, stacks, and procedures from this repository.
# =============================================================================

[[resource_sync]]
name = "storage-infrastructure"
description = "Storage stack infrastructure as code"

[resource_sync.config]
# Repository configuration - Forgejo at git.cianfhoghlaim.ie
repo = "cliste/bonneagar"
git_account = "forgejo"
branch = "main"

# Resource paths to sync
resource_path = [
  "bonneagar/komodo/servers/*.toml",
  "bonneagar/komodo/stacks/*.toml",
  "bonneagar/komodo/procedures/*.toml",
  "bonneagar/komodo/actions/*.toml",
  "bonneagar/komodo/resource-syncs/*.toml"
]

# Enable managed mode - Komodo owns these resources
managed = true
delete = false  # Don't delete resources not in Git (safety)

# Git provider for webhooks (Forgejo uses gitea/github compatible webhooks)
git_provider = "git.cianfhoghlaim.ie"

# Sync on webhook events
on_sync = true
on_pull = true

