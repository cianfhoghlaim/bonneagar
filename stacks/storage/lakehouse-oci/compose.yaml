# =============================================================================
# LAKEHOUSE OCI - Production Lakehouse on Oracle Cloud
# =============================================================================
# Integrates shared Garage S3 + Lakekeeper Iceberg + Lance Namespace
# Uses standalone PostgreSQL for catalog metadata
# =============================================================================

name: lakehouse-oci

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL - Lakekeeper Catalog Backend (OCI)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-oci-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${LAKEKEEPER_DB_USER:-lakekeeper}
      POSTGRES_PASSWORD: ${LAKEKEEPER_DB_PASSWORD}
      POSTGRES_DB: lakekeeper
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lakehouse-oci-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKEKEEPER_DB_USER:-lakekeeper}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # LAKEKEEPER MIGRATE - Database Migrations
  # ---------------------------------------------------------------------------
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakehouse-oci-migrate
    command: migrate
    environment:
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://${LAKEKEEPER_DB_USER:-lakekeeper}:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY}
      LAKEKEEPER__PG_SSL_MODE: prefer
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # LAKEKEEPER - Iceberg REST Catalog (OCI)
  # ---------------------------------------------------------------------------
  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakehouse-oci-lakekeeper
    restart: unless-stopped
    command: ["serve"]
    ports:
      - "${LAKEKEEPER_PORT:-8181}:8181"
      - "${LAKEKEEPER_METRICS_PORT:-9100}:9000"
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://${LAKEKEEPER_DB_USER:-lakekeeper}:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://${LAKEKEEPER_DB_USER:-lakekeeper}:${LAKEKEEPER_DB_PASSWORD}@postgres:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY}
      LAKEKEEPER__PG_SSL_MODE: prefer
      LAKEKEEPER__LISTEN_PORT: "8181"
      LAKEKEEPER__BASE_URI: ${LAKEKEEPER_BASE_URI:-https://lakekeeper.cianfhoghlaim.ie}
      LAKEKEEPER__SERVE_SWAGGER_UI: "true"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lakehouse
      - pangolin

  # ---------------------------------------------------------------------------
  # LANCE-NAMESPACE - Iceberg Adapter for Lance Tables
  # ---------------------------------------------------------------------------
  lance-namespace:
    build:
      context: ../lakehouse/lance-sidecar
      dockerfile: Dockerfile
    image: lakehouse-lance-namespace:latest
    container_name: lakehouse-oci-lance-namespace
    restart: unless-stopped
    ports:
      - "${LANCE_NAMESPACE_PORT:-8182}:8182"
    environment:
      ICEBERG_ENDPOINT: http://lakekeeper:8181
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-oci_production}
      ICEBERG_PREFIX: "oci/"
      LANCE_ROOT: s3://lance-oci/
      # Garage S3 credentials (from shared stack)
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: http://garage:3900
      AWS_REGION: garage
      SIDECAR_HOST: "0.0.0.0"
      SIDECAR_PORT: "8182"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      lakekeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8182/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - lakehouse
      - pangolin

volumes:
  lakehouse-oci-postgres:

networks:
  lakehouse:
    driver: bridge
  pangolin:
    external: true
