http:
    middlewares:
        authelia:
            forwardAuth:
                address: "http://authelia:9091/api/authz/forward-auth"
                authResponseHeaders:
                    - Remote-User
                    - Remote-Groups
                    - Remote-Name
                    - Remote-Email
                trustForwardHeader: true
        authentik:
            forwardAuth:
                address: "http://authentik:9000/outpost.goauthentik.io/auth/traefik"
                authResponseHeaders:
                    - X-authentik-username
                    - X-authentik-groups
                    - X-authentik-email
                    - X-authentik-name
                    - X-authentik-uid
                trustForwardHeader: true
        basic-auth:
            basicAuth:
                users:
                    - admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/
    services:
        failover-demo:
            failover:
                fallback: "backup"
                service: "main"
        failover-service:
            failover:
                fallback: "backup-service@file"
                service: "main-service@file"
        health-check:
            loadBalancer:
                healthCheck:
                    interval: "10s"
                    path: "/health"
                    timeout: "3s"
                servers:
                    - url: "http://backend:8080"
        multi-server-http:
            loadBalancer:
                servers:
                    - url: "http://server1:8080"
                    - url: "http://server2:8080"
        simple-http:
            loadBalancer:
                servers:
                    - url: "http://localhost:8080"
        simple-lb:
            loadBalancer:
                servers:
                    - url: "http://localhost:8080"
        traffic-mirror:
            mirroring:
                mirrors:
                    - name: test-service@file
                      percent: 10
                service: "main-service@file"
        weighted-demo:
            weighted:
                services:
                    - name: service1
                      weight: 3
                    - name: service2
                      weight: 1
        weighted-service:
            weighted:
                services:
                    - name: service1@file
                      weight: 3
                    - name: service2@file
                      weight: 1
tcp:
    services:
        tcp-service:
            loadBalancer:
                servers:
                    - address: "backend:9000"
        udp-service:
            loadBalancer:
                servers:
                    - address: "backend:53"
