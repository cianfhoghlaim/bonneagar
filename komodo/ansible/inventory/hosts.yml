---
# =============================================================================
# CIANFHOGHLAIM HYBRID DEPLOYMENT INVENTORY
# =============================================================================
# Hybrid deployment across:
#   - MacBook Pro M4 Max: GPU/ML workloads, development
#   - Hetzner CAX41: 24/7 production services
#   - Oracle ARM Free Tier: Lightweight services
# =============================================================================

all:
  vars:
    # Common SSH settings
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

    # Docker registry (optional private registry)
    docker_registry: ghcr.io/cianfhoghlaim

    # 1Password Connect settings (Locket)
    locket_enabled: true
    locket_provider: op-connect
    locket_op_connect_host: "http://connect.internal:8080"

    # Komodo Periphery
    periphery_version: "2.0.0-dev-90"
    periphery_mode: outbound
    periphery_passkey_op_ref: "op://dev-baile/komodo/passkey"

  children:
    # =========================================================================
    # LOCAL DEVELOPMENT (MacBook Pro M4 Max)
    # =========================================================================
    local:
      hosts:
        bunchloch:
          ansible_connection: local
          ansible_host: localhost

          # Machine specs
          machine_type: macbook_m4_max
          gpu_available: true
          ram_gb: 48

          # MLX/GGUF model deployment
          mlx_enabled: true
          mlx_models:
            - name: qwen2.5-vl-32b
              format: mlx-8bit
              vram_gb: 18
            - name: olmocr-2-7b
              format: mlx
              vram_gb: 8
            - name: qomhra-mistral-7b
              format: mlx
              vram_gb: 8
            - name: britllm-3b
              format: mlx
              vram_gb: 4

          # llama-swap for GGUF models
          llama_swap_enabled: true
          llama_swap_port: 8080

          # InvokeAI
          invokeai_enabled: true
          invokeai_models:
            - fibo-mlx
            - z-image-turbo
            - sdxl

          # Development services
          dagster_dev: true

    # =========================================================================
    # HETZNER CAX41 (32GB ARM - 24/7 Production)
    # =========================================================================
    hetzner:
      hosts:
        cax41-hetzner:
          ansible_host: "{{ lookup('env', 'HETZNER_IP') | default('REPLACE_WITH_PULUMI_OUTPUT') }}"
          ansible_user: root

          # Machine specs
          machine_type: hetzner_cax41
          architecture: arm64
          ram_gb: 32
          storage_gb: 320

          # Core infrastructure
          deploy_pangolin: true
          deploy_komodo: true
          deploy_onepassword: true

          # Pangolin configuration
          pangolin_domain: baile.ie
          pangolin_dashboard_url: https://pangolin.baile.ie
          pangolin_config_src: "{{ playbook_dir }}/../../pangolin/config"
          pangolin_op_token_src: "{{ playbook_dir }}/../../secrets/op_token"

          # Komodo configuration
          komodo_host: https://komodo.baile.ie
          komodo_periphery_enabled: true

          # 1Password Connect
          op_credentials_src: "{{ playbook_dir }}/../../secrets/1password-credentials.json"
          op_token_src: "{{ playbook_dir }}/../../secrets/op_token"
          op_connect_bind_address: "0.0.0.0"

          # Database services
          postgresql_enabled: true
          postgresql_version: "16"
          duckdb_enabled: true
          lancedb_enabled: true

          # Knowledge graphs
          memgraph_enabled: true
          cognee_enabled: true

          # Observability
          litellm_enabled: true
          langfuse_enabled: true
          mlflow_enabled: true
          datadog_enabled: true

          # Scraping stack
          browserbase_proxy: true
          firecrawl_self_hosted: false
          crawl4ai_enabled: true

          # Lightweight inference
          inference_models:
            - name: granite-docling-258m
              format: gguf
              ram_mb: 512
            - name: gemma-3n-e2b
              format: gguf-q4
              ram_mb: 2048
            - name: bge-m3
              format: onnx
              ram_mb: 1024

    # =========================================================================
    # ORACLE CLOUD FREE TIER (ARM - Lightweight Services)
    # =========================================================================
    oracle:
      hosts:
        arm1.oci:
          ansible_host: 132.145.27.89
          ansible_user: ubuntu

          # Machine specs
          machine_type: oracle_arm
          architecture: arm64
          ram_gb: 2
          storage_gb: 100

          # Lightweight services only
          valkey_enabled: true
          valkey_port: 6379

          # Webhook receiver
          webhook_receiver_enabled: true
          webhook_port: 9000

          # Health monitoring
          health_check_enabled: true
          uptime_kuma_enabled: true

    # =========================================================================
    # ROLE GROUPS
    # =========================================================================

    # All hosts that get Locket (secret injection)
    locket:
      hosts:
        bunchloch:
        cax41-hetzner:
        arm1.oci:

    # Hosts managed by Komodo (Linux servers)
    komodo:
      vars:
        periphery_agent_secrets:
          - name: PERIPHERY_PASSKEYS
            value: "{{ periphery_passkey_op_ref }}"
          - name: OP_CONNECT_HOST
            value: "{{ locket_op_connect_host }}"
      hosts:
        cax41-hetzner:
        arm1.oci:

    # Core infrastructure host
    infrastructure:
      hosts:
        cax41-hetzner:

    # Database hosts
    databases:
      hosts:
        cax41-hetzner:

    # ML inference hosts
    inference:
      hosts:
        bunchloch:
        cax41-hetzner:

    # GPU-capable hosts (for training workloads)
    gpu:
      hosts:
        bunchloch:

    # Monitoring endpoints
    monitoring:
      hosts:
        arm1.oci:
        cax41-hetzner:
