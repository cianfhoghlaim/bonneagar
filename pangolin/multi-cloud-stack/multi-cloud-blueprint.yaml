# =============================================================================
# PANGOLIN MULTI-CLOUD BLUEPRINT
# =============================================================================
# Declarative Pangolin resources for multi-cloud infrastructure routing.
# Defines all exposed services across OCI, OCI, and local environments.
#
# This blueprint is applied via Pangolin Integration API:
#   curl -X POST https://pangolin.cianfhoghlaim.ie/api/v1/blueprints \\
#     -H "Authorization: Bearer $PANGOLIN_API_KEY" \\
#     -d @bonneagar/storage/pangolin/multi-cloud-blueprint.yaml
# =============================================================================

organization: cianfhoghlaim

# -----------------------------------------------------------------------------
# SITES - Multi-Cloud Connectivity
# -----------------------------------------------------------------------------
sites:
  # OCI Site (Newt tunnel)
  - name: oci-prod
    description: "Oracle Cloud production site"
    type: newt
    config:
      subnet: 10.100.10.0/24
      endpoint: https://pangolin.cianfhoghlaim.ie

  # OCI Site (Newt tunnel)
  - name: oci-prod
    description: "OCI production site"
    type: newt
    config:
      subnet: 10.100.20.0/24
      endpoint: https://pangolin.cianfhoghlaim.ie

  # Local Development Site
  - name: local-dev
    description: "Local development environment"
    type: local
    config:
      subnet: 10.100.30.0/24

# -----------------------------------------------------------------------------
# PUBLIC RESOURCES - Forgejo (OCI)
# -----------------------------------------------------------------------------
public-resources:
  forgejo:
    name: "Forgejo Git Server"
    full-domain: git.cianfhoghlaim.ie
    targets:
      - port: 3000
        path: /
    middlewares:
      - rate-limit
      - security-headers

  forgejo-oci:
    name: "Forgejo Backup (OCI)"
    full-domain: git-oci.cianfhoghlaim.ie
    targets:
      - port: 3000
        path: /
    middlewares:
      - rate-limit

# -----------------------------------------------------------------------------
# PROTECTED RESOURCES - Lakehouse & Data
# -----------------------------------------------------------------------------
protected-resources:
  # OCI Lakehouse
  lakekeeper:
    name: "Lakekeeper Iceberg Catalog (OCI)"
    full-domain: lakekeeper.cianfhoghlaim.ie
    targets:
      - port: 8181
        path: /
    middlewares:
      - tinyauth
      - rate-limit

  lakekeeper-oci:
    name: "Lakekeeper Iceberg Catalog (OCI)"
    full-domain: lakekeeper-oci.cianfhoghlaim.ie
    targets:
      - port: 8181
        path: /
    middlewares:
      - tinyauth
      - rate-limit

  lance-namespace:
    name: "Lance Namespace Sidecar"
    full-domain: lance.cianfhoghlaim.ie
    targets:
      - port: 8182
        path: /
    middlewares:
      - tinyauth

  # Garage S3 API (with auth)
  garage-s3:
    name: "Garage S3 API"
    full-domain: s3.cianfhoghlaim.ie
    targets:
      - port: 3900
        path: /
    middlewares:
      - basic-auth

  garage-admin:
    name: "Garage Admin API"
    full-domain: garage-admin.cianfhoghlaim.ie
    targets:
      - port: 3904
        path: /
    middlewares:
      - tinyauth

# -----------------------------------------------------------------------------
# PRIVATE RESOURCES - Databases & Internal Services
# -----------------------------------------------------------------------------
private-resources:
  # OCI Internal Services
  postgres-oci:
    name: "PostgreSQL OCI"
    domain: postgres-oci.internal
    targets:
      - port: 5432

  qdrant-oci:
    name: "Qdrant Vector DB (OCI)"
    domain: qdrant-oci.internal
    targets:
      - port: 6333

  # OCI Databases
  memgraph-oci:
    name: "Memgraph Graph DB"
    domain: memgraph-oci.internal
    targets:
      - port: 7687

  falkordb-oci:
    name: "FalkorDB Graph"
    domain: falkordb-oci.internal
    targets:
      - port: 6379

  lancedb-oci:
    name: "LanceDB Vector DB"
    domain: lancedb-oci.internal
    targets:
      - port: 8080

  postgres-oci:
    name: "PostgreSQL OCI"
    domain: postgres-oci.internal
    targets:
      - port: 5432

  # Pipeline Orchestration
  dagster-oci:
    name: "Dagster (OCI)"
    domain: dagster-oci.internal
    targets:
      - port: 3335

  # ML Observability
  langfuse-oci:
    name: "Langfuse (OCI)"
    domain: langfuse-oci.internal
    targets:
      - port: 3000

  mlflow-oci:
    name: "MLflow (OCI)"
    domain: mlflow-oci.internal
    targets:
      - port: 5000

# -----------------------------------------------------------------------------
# OLM CLIENTS - VPN Access for Management
# -----------------------------------------------------------------------------
olm-clients:
  - name: oci-management
    description: "OCI management access"
    site: oci-prod
    allowed-ips:
      - 10.100.0.0/16  # Organization subnet

  - name: oci-management
    description: "OCI management access"
    site: oci-prod
    allowed-ips:
      - 10.100.0.0/16

# -----------------------------------------------------------------------------
# MIDDLEWARES - Reusable Components
# -----------------------------------------------------------------------------
middlewares:
  rate-limit:
    type: ratelimit
    config:
      rate: 100
      burst: 20

  security-headers:
    type: headers
    config:
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      Referrer-Policy: strict-origin-when-cross-origin

  tinyauth:
    type: sso
    config:
      provider: pocketid
      scope: openid profile email

  basic-auth:
    type: basicauth
    config:
      realm: "Cianfhoghlaim Internal Services"
# =============================================================================
# MULTI-CLOUD WIREGUARD CONFIGURATION
# =============================================================================
# WireGuard tunnel configuration for inter-cloud communication
# =============================================================================

# Peer: OCI Control Plane
[Peer OCI]
# Public key from OCI WireGuard
PublicKey = [[OCI_WIREGUARD_PUBLIC_KEY]]
# OCI endpoint (will connect outbound)
Endpoint = 132.145.27.89:51820
# Routes to OCI subnet
AllowedIPs = 10.100.10.0/24, 10.100.11.0/24
# Persistent keepalive
PersistentKeepalive = 25

# Peer: OCI Production
[Peer OCI]
# Public key from OCI WireGuard
PublicKey = [[OCI_WIREGUARD_PUBLIC_KEY]]
# OCI endpoint
Endpoint = [[OCI_IP]]:51820
# Routes to OCI subnet
AllowedIPs = 10.100.20.0/24, 10.100.21.0/24
PersistentKeepalive = 25

# Local Interface
[Interface]
# Private key for this site
PrivateKey = [[WIREGUARD_PRIVATE_KEY]]
# Local address in organization subnet
Address = 10.100.0.1/24
# Listen port (if accepting inbound connections)
ListenPort = 51820
# DNS for internal resolution
DNS = 10.100.0.53
