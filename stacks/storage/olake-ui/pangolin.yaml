# Pangolin auto-discovery labels for OLake
# Include with: docker compose -f compose.yaml -f pangolin.yaml up -d
services:
  olake-ui:
    labels:
      - "pangolin.private-resources.olake-ui.name=OLake UI"
      - "pangolin.private-resources.olake-ui.mode=http"
      - "pangolin.private-resources.olake-ui.destination-port=8000"
      - "pangolin.private-resources.olake-ui.protocol=http"
      - "pangolin.private-resources.olake-ui.roles[0]=Member"
      - "pangolin.private-resources.olake-ui.full-domain=olake.cianfhoghlaim.ie"