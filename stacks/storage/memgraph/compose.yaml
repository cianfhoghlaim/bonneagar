# =============================================================================
# MEMGRAPH - In-Memory Graph Database
# =============================================================================
# High-performance graph database with MAGE algorithms and Lab UI.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: memgraph

services:
  # ---------------------------------------------------------------------------
  # MEMGRAPH - Graph Database with MAGE Algorithms
  # ---------------------------------------------------------------------------
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: memgraph
    restart: unless-stopped
    ports:
      - "${MEMGRAPH_BOLT_PORT:-7687}:7687"
      - "${MEMGRAPH_HTTP_PORT:-7444}:7444"
    environment:
      MEMGRAPH_USER: ${MEMGRAPH_USER:-memgraph}
      MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD:-devpassword}
    volumes:
      - memgraph-lib:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    command: ["--log-level=${MEMGRAPH_LOG_LEVEL:-WARNING}"]
    healthcheck:
      test: ["CMD", "echo", ">", "/dev/tcp/localhost/7687"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memgraph

  # ---------------------------------------------------------------------------
  # MEMGRAPH LAB - Web UI
  # ---------------------------------------------------------------------------
  memgraph-lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab
    restart: unless-stopped
    ports:
      - "${MEMGRAPH_LAB_PORT:-3000}:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: "7687"
    depends_on:
      memgraph:
        condition: service_started
    networks:
      - memgraph

volumes:
  memgraph-lib:
  memgraph-log:

networks:
  memgraph:
    driver: bridge
