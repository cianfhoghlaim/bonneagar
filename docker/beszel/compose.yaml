# =============================================================================
# BESZEL - Lightweight Server Monitoring
# =============================================================================
# Server monitoring dashboard with lightweight agents.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
#
# NOTE: Deploy beszel-agent on each host to monitor. Generate SSH keys via
#       the Beszel Hub UI and configure BESZEL_SSH_KEY per agent.
# =============================================================================

name: beszel

services:
  # ---------------------------------------------------------------------------
  # BESZEL HUB - Monitoring Dashboard
  # ---------------------------------------------------------------------------
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    ports:
      - "${BESZEL_PORT:-8090}:8090"
    volumes:
      - beszel-data:/beszel_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - beszel

  # ---------------------------------------------------------------------------
  # BESZEL AGENT - System Metrics Collector (Optional, for local monitoring)
  # ---------------------------------------------------------------------------
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    profiles:
      - agent
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: ${BESZEL_AGENT_PORT:-45876}
      KEY: ${BESZEL_SSH_KEY:-ssh-ed25519 GENERATE_YOUR_OWN_KEY}

volumes:
  beszel-data:

networks:
  beszel:
    driver: bridge
