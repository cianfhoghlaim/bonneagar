# Forgejo Actions Runner
#
# Self-hosted CI/CD runner for Forgejo Actions
# Connects to Forgejo instance to execute workflows
#
# Requirements:
# - FORGEJO_RUNNER_REGISTRATION_TOKEN from Forgejo admin panel
# - Network access to Forgejo instance

services:
  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:5.0
    container_name: forgejo-runner
    restart: unless-stopped
    environment:
      # Runner configuration
      FORGEJO_RUNNER_NAME: ${FORGEJO_RUNNER_NAME:-forgejo-runner}
      FORGEJO_RUNNER_LABELS: ${FORGEJO_RUNNER_LABELS:-ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:runner-latest}

      # Connection settings
      FORGEJO_URL: ${FORGEJO_URL:-https://git.cianfhoghlaim.ie}
      FORGEJO_TOKEN: ${FORGEJO_RUNNER_TOKEN}

      # Docker-in-Docker for container jobs
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - forgejo_runner_data:/data
    networks:
      - pangolin
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  pangolin:
    external: true

volumes:
  forgejo_runner_data:
    name: forgejo_runner_data
