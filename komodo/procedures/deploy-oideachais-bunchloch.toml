# =============================================================================
# DEPLOY OIDEACHAIS-BUNCHLOCH PROCEDURE
# =============================================================================
# Deploys the Cianfhoghlaim Oideachais education platform to bunchloch (MacBook M4).
#
# Architecture:
#   bunchloch (MacBook M4 Max) — dagster (:3335), api (:8000), frontend (:3000)
#   Routed through Pangolin on arm1-oci:
#     oideachais.cianfhoghlaim.ie     → bunchloch:3000 (Pocket ID SSO)
#     api.oideachais.cianfhoghlaim.ie → bunchloch:8000 (Pocket ID SSO, API key, CORS)
#     dagster.oideachais.cianfhoghlaim.ie → bunchloch:3335 (Pocket ID SSO, VPN-only)
#
# Secrets injected via Locket + Infisical vault (dev-baile).
#
# Optional dependency: meaisínfhoghlaim/llama-swap (not started automatically
# due to 48 GB RAM reservation; bring up separately when on-device inference
# is needed).
#
# Usage:
#   km run procedure deploy-oideachais-bunchloch
# =============================================================================

[[procedure]]
name = "deploy-oideachais-bunchloch"
description = "Deploy Oideachais education platform to bunchloch (MacBook M4) — lakehouse + LiteLLM + Lancedb + Langfuse → oideachais-bunchloch → Pangolin routes → health checks"

# =============================================================================
# STAGE 0: Prerequisite docker resources
# =============================================================================
# The merged oideachais sidecar requires the cianfhoghlaim_locket_secrets
# external tmpfs volume. This is created idempotently by a small build.
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "prerequisites"

[[procedure.config.stages.executions]]
execution = { type = "RunBuild", params = { build = "oideachais-ensure-locket-volume" } }

# =============================================================================
# STAGE 1: Dependency Services
# =============================================================================
# Dependencies that must be running before oideachais starts:
#   - lakehouse (Garage S3 + Postgres + Lakekeeper + Lance Namespace) → arm1-oci
#   - litellm (LLM gateway) → bunchloch (per session decision)
#   - lancedb (vector database viewer) → bunchloch
#   - langfuse (LLM observability) → bunchloch
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "dependency-services"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "lakehouse" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "litellm-bunchloch" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "lancedb-bunchloch" } }

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "langfuse-bunchloch" } }

# =============================================================================
# STAGE 2: Oideachais Platform (bunchloch)
# =============================================================================

[[procedure.config.stages]]
name = "oideachais-platform"

[[procedure.config.stages.executions]]
execution = { type = "DeployStack", params = { stack = "oideachais-bunchloch" } }

# =============================================================================
# STAGE 3: Pangolin Routes (arm1-oci)
# =============================================================================
# Apply the Oideachais routing blueprint via Pangolin Integration API.
# Registers:
#   - oideachais.cianfhoghlaim.ie     → bunchloch:3000 (Pocket ID SSO)
#   - api.oideachais.cianfhoghlaim.ie → bunchloch:8000 (Pocket ID SSO + API key)
#   - dagster.oideachais.cianfhoghlaim.ie → bunchloch:3335 (Pocket ID SSO, VPN-only)
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "pangolin-routes"

[[procedure.config.stages.executions]]
execution = { type = "RunBuild", params = { build = "apply-oideachais-routes" } }

# =============================================================================
# STAGE 4: Health Verification (bunchloch)
# =============================================================================
# Verify all 3 services are healthy after deployment.
# -----------------------------------------------------------------------------

[[procedure.config.stages]]
name = "health-checks"

[[procedure.config.stages.executions]]
execution = { type = "RunBuild", params = { build = "oideachais-health-check" } }
