# =============================================================================
# KAPOWARR STACK
# =============================================================================
# Comic book management and automatic downloader
# =============================================================================

[[stack]]
name = "kapowarr"
description = "Comic book manager and automatic downloader"
tags = ["host:bunchloch", "tier:media", "type:comics", "domain:kapowarr.aleyum.com"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/kapowarr"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
KAPOWARR_DOMAIN=kapowarr.aleyum.com
KAPOWARR_NAME=Kapowarr
KAPOWARR_PORT=5656
TZ=Europe/Dublin
INFISICAL_URL=${INFISICAL_URL}
LOCKET_MODE=watch
"""
