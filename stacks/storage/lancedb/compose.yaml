# =============================================================================
# LANCEDB - Serverless Vector Database
# =============================================================================
# Vector database with optional S3/R2 FUSE mount for cloud storage.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
#
# NOTE: For S3/R2 storage, enable the 's3' profile and configure AWS credentials.
# =============================================================================

name: lancedb

services:
  # ---------------------------------------------------------------------------
  # LANCEDB VIEWER - Web UI
  # ---------------------------------------------------------------------------
  lancedb:
    image: ghcr.io/gordonmurray/lance-data-viewer:lancedb-0.24.3
    container_name: lancedb
    restart: unless-stopped
    ports:
      - "${LANCEDB_PORT:-8080}:8080"
    volumes:
      - lancedb-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # RCLONE S3 MOUNTER - FUSE Mount for S3/R2 (Optional)
  # ---------------------------------------------------------------------------
  lancedb-s3-mounter:
    image: rclone/rclone:latest
    container_name: lancedb-s3-mounter
    restart: unless-stopped
    profiles:
      - s3
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    command: >
      mount r2:${R2_BUCKET:-lance-embeddings} /data/s3
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 5G
      --daemon-wait 30s
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: ${RCLONE_PROVIDER:-Cloudflare}
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: ${AWS_ENDPOINT_URL:-}
    volumes:
      - type: bind
        source: ${LANCE_MOUNT_POINT:-./lance_mount_point}
        target: /data/s3
        bind:
          propagation: rshared
    networks:
      - cianfhoghlaim

volumes:
  lancedb-data:

networks:
  cianfhoghlaim:
    driver: bridge
