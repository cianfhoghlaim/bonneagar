# =============================================================================
# GARAGE - Pangolin Blueprint
# =============================================================================
# Note: S3 API endpoint is not SSO-protected for programmatic access.
# Web UI is SSO-protected.
# =============================================================================

public-resources:
  garage-s3:
    name: "Garage S3 API"
    full-domain: "s3.cianfhoghlaim.ie"
    protocol: "http"
    targets:
      - site: "arm1-oci"
        hostname: "garage"
        method: "http"
        port: 3900

  garage-web:
    name: "Garage Web"
    full-domain: "garage.cianfhoghlaim.ie"
    protocol: "http"
    auth:
      sso-enabled: true
      sso-roles:
        - Member
    targets:
      - site: "arm1-oci"
        hostname: "garage"
        method: "http"
        port: 3903
