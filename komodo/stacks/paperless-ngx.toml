[[stack]]
name = "paperless-ngx"
description = "Paperless-ngx — document management + OCR ingest (port 8000)"
tags = ["host:arm1-oci","tier:production","type:tool","domain:paperless.cianfhoghlaim.ie"]
[stack.config]
server_id = "arm1-oci"
run_directory = "/etc/komodo/sruth/team-workflow-stack/paperless-ngx"
