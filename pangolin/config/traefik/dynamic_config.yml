# =============================================================================
# TRAEFIK DYNAMIC CONFIGURATION
# =============================================================================

http:
  # ---------------------------------------------------------------------------
  # Middlewares
  # ---------------------------------------------------------------------------
  middlewares:
    # HTTP to HTTPS redirect
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Security headers for all traffic
    secure-headers:
      headers:
        # HSTS - Strict Transport Security
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        # Frame options
        frameDeny: true
        customFrameOptionsValue: "SAMEORIGIN"
        # XSS Protection
        browserXssFilter: true
        customBrowserXSSValue: "1; mode=block"
        # Content type sniffing
        contentTypeNosniff: true
        # Referrer policy
        referrerPolicy: "strict-origin-when-cross-origin"
        # Permissions policy
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        # Custom response headers
        customResponseHeaders:
          X-Robots-Tag: "noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex"
          X-Powered-By: ""
          Server: ""

    # TinyAuth Forward Authentication
    tinyauth:
      forwardAuth:
        address: "http://tinyauth:3000/api/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Email"
          - "Remote-Groups"

    # Rate limiting for API endpoints
    rate-limit-api:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # Rate limiting for auth endpoints
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 5
        period: 1m

    # Strict rate limiting for sensitive endpoints
    rate-limit-strict:
      rateLimit:
        average: 5
        burst: 3
        period: 1m

    # CrowdSec Bouncer (intrusion prevention)
    crowdsec:
      plugin:
        crowdsec:
          enabled: true
          crowdsecLapiHost: "crowdsec:8080"
          crowdsecLapiScheme: "http"
          crowdsecMode: "live"
          crowdsecAppsecEnabled: true
          crowdsecAppsecHost: "crowdsec:7422"
          updateIntervalSeconds: 60
          defaultDecisionSeconds: 60
          httpTimeoutSeconds: 10

  # ---------------------------------------------------------------------------
  # Routers - Internal OLM/Newt Auth (bypasses Cloudflare)
  # ---------------------------------------------------------------------------
  routers:
    # Internal auth router - used by OLM/Newt to bypass Cloudflare Bot Fight Mode
    # Access via: http://132.145.27.89:8443/api/v1/auth/...
    internal-auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: api-service
      entryPoints:
        - internal

    # Internal API router - for other internal API calls
    internal-api-router:
      rule: "PathPrefix(`/api/v1`)"
      service: api-service
      entryPoints:
        - internal

  # ---------------------------------------------------------------------------
  # Routers - Pangolin Dashboard
  # ---------------------------------------------------------------------------
    # HTTP to HTTPS redirect router
    main-app-router-redirect:
      rule: "Host(`pangolin.cianfhoghlaim.ie`)"
      service: next-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Next.js router (handles everything except API and WebSocket paths)
    next-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && !PathPrefix(`/api/v1`)"
      service: next-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

    # API router (handles /api/v1 paths)
    api-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && PathPrefix(`/api/v1`)"
      service: api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - rate-limit-api

    # WebSocket router
    ws-router:
      rule: "Host(`pangolin.cianfhoghlaim.ie`) && Headers(`Connection`, `Upgrade`)"
      service: api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  # ---------------------------------------------------------------------------
  # Routers - Integration API
  # ---------------------------------------------------------------------------
    # Integration API HTTP redirect
    int-api-router-redirect:
      rule: "Host(`api.cianfhoghlaim.ie`)"
      service: int-api-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Integration API HTTPS router
    int-api-router:
      rule: "Host(`api.cianfhoghlaim.ie`)"
      service: int-api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - rate-limit-api

  # ---------------------------------------------------------------------------
  # Routers - Authentication Services
  # ---------------------------------------------------------------------------
    # Pocket ID (OIDC Provider) HTTP redirect
    pocket-id-router-redirect:
      rule: "Host(`auth.cianfhoghlaim.ie`)"
      service: pocket-id-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Pocket ID HTTPS router
    pocket-id-router:
      rule: "Host(`auth.cianfhoghlaim.ie`)"
      service: pocket-id-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

    # TinyAuth login page HTTP redirect
    tinyauth-router-redirect:
      rule: "Host(`tinyauth.cianfhoghlaim.ie`)"
      service: tinyauth-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # TinyAuth HTTPS router
    tinyauth-router:
      rule: "Host(`tinyauth.cianfhoghlaim.ie`)"
      service: tinyauth-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

  # ---------------------------------------------------------------------------
  # Routers - Middleware Manager
  # ---------------------------------------------------------------------------
    # Middleware Manager HTTP redirect
    middleware-manager-router-redirect:
      rule: "Host(`middleware.cianfhoghlaim.ie`)"
      service: middleware-manager-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Middleware Manager HTTPS router (protected by TinyAuth)
    middleware-manager-router:
      rule: "Host(`middleware.cianfhoghlaim.ie`)"
      service: middleware-manager-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - tinyauth

  # ---------------------------------------------------------------------------
  # Routers - Log Dashboard
  # ---------------------------------------------------------------------------
    # Log Dashboard HTTP redirect
    log-dashboard-router-redirect:
      rule: "Host(`logs.cianfhoghlaim.ie`)"
      service: log-dashboard-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Log Dashboard HTTPS router (protected by TinyAuth)
    log-dashboard-router:
      rule: "Host(`logs.cianfhoghlaim.ie`)"
      service: log-dashboard-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - tinyauth

  # ---------------------------------------------------------------------------
  # Routers - Forgejo Git Server
  # ---------------------------------------------------------------------------
    # Forgejo HTTP redirect
    forgejo-router-redirect:
      rule: "Host(`git.cianfhoghlaim.ie`)"
      service: forgejo-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Forgejo HTTPS router
    forgejo-router:
      rule: "Host(`git.cianfhoghlaim.ie`)"
      service: forgejo-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers

  # ---------------------------------------------------------------------------
  # Routers - Lakehouse (via Pangolin VPN to mbp site)
  # ---------------------------------------------------------------------------
    # Lakekeeper HTTP redirect
    lakehouse-lakekeeper-router-redirect:
      rule: "Host(`lakehouse-lakekeeper.cianfhoghlaim.ie`)"
      service: lakehouse-lakekeeper-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Lakekeeper HTTPS router (protected by TinyAuth)
    lakehouse-lakekeeper-router:
      rule: "Host(`lakehouse-lakekeeper.cianfhoghlaim.ie`)"
      service: lakehouse-lakekeeper-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - tinyauth

    # Garage HTTP redirect
    lakehouse-garage-router-redirect:
      rule: "Host(`lakehouse-garage.cianfhoghlaim.ie`)"
      service: lakehouse-garage-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Garage HTTPS router (protected by TinyAuth)
    lakehouse-garage-router:
      rule: "Host(`lakehouse-garage.cianfhoghlaim.ie`)"
      service: lakehouse-garage-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - tinyauth

    # Lance HTTP redirect
    lakehouse-lance-router-redirect:
      rule: "Host(`lakehouse-lance.cianfhoghlaim.ie`)"
      service: lakehouse-lance-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Lance HTTPS router (protected by TinyAuth)
    lakehouse-lance-router:
      rule: "Host(`lakehouse-lance.cianfhoghlaim.ie`)"
      service: lakehouse-lance-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - secure-headers
        - tinyauth

  # ---------------------------------------------------------------------------
  # Services
  # ---------------------------------------------------------------------------
  services:
    # Pangolin Next.js frontend
    next-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3002"

    # Pangolin API/WebSocket
    api-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3000"

    # Pangolin Integration API
    int-api-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3003"

    # Pocket ID (OIDC Provider)
    pocket-id-service:
      loadBalancer:
        servers:
          - url: "http://pocket-id:1411"

    # TinyAuth (Forward Auth)
    tinyauth-service:
      loadBalancer:
        servers:
          - url: "http://tinyauth:3000"

    # Middleware Manager
    middleware-manager-service:
      loadBalancer:
        servers:
          - url: "http://middleware-manager:3456"

    # Forgejo Git Server
    forgejo-service:
      loadBalancer:
        servers:
          - url: "http://forgejo:3000"

    # Log Dashboard (Traefik access log visualization)
    log-dashboard-service:
      loadBalancer:
        servers:
          - url: "http://log-dashboard-frontend:3000"

    # Lakehouse services (via SSH tunnel to mbp - VPN workaround)
    # SSH tunnels: ssh -fN -R 127.0.0.1:PORT:localhost:PORT arm1.oci
    # TODO: Replace with native newt on macOS for proper VPN routing
    lakehouse-lakekeeper-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:18181"
    lakehouse-garage-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:13904"
    lakehouse-lance-service:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:18182"

# =============================================================================
# TLS Configuration
# =============================================================================
tls:
  options:
    default:
      minVersion: VersionTLS12
      maxVersion: VersionTLS13
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
      curvePreferences:
        - X25519
        - CurveP384