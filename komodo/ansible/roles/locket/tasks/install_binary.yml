---
# =============================================================================
# LOCKET ROLE - Binary Installation
# =============================================================================

- name: Check if locket is already installed
  ansible.builtin.stat:
    path: "{{ locket_binary_path }}"
  register: locket_binary

- name: Get installed locket version
  ansible.builtin.command: "{{ locket_binary_path }} --version"
  register: locket_installed_version
  changed_when: false
  failed_when: false
  when: locket_binary.stat.exists

- name: Determine if locket installation is needed
  ansible.builtin.set_fact:
    locket_install_needed: >-
      {{ not locket_binary.stat.exists or
         (locket_version != 'latest' and
          locket_version not in (locket_installed_version.stdout | default(''))) }}

- name: Create temporary directory for download
  ansible.builtin.tempfile:
    state: directory
    prefix: locket_
  register: locket_temp_dir
  when: locket_install_needed

- name: Download locket archive
  ansible.builtin.get_url:
    url: "{{ locket_download_url }}"
    dest: "{{ locket_temp_dir.path }}/locket.tar.xz"
    mode: "0644"
  when: locket_install_needed
  register: locket_download

- name: Extract locket binary
  ansible.builtin.unarchive:
    src: "{{ locket_temp_dir.path }}/locket.tar.xz"
    dest: "{{ locket_temp_dir.path }}"
    remote_src: true
  when: locket_install_needed

- name: Find extracted locket binary
  ansible.builtin.find:
    paths: "{{ locket_temp_dir.path }}"
    patterns: "locket"
    file_type: file
    recurse: true
  register: locket_extracted_binary
  when: locket_install_needed

- name: Install locket binary
  ansible.builtin.copy:
    src: "{{ locket_extracted_binary.files[0].path }}"
    dest: "{{ locket_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when:
    - locket_install_needed
    - locket_extracted_binary.files | length > 0

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ locket_temp_dir.path }}"
    state: absent
  when: locket_install_needed

- name: Verify locket installation
  ansible.builtin.command: "{{ locket_binary_path }} --version"
  register: locket_version_check
  changed_when: false
  failed_when: locket_version_check.rc != 0
