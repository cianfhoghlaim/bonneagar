# =============================================================================
# LINKWARDEN STACK
# =============================================================================
# Collaborative bookmark manager with full-text search
# =============================================================================

[[stack]]
name = "linkwarden"
description = "Collaborative bookmark manager with full-text search"
tags = ["host:bunchloch", "tier:productivity", "type:bookmarks", "domain:bookmarks.aleyum.com"]

[stack.config]
server_id = "bunchloch"
run_directory = "/etc/komodo/uirlisi/linkwarden"
file_paths = ["compose.yaml", "pangolin.yaml", "sidecar.yaml"]
environment = """
LINKWARDEN_DOMAIN=bookmarks.aleyum.com
LINKWARDEN_NAME=Linkwarden
LINKWARDEN_PORT=3000
LINKWARDEN_URL=https://bookmarks.aleyum.com
TZ=Europe/Dublin
OP_CONNECT_HOST=${OP_CONNECT_HOST}
LOCKET_MODE=watch
"""
