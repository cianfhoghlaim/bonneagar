# =============================================================================
# AGENT-OS - Production Runtime for AI Agents
# =============================================================================
# Multi-service deployment for Agno AgentOS instances. 4 domains:
#   - oideachais-agentos: Irish Education & Curriculum (port 7772)
#   - crypteolas-agentos: DeFi Protocol Analysis        (port 7771)
#   - browser-agentos:   Web Automation Orchestration    (port 7773)
#   - aleyum-agentos:    Deep Research & Discovery     (port 7774)
#
# Build contexts (post v2 restructure):
#   oideachais  -> oideachais/data_platform/agent_os/
#   crypteolas  -> tuatha/crypteolas/agent_os/
#   browser     -> infrastructure/browser/agent_os/
#   aleyum      -> ./aleyum/  (NOT YET MIGRATED — see openspec/AGENTS.md)
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   docker compose -f compose.yaml -f sidecar.yaml up -d
# =============================================================================

name: agent-os

services:
  # ---------------------------------------------------------------------------
  # OIDEACHAIS AGENTOS - Irish Education & Curriculum
  # Source: oideachais/data_platform/agent_os/
  # ---------------------------------------------------------------------------
  oideachais-agentos:
    build:
      context: ../../../oideachais
      dockerfile: data_platform/agent_os/Dockerfile
    image: ghcr.io/cianfhoghlaim/agent-os-oideachais:local
    container_name: oideachais-agentos
    restart: unless-stopped
    ports:
      - "${OIDEACHAIS_PORT:-7772}:7777"
    environment:
      AGENT_OS_SERVICE_NAME: oideachais
      AGENT_OS_PORT: 7777
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGNO_DEFAULT_MODEL: ${AGNO_DEFAULT_MODEL:-gpt-4o}
      AGNO_CLAUDE_MODEL: ${AGNO_CLAUDE_MODEL:-claude-sonnet-4-20250514}
      AGENT_OS_DB_URL: ${OIDEACHAIS_DB_URL:-sqlite:///./storage/oideachais.db}
      AGENT_OS_SECRET_KEY: ${AGENT_OS_SECRET_KEY}
      CRYPTEOLAS_AGENT_OS_URL: http://crypteolas-agentos:7777
      BROWSER_AGENT_OS_URL: http://browser-agentos:7777
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
      AGNO_DEBUG: ${AGNO_DEBUG:-false}
    volumes:
      - oideachais-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # CRYPTEOLAS AGENTOS - DeFi Protocol Analysis
  # Source: tuatha/crypteolas/agent_os/
  # ---------------------------------------------------------------------------
  crypteolas-agentos:
    build:
      context: ../../../tuatha/crypteolas
      dockerfile: agent_os/Dockerfile
    image: ghcr.io/cianfhoghlaim/agent-os-crypteolas:local
    container_name: crypteolas-agentos
    restart: unless-stopped
    ports:
      - "${CRYPTEOLAS_PORT:-7771}:7777"
    environment:
      AGENT_OS_SERVICE_NAME: crypteolas
      AGENT_OS_PORT: 7777
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGNO_DEFAULT_MODEL: ${AGNO_DEFAULT_MODEL:-gpt-4o}
      AGNO_CLAUDE_MODEL: ${AGNO_CLAUDE_MODEL:-claude-sonnet-4-20250514}
      AGENT_OS_DB_URL: ${CRYPTEOLAS_DB_URL:-sqlite:///./storage/crypteolas.db}
      X402_ENABLED: ${X402_ENABLED:-true}
      X402_PAY_TO_ADDRESS: ${X402_PAY_TO_ADDRESS}
      X402_NETWORK: ${X402_NETWORK:-base}
      X402_SKIP_VERIFICATION: ${X402_SKIP_VERIFICATION:-false}
      AGENT_OS_SECRET_KEY: ${AGENT_OS_SECRET_KEY}
      OIDEACHAIS_AGENT_OS_URL: http://oideachais-agentos:7777
      BROWSER_AGENT_OS_URL: http://browser-agentos:7777
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
      AGNO_DEBUG: ${AGNO_DEBUG:-false}
    volumes:
      - crypteolas-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # BROWSER AGENTOS - Web Automation Orchestration
  # Source: infrastructure/browser/agent_os/
  # ---------------------------------------------------------------------------
  browser-agentos:
    build:
      context: ../../../infrastructure/browser
      dockerfile: agent_os/Dockerfile
    image: ghcr.io/cianfhoghlaim/agent-os-browser:local
    container_name: browser-agentos
    restart: unless-stopped
    ports:
      - "${BROWSER_PORT:-7773}:7777"
    environment:
      AGENT_OS_SERVICE_NAME: browser
      AGENT_OS_PORT: 7777
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGNO_DEFAULT_MODEL: ${AGNO_DEFAULT_MODEL:-gpt-4o}
      AGNO_CLAUDE_MODEL: ${AGNO_CLAUDE_MODEL:-claude-sonnet-4-20250514}
      AGENT_OS_DB_URL: ${BROWSER_DB_URL:-sqlite:///./storage/browser.db}
      BROWSERBASE_API_KEY: ${BROWSERBASE_API_KEY:-}
      BROWSERBASE_PROJECT_ID: ${BROWSERBASE_PROJECT_ID:-}
      STAGEHAND_ENABLED: ${STAGEHAND_ENABLED:-true}
      CRAWL4AI_ENABLED: ${CRAWL4AI_ENABLED:-true}
      AGENT_OS_SECRET_KEY: ${AGENT_OS_SECRET_KEY}
      OIDEACHAIS_AGENT_OS_URL: http://oideachais-agentos:7777
      CRYPTEOLAS_AGENT_OS_URL: http://crypteolas-agentos:7777
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
      AGNO_DEBUG: ${AGNO_DEBUG:-false}
    volumes:
      - browser-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim

  # ---------------------------------------------------------------------------
  # ALEYUM AGENTOS - Deep Research & Discovery
  # Source: PENDING — aleyum/ source not yet migrated (was sruth/aleyum, deleted in v2).
  # Service still defined; build is currently disabled (skipped if source missing).
  # ---------------------------------------------------------------------------
  aleyum-agentos:
    # build: skipped until aleyum/ is restored; falls back to a stub image.
    image: ghcr.io/cianfhoghlaim/agent-os-aleyum:stub
    container_name: aleyum-agentos
    restart: unless-stopped
    ports:
      - "${ALEYUM_PORT:-7774}:7777"
    environment:
      AGENT_OS_SERVICE_NAME: aleyum
      AGENT_OS_PORT: 7777
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AGNO_DEFAULT_MODEL: ${AGNO_DEFAULT_MODEL:-gpt-4o}
      AGNO_CLAUDE_MODEL: ${AGNO_CLAUDE_MODEL:-claude-sonnet-4-20250514}
      AGENT_OS_DB_URL: ${ALEYUM_DB_URL:-sqlite:///./storage/aleyum.db}
      AGENT_OS_SECRET_KEY: ${AGENT_OS_SECRET_KEY}
      OIDEACHAIS_AGENT_OS_URL: http://oideachais-agentos:7777
      CRYPTEOLAS_AGENT_OS_URL: http://crypteolas-agentos:7777
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
      AGNO_DEBUG: ${AGNO_DEBUG:-false}
    volumes:
      - aleyum-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - cianfhoghlaim

volumes:
  oideachais-storage:
  crypteolas-storage:
  browser-storage:
  aleyum-storage:

networks:
  cianfhoghlaim:
    driver: bridge
