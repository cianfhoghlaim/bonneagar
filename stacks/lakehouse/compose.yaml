# =============================================================================
# LAKEHOUSE - Centralised Data Plane Stack
# =============================================================================
# The 11-service data plane for the whole Cianfhoghlaim platform.
# Hosts the S3-compatible object store (Garage), the columnar Postgres
# with 12 databases, the clickhouse columnar engine, the Redis queue,
# the Iceberg REST catalog (Lakekeeper), the Lance vector namespace,
# and the 3 secondary services (Nimtable UI, Olake CDC, LanceDB Viewer).
#
# Planetscale PostgreSQL is supported as an OPTIONAL override via the
# PLANETSCALE_DATABASE_URL env var — but the default (and recommended)
# for both dev and prod (on bunchloch) is the local lakehouse-postgres
# container.
#
# Downstream consumers (langfuse / litellm / mlflow) use the same
# Postgres + Garage + ClickHouse + Redis via Docker DNS names. See
# stedding/docs/stacks/lakehouse.md for the full contract.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
#
# SERVICES:
#   - garage:            S3-compatible storage (7 buckets total)
#   - garage-init:       Bucket initialization (iceberg, lance, ducklake,
#                        langfuse-events, langfuse-media, langfuse-exports,
#                        mlflow-artifacts) [centralise-data-plane 2026-07]
#   - postgres:          Centralised Postgres with 12 databases (ducklake_*,
#                        dagster_local, olake_state, nimtable, langfuse,
#                        mlflow, litellm) [centralise-data-plane 2026-07]
#   - clickhouse:        Centralised columnar engine (consumed by langfuse)
#                        [centralise-data-plane 2026-07]
#   - redis:             Centralised queue (consumed by langfuse)
#                        [centralise-data-plane 2026-07]
#   - lakekeeper-migrate: Database migrations
#   - lakekeeper:        Iceberg REST Catalog (port 8181)
#   - lance-namespace:   Lance table registration sidecar (port 8182)
#   - nimtable:          Iceberg catalog UI (port 3018) [extend-lakehouse-with-nimtable-olake-lancedb]
#   - olake:             CDC engine (ephemeral admin) [extend-lakehouse-with-nimtable-olake-lancedb]
#   - lancedb-viewer:    LanceDB table viewer (port 8081) [extend-lakehouse-with-nimtable-olake-lancedb]
# =============================================================================

name: lakehouse

services:
  # ---------------------------------------------------------------------------
  # GARAGE - Enhanced S3-Compatible Storage with Virtual-Host DNS
  # ---------------------------------------------------------------------------
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: lakehouse-garage
    restart: unless-stopped
    ports:
      - "${GARAGE_RPC_PORT:-3901}:3901"
      - "${GARAGE_S3_API_PORT:-3900}:3900"
      - "${GARAGE_K2V_API_PORT:-3902}:3902"
      - "${GARAGE_WEB_PORT:-3903}:3903"
      - "${GARAGE_ADMIN_PORT:-3904}:3904"
    environment:
      RUST_LOG: ${RUST_LOG:-garage=info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
      # Secrets injected via Locket or env
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET must be set via Locket/Infisical}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN must be set via Locket/Infisical}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - lakehouse-garage-meta:/var/lib/garage/meta
      - lakehouse-garage-data:/var/lib/garage/data
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    healthcheck:
      # Garage distroless image has no curl - use /garage status instead
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "node", "id"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lakehouse
      - pangolin
  # ---------------------------------------------------------------------------
  # GARAGE INIT - Create Buckets for Lakehouse via Admin API
  # ---------------------------------------------------------------------------
  # Uses alpine with curl to initialize Garage via its HTTP Admin API
  # Garage v1.x distroless image has no shell, so we use a separate container
  # ---------------------------------------------------------------------------
  garage-init:
    image: curlimages/curl:latest
    container_name: lakehouse-garage-init
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN must be set via Locket/Infisical}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID:?GARAGE_ACCESS_KEY_ID must be set via Locket/Infisical}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY:?GARAGE_SECRET_ACCESS_KEY must be set via Locket/Infisical}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ADMIN_URL="http://garage:3904"
        AUTH="Authorization: Bearer $${GARAGE_ADMIN_TOKEN}"

        echo "Waiting for Garage admin API..."
        sleep 3

        echo "Checking node layout..."
        # Get node ID
        NODE_ID=$$(curl -sf "$${ADMIN_URL}/v1/status" -H "$${AUTH}" | grep -o '"node":"[^"]*"' | cut -d'"' -f4)
        echo "Node ID: $$NODE_ID"

        # Check if layout already configured
        LAYOUT_VERSION=$$(curl -sf "$${ADMIN_URL}/v1/layout" -H "$${AUTH}" | grep -o '"version":[0-9]*' | head -1 | cut -d':' -f2)
        echo "Current layout version: $$LAYOUT_VERSION"

        if [ "$$LAYOUT_VERSION" = "0" ]; then
          echo "Configuring node layout..."
          # Stage layout change
          curl -sf -X POST "$${ADMIN_URL}/v1/layout" \
            -H "$${AUTH}" \
            -H "Content-Type: application/json" \
            -d "[{\"id\": \"$$NODE_ID\", \"zone\": \"dc1\", \"capacity\": 100000000000, \"tags\": []}]" || echo "Layout staging may have failed"

          # Apply layout
          curl -sf -X POST "$${ADMIN_URL}/v1/layout/apply" \
            -H "$${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"version": 1}' || echo "Layout apply may have failed"

          echo "Layout configured!"
          sleep 2
        else
          echo "Layout already configured"
        fi

        echo "Creating access key..."
        KEY_RESPONSE=$$(curl -sf -X POST "$${ADMIN_URL}/v1/key" \
          -H "$${AUTH}" \
          -H "Content-Type: application/json" \
          -d '{"name": "lakehouse"}' 2>/dev/null || echo "exists")

        if [ "$$KEY_RESPONSE" = "exists" ]; then
          echo "Key may already exist, fetching..."
          KEY_RESPONSE=$$(curl -sf "$${ADMIN_URL}/v1/key?search=lakehouse" -H "$${AUTH}")
        fi

        ACCESS_KEY_ID=$$(echo "$$KEY_RESPONSE" | grep -o '"accessKeyId":"[^"]*"' | head -1 | cut -d'"' -f4)
        echo "Access Key ID: $$ACCESS_KEY_ID"

        echo "Creating buckets..."
        # 7 buckets total (3 lakehouse-internal + 4 for downstream consumers)
        # Per the centralise-data-plane rewrite (2026-07)
        for bucket in iceberg lance ducklake langfuse-events langfuse-media langfuse-exports mlflow-artifacts; do
          curl -sf -X POST "$${ADMIN_URL}/v1/bucket" \
            -H "$${AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"globalAlias\": \"$$bucket\"}" \
            || echo "Bucket $$bucket may already exist"
        done

        echo "Getting bucket IDs and granting permissions..."
        for bucket in iceberg lance ducklake langfuse-events langfuse-media langfuse-exports mlflow-artifacts; do
          BUCKET_RESPONSE=$$(curl -sf "$${ADMIN_URL}/v1/bucket?globalAlias=$$bucket" -H "$${AUTH}")
          BUCKET_ID=$$(echo "$$BUCKET_RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$$BUCKET_ID" ] && [ -n "$$ACCESS_KEY_ID" ]; then
            curl -sf -X POST "$${ADMIN_URL}/v1/bucket/allow" \
              -H "$${AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"bucketId\": \"$$BUCKET_ID\", \"accessKeyId\": \"$$ACCESS_KEY_ID\", \"permissions\": {\"read\": true, \"write\": true, \"owner\": true}}" \
              || echo "Permission already set for $$bucket"
            echo "Granted access to $$bucket"
          fi
        done

        echo "Garage initialization complete!"
    restart: "no"
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # POSTGRESQL - Centralised Database (12 databases)
  # ---------------------------------------------------------------------------
  # Hosts 12 databases shared across the platform:
  #   6 DuckLake (ducklake_oideachais, _crypteolas, _aleyum, _croilar, _tuath,
  #              _meaisinfhoghlaim)
  #   dagster_local, olake_state, nimtable, langfuse, mlflow, litellm
  # See init-db.sql for the complete list.
  # POSTGRES_PASSWORD must be set via Infisical (never hardcode).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lakehouse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lakekeeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set via Locket/Infisical}
      POSTGRES_DB: ${POSTGRES_DB:-lakekeeper}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lakehouse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # CLICKHOUSE - Centralised Columnar Engine
  # ---------------------------------------------------------------------------
  # Consumed by the langfuse stack for trace analytics (langfuse_s3_event_upload
  # analytics + LANGFUSE_S3_BATCH_EXPORT).
  # Tight resource caps — ClickHouse is memory-hungry.
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: lakehouse-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set via Locket/Infisical}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - lakehouse-clickhouse-data:/var/lib/clickhouse
      - lakehouse-clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # REDIS - Centralised Queue / Cache
  # ---------------------------------------------------------------------------
  # Consumed by the langfuse stack (REDIS_HOST=lakehouse-redis, REDIS_AUTH).
  # Tight resource caps; bind direct port to 127.0.0.1 only (internal use).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set via Locket/Infisical}"
      - "--maxmemory-policy"
      - "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
    volumes:
      - lakehouse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - lakehouse

  # ---------------------------------------------------------------------------
  # LAKEKEEPER MIGRATE - Database Migrations
  # ---------------------------------------------------------------------------
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakehouse-lakekeeper-migrate
    command: migrate
    environment:
      LAKEKEEPER__PG_DATABASE_URL_WRITE: ${PLANETSCALE_DATABASE_URL:-postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@postgres:5432/${POSTGRES_DB:-lakekeeper}}
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY:?LAKEKEEPER_ENCRYPTION_KEY must be set via Locket/Infisical}
      LAKEKEEPER__PG_SSL_MODE: ${LAKEKEEPER_SSL_MODE:-prefer}
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
      # Note: Removed garage-init dependency - service_completed_successfully
      # condition is unreliable with remote Komodo deployments
    restart: "no"


  # ---------------------------------------------------------------------------
  # LAKEKEEPER - Iceberg REST Catalog
  # ---------------------------------------------------------------------------
  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest
    container_name: lakehouse-lakekeeper
    restart: unless-stopped
    command: ["serve"]
    ports:
      - "${LAKEKEEPER_PORT:-8181}:8181"
      - "${LAKEKEEPER_METRICS_PORT:-9100}:9000"
    environment:
      # PostgreSQL Connection — defaults to local lakehouse-postgres; can
      # be overridden by PLANETSCALE_DATABASE_URL for managed deployments.
      LAKEKEEPER__PG_DATABASE_URL_READ: ${PLANETSCALE_DATABASE_URL:-postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@postgres:5432/${POSTGRES_DB:-lakekeeper}}
      LAKEKEEPER__PG_DATABASE_URL_WRITE: ${PLANETSCALE_DATABASE_URL:-postgresql://${POSTGRES_USER:-lakekeeper}:${POSTGRES_PASSWORD:?must be set}@postgres:5432/${POSTGRES_DB:-lakekeeper}}
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY:?LAKEKEEPER_ENCRYPTION_KEY must be set via Locket/Infisical}
      LAKEKEEPER__PG_SSL_MODE: ${LAKEKEEPER_SSL_MODE:-prefer}
      # Server Configuration
      LAKEKEEPER__LISTEN_PORT: "8181"
      LAKEKEEPER__BASE_URI: ${LAKEKEEPER_BASE_URI:-http://lakekeeper.cianfhoghlaim.ie}
      LAKEKEEPER__SERVE_SWAGGER_UI: "true"
      # Logging
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
      # Note: Removed lakekeeper-migrate dependency - service_completed_successfully
      # condition is unreliable with remote Komodo deployments. Migrations run independently.
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lakehouse
      - pangolin
  # ---------------------------------------------------------------------------
  # LANCE-NAMESPACE - Iceberg Adapter Sidecar for Lance Tables
  # ---------------------------------------------------------------------------
  lance-namespace:
    build:
      context: ./lance-sidecar
      dockerfile: Dockerfile
    image: lakehouse-lance-namespace:latest
    container_name: lakehouse-lance-namespace
    restart: unless-stopped
    ports:
      - "${LANCE_NAMESPACE_PORT:-8182}:8182"
    environment:
      # Lakekeeper Connection (internal Docker network)
      ICEBERG_ENDPOINT: http://lakekeeper:8181
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-lakehouse}
      ICEBERG_PREFIX: ""
      ICEBERG_AUTH_TOKEN: ${LANCE_ICEBERG_AUTH_TOKEN:-}
      # Lance Storage Root (Garage S3)
      LANCE_ROOT: s3://lance/
      # Garage S3 Credentials
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID:?GARAGE_ACCESS_KEY_ID must be set via Locket/Infisical}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY:?GARAGE_SECRET_ACCESS_KEY must be set via Locket/Infisical}
      AWS_ENDPOINT_URL: http://garage:3900
      AWS_REGION: garage
      # Timeouts
      ICEBERG_CONNECT_TIMEOUT_MILLIS: "10000"
      ICEBERG_READ_TIMEOUT_MILLIS: "30000"
      ICEBERG_MAX_RETRIES: "3"
      # Server Configuration
      SIDECAR_HOST: "0.0.0.0"
      SIDECAR_PORT: "8182"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      lakekeeper:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8182/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - lakehouse
      - pangolin
  # ---------------------------------------------------------------------------
  # NIMTABLE - Iceberg Catalog UI (Spring Boot + JDBC)
  # ---------------------------------------------------------------------------
  # Surfaces all Iceberg tables registered in Lakekeeper via a web UI.
  # Persists dashboard state + user preferences in the `nimtable` Postgres DB.
  # ---------------------------------------------------------------------------
  nimtable:
    image: nimtable/nimtable:0.1.6
    container_name: lakehouse-nimtable
    restart: unless-stopped
    ports:
      - "${NIMTABLE_PORT:-3018}:3000"
    environment:
      # Spring Boot JDBC connection to shared Postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nimtable
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lakekeeper}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set via Locket/Infisical}
      # Lakekeeper catalog endpoint (internal Docker network)
      NIMTABLE_CATALOG_URI: http://lakekeeper:8181
      NIMTABLE_CATALOG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-lakehouse}
      # S3 endpoint (Garage)
      NIMTABLE_S3_ENDPOINT: http://garage:3900
      NIMTABLE_S3_REGION: garage
      NIMTABLE_S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY_ID:-lakehouse}
      NIMTABLE_S3_SECRET_KEY: ${GARAGE_SECRET_ACCESS_KEY:?GARAGE_SECRET_ACCESS_KEY must be set via Locket/Infisical}
      # Server
      SERVER_PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - nimtable_data:/var/lib/nimtable
    depends_on:
      postgres:
        condition: service_healthy
      lakekeeper:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - lakehouse
      - pangolin
  # ---------------------------------------------------------------------------
  # OLAKE - CDC Engine (MongoDB / Postgres / MySQL → Iceberg)
  # ---------------------------------------------------------------------------
  # Open-source CDC engine from olake-io. Persists checkpoint state to the
  # `olake_state` Postgres DB + named volume. Admin via `docker exec`.
  # ---------------------------------------------------------------------------
  olake:
    image: ghcr.io/olake-io/olake:0.1.5
    container_name: lakehouse-olake
    restart: unless-stopped
    environment:
      # Source connector config (Postgres sample)
      OLAKE_CONFIG_PATH: /mnt/config
      JDBC_URL: jdbc:postgresql://postgres:5432/olake_state
      JDBC_USERNAME: ${POSTGRES_USER:-lakekeeper}
      JDBC_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set via Locket/Infisical}
      # Source Postgres (for the source connector — separate from state DB)
      SOURCE_DB_HOST: ${OLAKE_SOURCE_HOST:-postgres}
      SOURCE_DB_PORT: ${OLAKE_SOURCE_PORT:-5432}
      SOURCE_DB_NAME: ${OLAKE_SOURCE_DB:-staging_pg}
      SOURCE_DB_USER: ${OLAKE_SOURCE_USER:-lakekeeper}
      SOURCE_DB_PASSWORD: ${OLAKE_SOURCE_PASSWORD:-devpassword}
      SOURCE_DB_SSLMODE: ${OLAKE_SOURCE_SSLMODE:-prefer}
      # Iceberg writer S3 credentials
      WRITER_S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY_ID:-lakehouse}
      WRITER_S3_SECRET_KEY: ${GARAGE_SECRET_ACCESS_KEY:?GARAGE_SECRET_ACCESS_KEY must be set via Locket/Infisical}
      WRITER_S3_ENDPOINT: http://garage:3900
      WRITER_S3_REGION: garage
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./olake/config.json:/mnt/config/config.json:ro
      - ./olake/catalog.json:/mnt/config/catalog.json:ro
      - ./olake/writer.json:/mnt/config/writer.json:ro
      - olake_state:/var/lib/olake
    depends_on:
      postgres:
        condition: service_healthy
      lakekeeper:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/olake/.health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - lakehouse
  # ---------------------------------------------------------------------------
  # LANCEDB-VIEWER - LanceDB Table Viewer
  # ---------------------------------------------------------------------------
  # Web UI for browsing LanceDB tables. Connects to the Lance namespace
  # sidecar at :8182 (the canonical rest:// endpoint). No published port
  # mapping required for internal use; the host port :8081 is for debugging.
  # ---------------------------------------------------------------------------
  lancedb-viewer:
    image: ghcr.io/gordonmurray/lance-data-viewer:lancedb-0.24.3
    container_name: lakehouse-lancedb-viewer
    restart: unless-stopped
    ports:
      - "${LANCEDB_VIEWER_PORT:-8081}:8080"
    environment:
      LANCEDB_URI: rest://lakehouse-lance-namespace:8182
      ADMIN_TOKEN: ${LANCEDB_VIEWER_ADMIN_TOKEN:?LANCEDB_VIEWER_ADMIN_TOKEN must be set via Locket/Infisical}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      lance-namespace:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - lakehouse
      - pangolin
# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  lakehouse-garage-meta:
  lakehouse-garage-data:
  lakehouse-postgres:
  lakehouse-clickhouse-data:
  lakehouse-clickhouse-logs:
  lakehouse-redis-data:
  olake_state:
  nimtable_data:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  lakehouse:
    driver: bridge
  # Pangolin network for production ingress - external in production
  # For local development, this will be created if it doesn't exist
  pangolin:
    driver: bridge
