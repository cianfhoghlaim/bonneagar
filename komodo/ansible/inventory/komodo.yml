      8d4789a5e63774df

  # ---------------------------------------------------------------------------
  # HOST GROUPS
  # ---------------------------------------------------------------------------
  children:
    # All Komodo-managed hosts
    komodo:
      vars:
        # Periphery version (must match Komodo Core version)
        periphery_version: "2.0.0-dev-102"

        # Environment variables for periphery systemd service
        periphery_agent_secrets:
          - name: "KOMODO_UID"
            value: "{{ ansible_facts.getent_passwd[periphery_user | default('root')].1 | default('0') }}"
          - name: "KOMODO_GID"
            value: "{{ ansible_facts.getent_passwd[periphery_user | default('root')].2 | default('0') }}"
          # Locket environment (for services that need it)
          - name: "OP_CONNECT_HOST"
            value: "{{ locket_op_connect_host }}"
          - name: "OP_CONNECT_TOKEN_FILE"
            value: "{{ locket_op_token_file | default('/etc/locket/op_token') }}"

      children:
        # ---------------------------------------------------------------------
        # CONTROL PLANE
        # ---------------------------------------------------------------------
        # Servers running Komodo Core + Pangolin (also runs periphery + locket)
        # Uses core_to_periphery connection mode (same Docker network)
        control_plane:
          hosts:
            arm1-oci:
          vars:
            # Core→Periphery: Periphery listens, Core connects
            periphery_mode: inbound
            periphery_server_enabled: true
            periphery_ssl_enabled: true

        # ---------------------------------------------------------------------
        # WORKLOAD SERVERS
        # ---------------------------------------------------------------------
        # Servers running Periphery + Locket (no core)
        # Uses periphery_to_core connection mode (outbound to Core)
        workloads:
          hosts:
            cax41-hetzner:
          vars:
            # Periphery→Core: Periphery connects outbound
            periphery_mode: outbound
            periphery_core_address: "{{ komodo_core_address }}"
            periphery_server_enabled: false

        # ---------------------------------------------------------------------
        # DEVELOPMENT SERVERS
        # ---------------------------------------------------------------------
        # Local development machines
        development:
          hosts:
            bunchloch:
          vars:
            # Periphery→Core: Local dev connects outbound
            periphery_mode: outbound
            periphery_core_address: "{{ komodo_core_address }}"
            periphery_server_enabled: false

        # ---------------------------------------------------------------------
        # ALL PERIPHERY HOSTS (convenience group)
        # ---------------------------------------------------------------------
        periphery:
          hosts:
            arm1-oci:
            cax41-hetzner:
            bunchloch:

    # -------------------------------------------------------------------------
    # INFRASTRUCTURE SERVERS
    # -------------------------------------------------------------------------
    # Servers for deploying the complete infrastructure stack:
    # 1Password Connect, Pangolin Core, Komodo Core
    # NOTE: Using Oracle Cloud free tier ARM instance (4 core, 24GB RAM)
    infrastructure:
      hosts:
        arm1-oci:
      vars:
        # Use sudo for ubuntu user on Oracle Cloud
        ansible_become: true

        # -----------------------------------------------------------------
        # 1PASSWORD CONNECT CONFIGURATION
        # -----------------------------------------------------------------
        # Path to credentials file on CONTROL machine (ansible container)
        op_credentials_src: "/config/1password-credentials.json"
        # Path to token file on CONTROL machine
        op_token_src: "/config/op_token"
        # Bind to all interfaces for access from Pangolin/Komodo/remote periphery
        op_connect_bind_address: "0.0.0.0"

        # -----------------------------------------------------------------
        # PANGOLIN CORE CONFIGURATION
        # -----------------------------------------------------------------
        pangolin_domain: "cianfhoghlaim.ie"
        pangolin_op_token_src: "/config/op_token"
        pangolin_config_src: "/config/pangolin"
        pangolin_op_connect_host: "http://127.0.0.1:8080"

        # -----------------------------------------------------------------
        # KOMODO CORE CONFIGURATION
        # -----------------------------------------------------------------
        komodo_host: "https://komodo.cianfhoghlaim.ie"
        komodo_domain: "komodo.cianfhoghlaim.ie"
        komodo_op_vault: "dev-baile"

    # -------------------------------------------------------------------------
    # ENVIRONMENT GROUPS (Optional)
    # -------------------------------------------------------------------------
    production:
      hosts:
        arm1-oci:
      vars:
        periphery_log_level: info

    staging:
      hosts:
        cax41-hetzner:
        bunchloch:
      vars:
        periphery_log_level: debug
