# =============================================================================
# COGNEE - AI Memory and Knowledge Graph
# =============================================================================
# Unified API across graph backends (Memgraph) and vector backends (LanceDB).
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: cognee

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL - Relational Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cognee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cognee}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: ${DB_NAME:-cognee}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - cognee-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cognee}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - cognee

  # ---------------------------------------------------------------------------
  # MEMGRAPH - Graph Database
  # ---------------------------------------------------------------------------
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: cognee-memgraph
    restart: unless-stopped
    environment:
      MEMGRAPH_USER: ${MEMGRAPH_USER:-memgraph}
      MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD:-devpassword}
    volumes:
      - cognee-memgraph-lib:/var/lib/memgraph
      - cognee-memgraph-log:/var/log/memgraph
    command: ["--log-level=WARNING"]
    healthcheck:
      test: ["CMD", "echo", ">", "/dev/tcp/localhost/7687"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cognee

  # ---------------------------------------------------------------------------
  # COGNEE - AI Memory Service
  # ---------------------------------------------------------------------------
  cognee:
    image: cognee/cognee:latest
    container_name: cognee
    restart: unless-stopped
    ports:
      - "${COGNEE_PORT:-8001}:8000"
      - "${COGNEE_DEBUG_PORT:-5678}:5678"
    environment:
      # Application
      DEBUG: ${COGNEE_DEBUG:-false}
      HOST: "0.0.0.0"
      ENVIRONMENT: local
      LOG_LEVEL: ${COGNEE_LOG_LEVEL:-WARNING}
      # Graph Database
      GRAPH_DATABASE_PROVIDER: memgraph
      GRAPH_DATABASE_URL: bolt://memgraph:7687
      GRAPH_DATABASE_USERNAME: ${MEMGRAPH_USER:-memgraph}
      GRAPH_DATABASE_PASSWORD: ${MEMGRAPH_PASSWORD:-devpassword}
      # Vector Database
      VECTOR_DATABASE_PROVIDER: lancedb
      VECTOR_DATABASE_URL: /data/lancedb
      # Relational Database
      DB_PROVIDER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-cognee}
      DB_USERNAME: ${DB_USERNAME:-cognee}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      # LLM Configuration
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
    volumes:
      - cognee-data:/data/lancedb
      - cognee-storage:/app/.cognee_system
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    networks:
      - cognee

  # ---------------------------------------------------------------------------
  # COGNEE MCP - Model Context Protocol Server (Optional)
  # ---------------------------------------------------------------------------
  cognee-mcp:
    image: cognee/cognee-mcp:main
    container_name: cognee-mcp
    restart: unless-stopped
    profiles:
      - mcp
    ports:
      - "${COGNEE_MCP_PORT:-8002}:8000"
    environment:
      DEBUG: "false"
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      TRANSPORT_MODE: sse
      DB_PROVIDER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-cognee}
      DB_USERNAME: ${DB_USERNAME:-cognee}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cognee
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - cognee

volumes:
  cognee-postgres:
  cognee-memgraph-lib:
  cognee-memgraph-log:
  cognee-data:
  cognee-storage:

networks:
  cognee:
    driver: bridge
