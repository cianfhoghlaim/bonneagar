# =============================================================================
# DAGSTER UNIFIED - Production Stack
# =============================================================================
# Runs the unified Dagster instance for the oideachais data platform.
# Connects to the lakehouse for DuckLake / Garage S3 storage.
#
# USAGE:
#   Development:  docker compose --env-file .env.local up -d
#   Production:   docker compose -f compose.yaml -f sidecar.yaml up -d
#                 (Locket resolves secrets from Infisical at runtime)
# =============================================================================

name: dagster

services:
  # ---------------------------------------------------------------------------
  # DAGSTER WEBSERVER
  # ---------------------------------------------------------------------------
  dagster:
    image: ghcr.io/cianfhoghlaim/dagster:latest
    container_name: dagster-unified
    restart: unless-stopped
    ports:
      - "${DAGSTER_PORT:-3335}:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/home
      # DuckLake
      USE_DUCKLAKE: ${USE_DUCKLAKE:-true}
      DUCKLAKE_POSTGRES_HOST: ${DUCKLAKE_POSTGRES_HOST:-lakehouse-postgres}
      DUCKLAKE_POSTGRES_PORT: ${DUCKLAKE_POSTGRES_PORT:-5432}
      DUCKLAKE_POSTGRES_USER: ${DUCKLAKE_POSTGRES_USER:-lakekeeper}
      DUCKLAKE_POSTGRES_PASSWORD: ${DUCKLAKE_POSTGRES_PASSWORD}
      DLT_ENVIRONMENT: ${DLT_ENVIRONMENT:-production}
      # Garage S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://lakehouse-garage:3900}
      AWS_REGION: ${AWS_REGION:-garage}
      # LLM
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Langfuse
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://langfuse.cianfhoghlaim.ie}
    volumes:
      - dagster-storage:/opt/dagster/storage
      - dagster-home:/opt/dagster/home
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/server_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    networks:
      - cianfhoghlaim
      - lakehouse

  # ---------------------------------------------------------------------------
  # DAGSTER DAEMON - Schedules, Sensors, Run Queue
  # ---------------------------------------------------------------------------
  dagster-daemon:
    image: ghcr.io/cianfhoghlaim/dagster:latest
    container_name: dagster-daemon
    restart: unless-stopped
    command: ["uv", "run", "dagster-daemon", "run"]
    environment:
      DAGSTER_HOME: /opt/dagster/home
      USE_DUCKLAKE: ${USE_DUCKLAKE:-true}
      DUCKLAKE_POSTGRES_HOST: ${DUCKLAKE_POSTGRES_HOST:-lakehouse-postgres}
      DUCKLAKE_POSTGRES_PORT: ${DUCKLAKE_POSTGRES_PORT:-5432}
      DUCKLAKE_POSTGRES_USER: ${DUCKLAKE_POSTGRES_USER:-lakekeeper}
      DUCKLAKE_POSTGRES_PASSWORD: ${DUCKLAKE_POSTGRES_PASSWORD}
      DLT_ENVIRONMENT: ${DLT_ENVIRONMENT:-production}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://lakehouse-garage:3900}
      AWS_REGION: ${AWS_REGION:-garage}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - dagster-storage:/opt/dagster/storage
      - dagster-home:/opt/dagster/home
    depends_on:
      dagster:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "dagster-daemon"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - cianfhoghlaim
      - lakehouse

volumes:
  dagster-storage:
  dagster-home:

networks:
  cianfhoghlaim:
    driver: bridge
  lakehouse:
    name: lakehouse_lakehouse
    external: true
