# =============================================================================
# HETZNER DATABASE STACKS
# =============================================================================
# Database services deployed on Hetzner CAX41 (cax41-hetzner)
# Production-ready databases that need reliable always-on hosting
# =============================================================================

# -----------------------------------------------------------------------------
# MEMGRAPH - In-Memory Graph Database
# -----------------------------------------------------------------------------
[[stack]]
name = "memgraph"
description = "In-memory graph database with MAGE algorithms"
tags = ["host:cax41-hetzner", "tier:database", "type:graph"]

[stack.config]
server_id = "cax41-hetzner"
run_directory = "/etc/komodo/storage/memgraph"
file_paths = ["compose.yaml", "pangolin.yaml"]
environment = """
MEMGRAPH_BOLT_PORT=7687
MEMGRAPH_HTTP_PORT=7444
MEMGRAPH_LAB_PORT=3000
MEMGRAPH_LOG_LEVEL=WARNING
"""

