name: headplane
services:
  headplane:
    image: ghcr.io/tale/headplane:latest
    container_name: headplane
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      - HEADPLANE_SERVER_URL=https://hp.cianfhoghlaim.ie
      - HEADSCALE_INTERNAL_URL=http://headscale:8080
      - HEADSCALE_PUBLIC_URL=https://hs.cianfhoghlaim.ie
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 20s
    deploy:
      resources:
        limits: {memory: 512M, cpus: '1'}
    networks: [cianfhoghlaim]
networks:
  cianfhoghlaim: {driver: bridge}
