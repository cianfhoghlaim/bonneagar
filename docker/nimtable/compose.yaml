# =============================================================================
# NIMTABLE - Apache Iceberg Table Management
# =============================================================================
# UI for managing Apache Iceberg tables with S3-compatible storage.
#
# USAGE:
#   Development:  docker compose --env-file ../../.env.local up -d
#   Production:   locket exec --env-file secrets.env -- docker compose up -d
#   Standalone:   docker compose up -d  (uses defaults)
# =============================================================================

name: nimtable

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL - Catalog Backend
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nimtable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NIMTABLE_DB_USER:-nimtable}
      POSTGRES_PASSWORD: ${NIMTABLE_DB_PASSWORD:-devpassword}
      POSTGRES_DB: nimtable
    volumes:
      - nimtable-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NIMTABLE_DB_USER:-nimtable}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - nimtable

  # ---------------------------------------------------------------------------
  # NIMTABLE - Iceberg Table Manager
  # ---------------------------------------------------------------------------
  nimtable:
    image: nimtable/nimtable:latest
    container_name: nimtable
    restart: unless-stopped
    ports:
      - "${NIMTABLE_PORT:-3000}:3000"
    environment:
      # PostgreSQL catalog backend
      NIMTABLE_JDBC_URL: jdbc:postgresql://postgres:5432/nimtable
      NIMTABLE_JDBC_USER: ${NIMTABLE_DB_USER:-nimtable}
      NIMTABLE_JDBC_PASSWORD: ${NIMTABLE_DB_PASSWORD:-devpassword}
      # S3/R2 storage configuration
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-auto}
      AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL:-}
      NIMTABLE_WAREHOUSE: s3://${S3_BUCKET:-iceberg-warehouse}/
    volumes:
      - nimtable-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nimtable

volumes:
  nimtable-postgres:
  nimtable-data:

networks:
  nimtable:
    driver: bridge
