---
# =============================================================================
# LOCKET ROLE - Environment File Deployment
# =============================================================================
# Deploys an environment file that can be sourced by systemd services
# or Docker containers that need locket configuration.
# =============================================================================

- name: Deploy locket environment file
  ansible.builtin.template:
    src: locket.env.j2
    dest: "{{ locket_env_file_path }}"
    owner: "{{ locket_cli_plugin_user }}"
    group: "{{ locket_cli_plugin_group }}"
    mode: "{{ locket_secret_file_mode }}"
  when: locket_deploy_env_file | default(true)
